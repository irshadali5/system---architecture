<div class="chapter-eyebrow"><span class="b">Part I — Foundations</span> / Chapter 1</div>
<h2 class="title">What System Design Actually Is (and Isn't)</h2>
<div class="deck">Before any diagram, any database choice, any pattern — the reason most resources confuse you is that they never separate three different questions that get asked in the same breath.</div>

<h3>1.1 — Three questions, one word</h3>
<p>When people say "system design," they're usually collapsing three distinct levels of decision-making into one term. This collapse is the single biggest source of confusion in everything you've read so far — a blog post answers one level while you're trying to learn another, and the mismatch feels like the topic itself is incoherent.</p>

<table>
<tr><th>Level</th><th>Question it answers</th><th>Typical artifact</th></tr>
<tr><td><strong>System Design</strong></td><td>How do independent processes, machines, and services cooperate to satisfy a requirement at scale?</td><td>Boxes-and-arrows diagram, capacity plan</td></tr>
<tr><td><strong>Software Architecture</strong></td><td>How is a single codebase organized so that change in one part doesn't force change everywhere?</td><td>Module/layer boundaries, dependency rules</td></tr>
<tr><td><strong>Low-Level / Detailed Design</strong></td><td>How is one component built — what data structures, what concurrency model, what allocation strategy?</td><td>Class/struct definitions, function signatures</td></tr>
</table>

<p>A "design a chat system" interview question is mostly Level 1 with a sprinkle of Level 3. A "refactor this service so the payment logic doesn't leak into the HTTP handlers" task is pure Level 2. A "why is this hot loop allocating" question is pure Level 3. <strong>Most courses teach Level 1 with hand-waving at Level 3, and most "clean code" books teach Level 2 with no Level 1 context at all.</strong> Neither tells you that they're different rooms in the same house.</p>

<div class="callout"><span class="lbl">Why this matters to you specifically</span>You already have strong Level 3 instincts from C++ — manual memory, explicit typing, low-level reasoning. What you're missing isn't aptitude, it's that nobody drew the boundary between "this is a distributed-systems problem" and "this is a single-process design problem" before throwing terminology at you. This book keeps that boundary explicit in every chapter heading.</div>

<h3>1.2 — A working definition</h3>
<p>For the rest of this book, the terms mean exactly this, with no exceptions:</p>
<ul>
<li><strong>System design</strong> — decisions that exist because more than one machine, process, or failure domain is involved. If you could delete the network and the problem disappears, it isn't system design.</li>
<li><strong>Software architecture</strong> — decisions about dependency direction inside a codebase. Architecture is, almost entirely, about which modules are allowed to know about which other modules.</li>
<li><strong>Low-level design</strong> — decisions about concrete representation: which struct, which trait/interface, which allocation strategy, which lock.</li>
</ul>
<p>Every chapter from here on tells you, in its eyebrow line, which of these three rooms you're in. Chapters in Part III–V are system design. Chapters in Part II are architecture. Chapters in Part VII are low-level design. Case studies in Part V deliberately walk all three levels for one problem, in order, so you can see how a single requirement decomposes downward.</p>

<h3>1.3 — Why "theory-only" resources fail</h3>
<p>A talk that says "use a message queue for decoupling" is correct and useless in the same sentence. It's correct because queues genuinely decouple producer and consumer lifecycles. It's useless because it never shows you the moment where that decoupling has a cost — a queue is a place where the laws of "this code ran synchronously" go to die, and you start needing idempotency keys, dead-letter handling, and ordering guarantees you didn't have to think about a sentence earlier. Theory without the failure mode is marketing.</p>

<h3>1.4 — Why "code-only" resources fail</h3>
<p>The opposite failure is a 400-line gist that implements a least-recently-used cache with no explanation of <em>when you'd reach for LRU over LFU or a TTL-based policy</em>, and no discussion of what happens when two threads evict the same key at once. You can copy the code. You can't reuse the decision, because the decision was never written down — only its output.</p>
<p>This is why this book's format is fixed, chapter after chapter, even when it gets repetitive: <strong>theory and trade-off first, in prose, then the same idea built twice — once in C++, once in Rust</strong> — so you see what each language's type system forces you to confront that the other lets you defer.</p>

<h3>1.5 — Worked example: the same problem at all three levels</h3>
<p>Take one requirement: <em>"the application needs to log structured events."</em> Watch it change shape at each level.</p>

<h4>At system-design level</h4>
<p>Where do logs go when the producing process dies mid-write? Do you accept at-most-once delivery (logs can be lost) or do you pay for at-least-once (logs can duplicate, and downstream consumers must dedupe)? If ten thousand instances log concurrently, is the log sink itself now a bottleneck, and does that make logging a candidate for its own queue?</p>

<h4>At architecture level</h4>
<p>Does your business logic call a concrete <code class="inline">FileLogger</code> directly, or does it depend on an abstraction it doesn't control the implementation of? If you swap file logging for network logging next quarter, how many files change? The answer to that question <em>is</em> your architecture — not a diagram you drew, but the actual blast radius of a change.</p>

<h4>At low-level design level</h4>
<p>Is the logger thread-safe? Does formatting happen on the hot path (slow, simple) or on a background thread via a lock-free queue (fast, complex)? What's the allocation strategy for the message buffer — does every log call allocate, or is there a reusable arena?</p>

<p>The rest of this section builds the architecture-and-low-level slice of this exact example in both languages: a logging abstraction that the rest of an application depends on, decoupled from where the log line ends up.</p>

<h3>1.6 — C++ reference implementation</h3>
<p>The shape of the problem in C++: an abstract base class defines the contract, concrete classes implement it, and the rest of the application holds a reference to the interface, never the concrete type. This is the classic dependency-inversion shape, and C++ requires you to make the ownership question explicit — who deletes the logger?</p>

<div class="codewin">
<div class="bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="fname">logger.hpp</span></div>
<pre><code><span class="kw">#pragma once</span>
<span class="kw">#include</span> <span class="st">&lt;string&gt;</span>
<span class="kw">#include</span> <span class="st">&lt;memory&gt;</span>
<span class="kw">#include</span> <span class="st">&lt;mutex&gt;</span>
<span class="kw">#include</span> <span class="st">&lt;fstream&gt;</span>
<span class="kw">#include</span> <span class="st">&lt;iostream&gt;</span>

<span class="cm">// The contract. Business code depends on this, never on a concrete writer.</span>
<span class="kw">class</span> <span class="ty">ILogger</span> {
<span class="kw">public</span>:
    <span class="kw">virtual</span> ~<span class="fn">ILogger</span>() = <span class="kw">default</span>;
    <span class="kw">virtual</span> <span class="kw">void</span> <span class="fn">log</span>(<span class="ty">std::string_view</span> level,
                     <span class="ty">std::string_view</span> message) = <span class="nu">0</span>;
};

<span class="cm">// One concrete implementation: thread-safe file sink.</span>
<span class="kw">class</span> <span class="ty">FileLogger</span> : <span class="kw">public</span> <span class="ty">ILogger</span> {
<span class="kw">public</span>:
    <span class="kw">explicit</span> <span class="fn">FileLogger</span>(<span class="ty">const std::string&amp;</span> path)
        : file_(path, <span class="ty">std::ios::app</span>) {}

    <span class="kw">void</span> <span class="fn">log</span>(<span class="ty">std::string_view</span> level,
             <span class="ty">std::string_view</span> message) <span class="kw">override</span> {
        <span class="cm">// Lock scope is intentionally minimal: format outside, write inside.</span>
        <span class="ty">std::lock_guard</span>&lt;<span class="ty">std::mutex</span>&gt; <span class="fn">guard</span>(mutex_);
        file_ &lt;&lt; <span class="st">"["</span> &lt;&lt; level &lt;&lt; <span class="st">"] "</span> &lt;&lt; message &lt;&lt; <span class="st">"\n"</span>;
    }

<span class="kw">private</span>:
    <span class="ty">std::ofstream</span> file_;
    <span class="ty">std::mutex</span> mutex_;
};

<span class="cm">// A second implementation costs nothing to add and breaks nothing upstream.</span>
<span class="kw">class</span> <span class="ty">ConsoleLogger</span> : <span class="kw">public</span> <span class="ty">ILogger</span> {
<span class="kw">public</span>:
    <span class="kw">void</span> <span class="fn">log</span>(<span class="ty">std::string_view</span> level,
             <span class="ty">std::string_view</span> message) <span class="kw">override</span> {
        <span class="ty">std::lock_guard</span>&lt;<span class="ty">std::mutex</span>&gt; <span class="fn">guard</span>(mutex_);
        <span class="ty">std::cerr</span> &lt;&lt; <span class="st">"["</span> &lt;&lt; level &lt;&lt; <span class="st">"] "</span> &lt;&lt; message &lt;&lt; <span class="st">"\n"</span>;
    }
<span class="kw">private</span>:
    <span class="ty">std::mutex</span> mutex_;
};
</code></pre>
</div>

<div class="codewin">
<div class="bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="fname">order_service.hpp</span></div>
<pre><code><span class="kw">#pragma once</span>
<span class="kw">#include</span> <span class="st">"logger.hpp"</span>

<span class="cm">// OrderService depends on ILogger&amp; — not FileLogger, not ConsoleLogger.</span>
<span class="cm">// It does not own the logger's lifetime; the caller decides that.</span>
<span class="kw">class</span> <span class="ty">OrderService</span> {
<span class="kw">public</span>:
    <span class="kw">explicit</span> <span class="fn">OrderService</span>(<span class="ty">ILogger&amp;</span> logger) : logger_(logger) {}

    <span class="kw">void</span> <span class="fn">place_order</span>(<span class="ty">int</span> order_id) {
        logger_.<span class="fn">log</span>(<span class="st">"info"</span>, <span class="st">"order placed: #"</span> + <span class="ty">std::to_string</span>(order_id));
    }

<span class="kw">private</span>:
    <span class="ty">ILogger&amp;</span> logger_;
};

<span class="cm">// main.cpp wires concrete types at the one place that's allowed to know them:
// FileLogger logger("app.log");
// OrderService svc(logger);
// svc.place_order(42);</span>
</code></pre>
</div>

<p>Notice what C++ <em>forces</em> you to decide that a higher-level description never mentions: is <code class="inline">logger_</code> a reference, a raw pointer, or a <code class="inline">shared_ptr</code>? Each answer encodes a different ownership story, and the compiler will not save you from getting it wrong — a dangling reference to a destructed logger is a silent corruption, not a compile error. This is the cost side of the decoupling theory promised you in §1.3.</p>

<h3>1.7 — Rust reference implementation</h3>
<p>The same shape in Rust: a trait replaces the abstract base class. The interesting difference isn't syntax — it's that Rust's borrow checker makes you resolve the ownership question from §1.6 <em>before the code compiles</em>, rather than leaving it as a runtime risk.</p>

<div class="codewin">
<div class="bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="fname">logger.rs</span></div>
<pre><code><span class="kw">use</span> std::fs::OpenOptions;
<span class="kw">use</span> std::io::Write;
<span class="kw">use</span> std::sync::Mutex;

<span class="cm">// The contract. Note: no lifetime/ownership escape hatch here —
// every implementor must decide its own thread-safety story.</span>
<span class="kw">pub trait</span> <span class="ty">Logger</span>: <span class="ty">Send</span> + <span class="ty">Sync</span> {
    <span class="kw">fn</span> <span class="fn">log</span>(&amp;<span class="kw">self</span>, level: &amp;<span class="kw">str</span>, message: &amp;<span class="kw">str</span>);
}

<span class="kw">pub struct</span> <span class="ty">FileLogger</span> {
    file: <span class="ty">Mutex</span>&lt;std::fs::File&gt;,
}

<span class="kw">impl</span> <span class="ty">FileLogger</span> {
    <span class="kw">pub fn</span> <span class="fn">new</span>(path: &amp;<span class="kw">str</span>) -&gt; std::io::Result&lt;<span class="ty">Self</span>&gt; {
        <span class="kw">let</span> file = <span class="ty">OpenOptions</span>::new().append(<span class="kw">true</span>).create(<span class="kw">true</span>).open(path)?;
        <span class="ty">Ok</span>(<span class="ty">Self</span> { file: <span class="ty">Mutex</span>::new(file) })
    }
}

<span class="kw">impl</span> <span class="ty">Logger</span> <span class="kw">for</span> <span class="ty">FileLogger</span> {
    <span class="kw">fn</span> <span class="fn">log</span>(&amp;<span class="kw">self</span>, level: &amp;<span class="kw">str</span>, message: &amp;<span class="kw">str</span>) {
        <span class="cm">// .unwrap() here is a deliberate choice: a poisoned mutex means a
        // prior writer panicked mid-write — we treat that as unrecoverable
        // for this sink rather than silently swallowing it.</span>
        <span class="kw">let mut</span> f = <span class="kw">self</span>.file.lock().unwrap();
        <span class="kw">let</span> _ = writeln!(f, <span class="st">"[{}] {}"</span>, level, message);
    }
}

<span class="kw">pub struct</span> <span class="ty">ConsoleLogger</span>;

<span class="kw">impl</span> <span class="ty">Logger</span> <span class="kw">for</span> <span class="ty">ConsoleLogger</span> {
    <span class="kw">fn</span> <span class="fn">log</span>(&amp;<span class="kw">self</span>, level: &amp;<span class="kw">str</span>, message: &amp;<span class="kw">str</span>) {
        eprintln!(<span class="st">"[{}] {}"</span>, level, message);
    }
}
</code></pre>
</div>

<div class="codewin">
<div class="bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="fname">order_service.rs</span></div>
<pre><code><span class="kw">use</span> std::sync::Arc;
<span class="kw">use</span> <span class="kw">crate</span>::logger::Logger;

<span class="cm">// OrderService owns a shared, reference-counted handle to *some* Logger.
// Arc&lt;dyn Logger&gt; is the Rust answer to the ownership question C++ left
// open in section 1.6 — it's explicit in the type, not a convention.</span>
<span class="kw">pub struct</span> <span class="ty">OrderService</span> {
    logger: <span class="ty">Arc</span>&lt;<span class="kw">dyn</span> <span class="ty">Logger</span>&gt;,
}

<span class="kw">impl</span> <span class="ty">OrderService</span> {
    <span class="kw">pub fn</span> <span class="fn">new</span>(logger: <span class="ty">Arc</span>&lt;<span class="kw">dyn</span> <span class="ty">Logger</span>&gt;) -&gt; <span class="ty">Self</span> {
        <span class="ty">Self</span> { logger }
    }

    <span class="kw">pub fn</span> <span class="fn">place_order</span>(&amp;<span class="kw">self</span>, order_id: u64) {
        <span class="kw">self</span>.logger.log(<span class="st">"info"</span>, &amp;<span class="kw">format!</span>(<span class="st">"order placed: #{}"</span>, order_id));
    }
}

<span class="cm">// fn main() {
//     let logger: Arc&lt;dyn Logger&gt; = Arc::new(FileLogger::new("app.log").unwrap());
//     let svc = OrderService::new(logger);
//     svc.place_order(42);
// }</span>
</code></pre>
</div>

<h3>1.8 — What each language forced you to confront</h3>
<table>
<tr><th>Question</th><th>C++ answer</th><th>Rust answer</th></tr>
<tr><td>Who owns the logger?</td><td>Left to convention — reference, raw pointer, or <code class="inline">shared_ptr</code> are all "valid" C++, and the compiler enforces none of them.</td><td>Forced into the type: <code class="inline">Arc&lt;dyn Logger&gt;</code> states shared ownership explicitly. There's no version of this code where ownership is ambiguous.</td></tr>
<tr><td>Is it thread-safe?</td><td>You must remember to add a mutex; nothing stops you from forgetting, and the failure is a data race discovered at runtime (if you're lucky).</td><td><code class="inline">Send + Sync</code> bounds on the trait mean a non-thread-safe implementor <em>fails to compile</em> if used across threads.</td></tr>
<tr><td>What's the cost of the abstraction?</td><td>A vtable indirection per call — small, well-understood, optional via templates/CRTP if you need to remove it.</td><td>Same vtable cost via <code class="inline">dyn Logger</code>; removable via generics (<code class="inline">impl Logger</code>/<code class="inline">&lt;L: Logger&gt;</code>) if monomorphization is worth the binary size.</td></tr>
</table>

<div class="callout"><span class="lbl">The point of this section</span>Neither language is "better" here — they're making the same architectural decision (depend on an abstraction) and disagreeing about how much of the cost gets pushed onto the compiler versus left as a discipline problem for you. That's the lens this entire book uses: same decision, two languages, see what gets caught at compile time versus what stays a runtime risk.</div>

<h3>1.9 — What to carry forward</h3>
<ul>
<li>Before reading any future chapter, identify which of the three rooms (system / architecture / low-level) it's actually in — the eyebrow line tells you, but try to guess first.</li>
<li>The dependency-inversion shape in §1.6–1.7 (depend on a trait/interface, not a concrete type) is the single most repeated pattern in the rest of this book. Everything from caching layers to consensus modules will reuse this exact shape.</li>
<li>Hold onto the ownership question from §1.8 — it resurfaces, with much higher stakes, in Chapter 3 (memory models) and Chapter 12 (replication, where "who owns this piece of state" stops being a single-process question).</li>
</ul>

<div class="chapter-eyebrow"><span class="b">Part I — Foundations</span> / Chapter 2</div>
<h2 class="title">Computational Costs That Shape Every Design</h2>
<div class="deck">Every design decision in this book is secretly an answer to "where does the cost go." This chapter gives you the actual numbers, and shows why the same algorithm can be a fine choice or a production incident depending only on what you assumed about the data.</div>

<h3>2.1 — The latency numbers nobody memorizes but everyone needs</h3>
<p>Big-O notation tells you how a cost <em>grows</em>. It tells you nothing about the constant in front of it, and at system-design scale, the constant is where careers are made or broken. Below are the approximate orders of magnitude — not exact figures, which vary by hardware, but the ratios are what matter and they have stayed roughly stable for over a decade.</p>

<table>
<tr><th>Operation</th><th>Approx. latency</th><th>Relative to L1 cache</th></tr>
<tr><td>L1 cache reference</td><td>~1 ns</td><td>1×</td></tr>
<tr><td>L2 cache reference</td><td>~4 ns</td><td>4×</td></tr>
<tr><td>Main memory (RAM) reference</td><td>~100 ns</td><td>~100×</td></tr>
<tr><td>SSD random read</td><td>~100–150 μs</td><td>~100,000×</td></tr>
<tr><td>Round trip, same datacenter</td><td>~0.5 ms</td><td>~500,000×</td></tr>
<tr><td>Disk seek (spinning)</td><td>~10 ms</td><td>~10,000,000×</td></tr>
<tr><td>Round trip, cross-region (e.g. US ↔ Europe)</td><td>~100–150 ms</td><td>~100,000,000×</td></tr>
</table>

<p>Read that table as a single sentence: <strong>a cache miss that goes all the way to a cross-region network call is roughly one hundred million times slower than a cache hit.</strong> Nothing else in this chapter matters as much as that ratio being load-bearing in your intuition. Every architectural pattern you'll meet later — caching, replication, read replicas, CDNs, batching — exists purely to keep operations as far left on this table as possible.</p>

<div class="callout"><span class="lbl">Why C++/Rust learners often skip this</span>Coming from systems programming, you already have sharp intuition about L1 vs RAM (cache-friendly data layout, false sharing, etc.) — that's Level 3 in Chapter 1's terms. The jump this chapter asks you to make is treating "RAM vs SSD vs network" with the <em>same seriousness</em> you already give "L1 vs RAM." At system-design scale, a network hop is just a much slower cache miss.</div>

<h3>2.2 — Three cost axes, and why they trade against each other</h3>
<p>Every design decision spends one of three budgets, and improving one usually taxes another:</p>
<ul>
<li><strong>Latency</strong> — how long a single operation takes from the caller's perspective.</li>
<li><strong>Throughput</strong> — how many operations the system completes per unit time, in aggregate.</li>
<li><strong>Resource footprint</strong> — memory, CPU, disk, and the dollar cost behind all three.</li>
</ul>
<p>Batching is the clearest example of the trade: grouping 1,000 writes into one disk flush increases throughput and reduces resource cost per item, but increases the latency of the first item in the batch, since it now waits for the other 999. There is no version of batching that improves all three axes at once — and any design proposal that claims to should be treated as suspicious until you find the hidden cost.</p>

<h3>2.3 — Worked example: word frequency counting, two cost models</h3>
<p>Take a deliberately simple task — count word frequencies in a text file — and watch the "right" implementation change as only one assumption changes: <em>does the file fit in memory?</em></p>

<h4>Cost model A — file fits comfortably in RAM (megabytes)</h4>
<p>Read the whole file into one string, split, count. Simplicity wins; there is no resource pressure to optimize against, so spending engineering time on anything cleverer is itself a cost with no benefit.</p>

<h4>Cost model B — file does not fit in RAM (hundreds of GB, or unbounded stream)</h4>
<p>Loading the whole file is no longer "a simpler version of the same algorithm" — it's a different algorithm with a different failure mode (out-of-memory kill) for a problem that looks identical from the function signature. The fix is to never hold more than one line in memory at a time, paying a small constant overhead per line in exchange for an O(1) memory ceiling instead of O(n).</p>
<p>Both implementations below are written for cost model B — streaming, bounded memory — because model A is the version you'd write without this book. The interesting engineering is always in the version that has to respect a resource budget.</p>

<h3>2.4 — C++ reference implementation</h3>
<div class="codewin">
<div class="bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="fname">word_count.cpp</span></div>
<pre><code><span class="kw">#include</span> <span class="st">&lt;fstream&gt;</span>
<span class="kw">#include</span> <span class="st">&lt;sstream&gt;</span>
<span class="kw">#include</span> <span class="st">&lt;string&gt;</span>
<span class="kw">#include</span> <span class="st">&lt;unordered_map&gt;</span>
<span class="kw">#include</span> <span class="st">&lt;iostream&gt;</span>

<span class="cm">// Bounded-memory word count: at most one line lives in memory at a time.
// Peak memory is O(distinct words), never O(file size).</span>
<span class="ty">std::unordered_map</span>&lt;<span class="ty">std::string</span>, <span class="ty">long</span>&gt;
<span class="fn">count_words</span>(<span class="ty">const std::string&amp;</span> path) {
    <span class="ty">std::unordered_map</span>&lt;<span class="ty">std::string</span>, <span class="ty">long</span>&gt; counts;

<h3>2.6 — What each language's default cost you</h3>
<table>
<tr><th>Question</th><th>C++ default</th><th>Rust default</th></tr>

<tr><td>Cost of "getting it wrong"</td><td>A forgotten buffer reuse is a silent performance regression — code still compiles, still runs, just slower.</td><td>The unwanted allocation is structural, not accidental — it's visible in the signature, so "getting it wrong" mostly isn't possible without consciously dropping to a lower-level API.</td></tr>
</table>

<div class="callout"><span class="lbl">The recurring lesson</span>This is the same shape as Chapter 1's ownership comparison: C++ gives you a cheaper default with a discipline requirement attached; Rust gives you a safe default and makes you opt into the cheaper path explicitly. Neither is "winning" — you're choosing where the cost is allowed to hide.</div>

<h3>2.7 — What to carry forward</h3>
<ul>
<li>Before designing anything, ask which cost axis (latency, throughput, resource) the requirement actually cares about — most requirements only state one explicitly and leave the other two implicit.</li>
<li>The latency table in §2.1 is the lens for every later chapter on caching, replication, and CDNs — each of those patterns is, mechanically, an attempt to keep a hot path on the left side of that table.</li>
<li>"Same algorithm, different cost model" from §2.3 will reappear in Chapter 16 (databases) — an index is exactly this same trade, paying write cost to buy read cost down.</li>
</ul>

<div class="chapter-eyebrow"><span class="b">Part I — Foundations</span> / Chapter 3</div>
<h2 class="title">Memory Models: Stack, Heap, Ownership</h2>
<div class="deck">You already have strong stack/heap intuition from C++. This chapter uses that intuition as the baseline, then shows exactly what Rust's borrow checker is mechanically enforcing — not as new magic, but as a compile-time check for a bug class C++ leaves to you.</div>

<h3>3.1 — Stack and heap: what's actually different</h3>
<p>Strip away language syntax and there are only two real properties that distinguish stack from heap allocation:</p>
<ul>
<li><strong>Lifetime is implicit vs. explicit.</strong> A stack frame's contents die the instant the function returns — no decision required. A heap allocation lives until <em>something</em> explicitly decides to free it, whether that's a programmer's <code class="inline">delete</code>, a garbage collector's sweep, or a destructor firing when an owning value goes out of scope.</li>
<li><strong>Size must be known vs. can be unknown.</strong> The stack is a fixed-size region the compiler lays out at compile time — every local variable's size must be known then. The heap exists specifically to hold things whose size is only known at runtime, or that need to outlive the function that created them.</li>
</ul>
<p>Every memory bug you've ever debugged in C++ — use-after-free, double-free, leak — is a failure of the explicit half of that first bullet: something decided to free heap memory at the wrong time, or never decided at all. The entire chapter is about how different languages take that decision away from "whatever the programmer remembered to do" and give it to something more reliable.</p>

<h3>3.2 — Three families of answers to "who frees this memory"</h3>
<table>
<tr><th>Family</th><th>Mechanism</th><th>Cost</th></tr>
<tr><td>Manual</td><td>Programmer calls free/delete explicitly (raw C, early C++)</td><td>Zero runtime overhead; every bug class (UAF, double-free, leak) is possible and the compiler won't catch any of them.</td></tr>
<tr><td>Garbage collected</td><td>Runtime periodically scans for unreachable objects and frees them (Go, Java, Python)</td><td>No UAF/double-free by construction; pays for it in GC pause latency and runtime memory overhead.</td></tr>
<tr><td>Ownership / RAII</td><td>The compiler ties a deallocation to a scope boundary, statically (C++ RAII, Rust ownership)</td><td>No runtime GC cost; the discipline shifts to compile-time rules — C++ trusts you to follow them, Rust enforces them.</td></tr>
</table>
<p>C++ and Rust are in the <em>same family</em> — this surprises people who think of Rust as "safe" and C++ as "unsafe" in some fundamentally different category. Both tie deallocation to scope exit (RAII). The difference covered in this chapter is narrower and more interesting than "safe vs. unsafe": <strong>C++ lets you use a value after its owning resource has been moved away; Rust's compiler refuses to let that code build at all.</strong></p>

<h3>3.3 — C++ reference implementation: a minimal owning buffer</h3>

<div class="codewin">
<div class="bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="fname">buffer.hpp</span></div>

<span class="kw">#include</span> <span class="st">&lt;algorithm&gt;</span>

<span class="kw">class</span> <span class="ty">Buffer</span> {

<p>This is the central point of the chapter: <strong>the C++ program and the Rust program are attempting the identical mistake, written in an equally natural way.</strong> One produces undefined behavior at runtime that may or may not be caught by tests, sanitizers, or production traffic. The other is rejected before the binary exists. Rust hasn't avoided the bug class by being more careful — it has made the bug a static type error by tracking, for every value, whether it has been moved out of.</p>

<h3>3.5 — Opting back into the risk: unsafe Rust</h3>
<p>Rust's safety guarantee is not "this bug class is impossible in Rust" — it's "this bug class is impossible without writing the word <code class="inline">unsafe</code>." You can reconstruct the exact C++ behavior by dropping to raw pointers explicitly:</p>

<div class="codewin">
<div class="bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="fname">unsafe_buffer.rs</span></div>

        // compiler does not know — or check — whether \`data\` still
        // points at memory this RawBuffer logically owns.</span>
        *<span class="kw">self</span>.data.add(<span class="kw">self</span>.len) = value;
        <span class="kw">self</span>.len += <span class="nu">1</span>;
    }
}
<span class="cm">// Calling push_unchecked after a logical "move" of the owning struct
// is exactly the C++ bug from section 3.3 — now possible in Rust too,
// but only because \`unsafe\` was typed deliberately, by a human, at this
// specific line. It is searchable. The C++ version is not.</span>
</code></pre>

<div class="callout"><span class="lbl">The real takeaway</span><code class="inline">unsafe</code> in Rust doesn't turn off the borrow checker globally — it's a per-block opt-out that's <code class="inline">grep</code>-able across an entire codebase. "Where could this exact bug class exist?" has the answer "nowhere" in safe C++... except C++ has no safe/unsafe split, so the answer is always "everywhere, audit by hand." Rust narrows the search space to the parts of the codebase that say so.</div>

<h3>3.6 — Comparison table</h3>
<table>
<tr><th>Property</th><th>C++</th><th>Rust (safe subset)</th></tr>
<tr><td>Deallocation mechanism</td><td>RAII — destructor runs at scope exit</td><td>RAII — <code class="inline">Drop</code> runs at scope exit (same mechanism, different name)</td></tr>
<tr><td>Use-after-move</td><td>Compiles; moved-from object is "valid but unspecified" and usable</td><td>Compile error — moved-from bindings are statically tracked and rejected</td></tr>
<tr><td>Where the risk lives</td><td>Anywhere, implicitly — no marker distinguishes risky code from safe code</td><td>Only inside blocks/functions marked <code class="inline">unsafe</code> — searchable, auditable</td></tr>
<tr><td>Runtime cost of the guarantee</td><td>None — but the guarantee doesn't exist</td><td>None — the check is fully compile-time, no runtime tracking of "moved" state</td></tr>
</table>

<h3>3.7 — What to carry forward</h3>
<ul>
<li>"Ownership" isn't a Rust-only idea — C++'s RAII is the same family. What differs is whether the compiler verifies the rules or trusts you to follow them.</li>
<li>The use-after-move pattern in §3.3–3.4 is the single most common root cause behind the dangling-reference risk flagged back in Chapter 1, §1.6 — you now have the mechanical explanation for why that risk exists in C++ and doesn't in safe Rust.</li>
<li>Keep the <code class="inline">unsafe</code> boundary from §3.5 in mind for Chapter 29 and 30 (the C++ and Rust systems-programming capstones) — knowing exactly where a codebase opts out of its safety guarantees is a core skill for reviewing systems code in either language.</li>
</ul>

<div class="chapter-eyebrow"><span class="b">Part I — Foundations</span> / Chapter 4</div>
<h2 class="title">Concurrency Primitives, From the Ground Up</h2>
<div class="deck">A data race is not "your program might be slow" — it's undefined behavior, full stop. This chapter defines the term precisely, then shows the same shared-counter bug compiling silently in C++ and failing to compile at all in Rust.</div>

<h3>4.1 — What a data race actually is</h3>
<p>The term gets used loosely, so pin it down: a <strong>data race</strong> occurs when two or more threads access the same memory location concurrently, at least one of those accesses is a write, and there is no synchronization establishing an ordering between them. All three conditions must hold. Two threads only reading the same memory is fine. Two threads writing to different memory is fine. The dangerous combination is shared, concurrent, at-least-one-write, unordered.</p>
<p>The reason this matters more than "the result might be wrong" is that a data race is <strong>undefined behavior</strong> in both C++ and (safe) Rust's specification — the compiler is permitted to assume data races don't happen, and optimizes accordingly. A racy program isn't "occasionally wrong," it's a program the compiler was never obligated to reason about correctly in the first place. Reordering, caching a value in a register across iterations, or eliminating a load entirely are all legal compiler behaviors once a race is present.</p>

<h3>4.2 — The cost of synchronization</h3>
<p>Every fix for a data race spends some amount of the latency budget from Chapter 2 to buy correctness:</p>
<ul>
<li><strong>Mutexes</strong> serialize access entirely — only one thread proceeds at a time through the protected section. Cheap when uncontended (a few tens of nanoseconds), expensive under contention (threads block, get descheduled, and pay a context-switch cost that can run into microseconds).</li>
<li><strong>Atomics</strong> avoid blocking by using CPU-level instructions (compare-and-swap, fetch-and-add) that complete in a single, indivisible step. Cheaper than a mutex for simple operations like counters, but limited to operations the hardware actually supports atomically — you can't atomically update two unrelated fields at once.</li>
</ul>
<p>The choice between them is almost always "how much state needs to change together." One counter → atomic. A counter plus a related flag that must update consistently → mutex, because the hardware has no single instruction for "update these two unrelated things together."</p>

<h3>4.3 — C++ reference implementation: the race, then two fixes</h3>
<h4>The race</h4>
<div class="codewin">
<div class="bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="fname">race.cpp</span></div>
<pre><code><span class="kw">#include</span> <span class="st">&lt;thread&gt;</span>
<span class="kw">#include</span> <span class="st">&lt;vector&gt;</span>
<span class="kw">#include</span> <span class="st">&lt;iostream&gt;</span>

<span class="ty">int</span> counter = <span class="nu">0</span>;  <span class="cm">// shared, unsynchronized</span>

<span class="kw">void</span> <span class="fn">increment_many</span>() {
    <span class="kw">for</span> (<span class="ty">int</span> i = <span class="nu">0</span>; i &lt; <span class="nu">100000</span>; ++i) {
        counter++;  <span class="cm">// read-modify-write: three steps, not one.
                    // two threads can both read the same old value
                    // before either writes back the increment.</span>
    }
}

<span class="ty">int</span> <span class="fn">main</span>() {
    <span class="ty">std::vector</span>&lt;<span class="ty">std::thread</span>&gt; threads;
    <span class="kw">for</span> (<span class="ty">int</span> i = <span class="nu">0</span>; i &lt; <span class="nu">4</span>; ++i)
        threads.<span class="fn">emplace_back</span>(increment_many);
    <span class="kw">for</span> (<span class="kw">auto&amp;</span> t : threads) t.<span class="fn">join</span>();

    <span class="cm">// Expected 400000. Actual: compiles fine, runs fine, and prints
    // something less than 400000 — silently, with no error, no crash,
    // just a wrong answer. The exact number varies between runs.</span>
    <span class="ty">std::cout</span> &lt;&lt; counter &lt;&lt; <span class="st">"\n"</span>;
}
</code></pre>
</div>

<h4>Fix 1 — mutex</h4>
<div class="codewin">
<div class="bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="fname">mutex_fix.cpp</span></div>
<pre><code><span class="kw">#include</span> <span class="st">&lt;mutex&gt;</span>

<span class="ty">int</span> counter = <span class="nu">0</span>;
<span class="ty">std::mutex</span> counter_mutex;

<span class="kw">void</span> <span class="fn">increment_many</span>() {
    <span class="kw">for</span> (<span class="ty">int</span> i = <span class="nu">0</span>; i &lt; <span class="nu">100000</span>; ++i) {
        <span class="ty">std::lock_guard</span>&lt;<span class="ty">std::mutex</span>&gt; <span class="fn">guard</span>(counter_mutex);
        counter++;  <span class="cm">// only one thread inside this scope at a time</span>
    }  <span class="cm">// lock released automatically — RAII again, same mechanism
       // as Chapter 3's Buffer destructor</span>
}
</code></pre>
</div>

<h4>Fix 2 — atomic</h4>
<div class="codewin">
<div class="bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="fname">atomic_fix.cpp</span></div>
<pre><code><span class="kw">#include</span> <span class="st">&lt;atomic&gt;</span>

<span class="ty">std::atomic&lt;int&gt;</span> counter{<span class="nu">0</span>};

<span class="kw">void</span> <span class="fn">increment_many</span>() {
    <span class="kw">for</span> (<span class="ty">int</span> i = <span class="nu">0</span>; i &lt; <span class="nu">100000</span>; ++i) {
        counter.<span class="fn">fetch_add</span>(<span class="nu">1</span>, <span class="ty">std::memory_order_relaxed</span>);
        <span class="cm">// relaxed ordering is safe here: we only need the increment
        // itself to be atomic, not visibility ordering relative to
        // other memory operations — there are none in this example.</span>
    }
}
</code></pre>
</div>

<p>The detail to sit with: <strong>the racy version, the mutex version, and the atomic version are all valid, compiling C++.</strong> Nothing in the type of <code class="inline">int counter</code> tells the compiler, or you, that this variable is being shared across threads without protection. The race is a property of how the variable is <em>used</em>, invisible at its declaration.</p>

<h3>4.4 — Rust reference implementation</h3>
<p>Rust's answer starts one level higher than "remember to add a mutex" — it asks whether a type is allowed to cross a thread boundary at all, via two marker traits: <code class="inline">Send</code> (safe to move to another thread) and <code class="inline">Sync</code> (safe to share a reference across threads). A plain <code class="inline">i32</code> behind an ordinary reference does not satisfy what's needed to share mutable state across threads, and the compiler checks this before your program runs even once.</p>

<div class="codewin">
<div class="bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="fname">race_attempt.rs</span></div>
<pre><code><span class="kw">fn</span> <span class="fn">main</span>() {

        counter += <span class="nu">1</span>;   <span class="cm">// does not compile:

                          // owned by the current function
                          //
                          // the borrow checker refuses to let a spawned
                          // thread hold a reference that might outlive
                          // the stack frame \`counter\` lives in.</span>
    });
    handle.join().unwrap();
}
</code></pre>
</div>

<p>That rejection isn't even about the race yet — it's a lifetime error, because <code class="inline">thread::spawn</code> requires its closure to be <code class="inline">'static</code> (own everything it touches, borrow nothing from the caller's stack). The fix requires deliberately choosing a sharing strategy, which is where <code class="inline">Arc</code> and <code class="inline">Mutex</code> enter:</p>

<div class="codewin">
<div class="bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="fname">mutex_fix.rs</span></div>
<pre><code><span class="kw">use</span> std::sync::{Arc, Mutex};
<span class="kw">use</span> std::thread;

<span class="kw">fn</span> <span class="fn">main</span>() {

    <span class="kw">let mut</span> handles = Vec::new();

        handles.push(thread::spawn(<span class="kw">move</span> || {
            <span class="kw">for</span> _ <span class="kw">in</span> <span class="nu">0</span>..<span class="nu">100000</span> {
                <span class="kw">let mut</span> guard = counter.lock().unwrap();
                *guard += <span class="nu">1</span>;
            } <span class="cm">// lock released when \`guard\` drops — same RAII pattern again</span>
        }));
    }
    <span class="kw">for</span> h <span class="kw">in</span> handles { h.join().unwrap(); }

    println!(<span class="st">"{}"</span>, *counter.lock().unwrap()); <span class="cm">// always exactly 400000</span>
}
</code></pre>
</div>

<div class="bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="fname">atomic_fix.rs</span></div>
<pre><code><span class="kw">use</span> std::sync::Arc;

<span class="kw">use</span> std::thread;

<span class="kw">fn</span> <span class="fn">main</span>() {
    <span class="kw">let</span> counter = Arc::new(AtomicI32::new(<span class="nu">0</span>));
    <span class="kw">let mut</span> handles = Vec::new();

    <span class="kw">for</span> _ <span class="kw">in</span> <span class="nu">0</span>..<span class="nu">4</span> {
        <span class="kw">let</span> counter = Arc::clone(&amp;counter);
        handles.push(thread::spawn(<span class="kw">move</span> || {
            <span class="kw">for</span> _ <span class="kw">in</span> <span class="nu">0</span>..<span class="nu">100000</span> {
                counter.fetch_add(<span class="nu">1</span>, Ordering::Relaxed);
            }
        }));
    }
    <span class="kw">for</span> h <span class="kw">in</span> handles { h.join().unwrap(); }

    println!(<span class="st">"{}"</span>, counter.load(Ordering::Relaxed)); <span class="cm">// always exactly 400000</span>

<p>Notice <code class="inline">Mutex&lt;i32&gt;</code> in the second example: in Rust, a mutex doesn't sit <em>beside</em> the data it protects, as <code class="inline">std::mutex</code> does in C++ — it <strong>owns</strong> the data. There is no way to obtain access to the <code class="inline">i32</code> without going through <code class="inline">.lock()</code>, because the only path to the inner value is the guard the lock call returns. The C++ relationship between <code class="inline">counter</code> and <code class="inline">counter_mutex</code> in §4.3 is a convention — two separate variables you must remember to use together. The Rust relationship is structural — there is no second variable to forget to lock.</p>

<h3>4.5 — What each language's compiler catches</h3>
<table>
<tr><th>Scenario</th><th>C++</th><th>Rust</th></tr>
<tr><td>Shared mutable state with zero synchronization</td><td>Compiles. Race is silent until observed (or never observed, and ships).</td><td>Does not compile — <code class="inline">'static</code> and ownership rules reject the borrow before any sync strategy is even chosen.</td></tr>
<tr><td>Mutex protecting the wrong/no data</td><td>Possible — mutex and data are separate variables; nothing enforces they're used together.</td><td>Not possible in safe code — <code class="inline">Mutex&lt;T&gt;</code> owns its data; the only way to touch it is through the lock.</td></tr>
<tr><td>Forgetting to lock before reading</td><td>Compiles fine; reads the shared variable directly, racing with writers.</td><td>Not expressible — there is no unguarded path to a <code class="inline">Mutex</code>'s contents in safe code.</td></tr>
<tr><td>Cost of the guarantee</td><td>None enforced, so none paid — and none provided.</td><td>Zero runtime cost; the ownership/<code class="inline">Send</code>/<code class="inline">Sync</code> checks are fully compile-time, same as Chapter 3's move tracking.</td></tr>
</table>

<div class="callout"><span class="lbl">The pattern across three chapters now</span>Chapter 1: depend on an abstraction, and the compiler does or doesn't verify lifetime. Chapter 3: move a value, and the compiler does or doesn't catch reuse. Chapter 4: share state across threads, and the compiler does or doesn't catch unsynchronized access. It's the same story at every level — Rust keeps converting "discipline you must remember" into "a fact the type system checks." Hold onto this pattern; it's the lens for reading every future code comparison in this book.</div>

<h3>4.6 — What to carry forward</h3>
<ul>
<li>The three-condition definition of a data race in §4.1 (shared, concurrent, ≥1 write, unordered) is precise — use it to evaluate any "is this code thread-safe" question for the rest of the book, including the consensus and replication chapters in Part III, where the same question gets asked about distributed state instead of in-process state.</li>
<li>Mutex vs. atomic is a "how much state changes together" decision, not a "which is generally better" one — revisit §4.2 whenever a later chapter's case study needs a concurrency primitive.</li>
<li>Rust's <code class="inline">Mutex&lt;T&gt;</code>-owns-data design in §4.4 is worth remembering specifically: it's the same "push the invariant into the type" idea you'll see again in Chapter 9 (architecture) applied to module boundaries instead of locks.</li>
</ul>

<div class="chapter-eyebrow"><span class="b">Part II — Design Principles</span> / Chapter 5</div>
<h2 class="title">Coupling, Cohesion, and the SOLID Lie</h2>
<div class="deck">SOLID gets taught as five laws. Treated that way, it produces codebases with more interfaces than implementations. This chapter rebuilds it from the two properties that actually matter — coupling and cohesion — and shows where blind rule-following costs you more than it saves.</div>

<h3>5.1 — The two properties underneath all of architecture</h3>
<p>Almost every architectural principle you'll ever read reduces to managing two properties:</p>
<ul>
<li><strong>Coupling</strong> — how much one module needs to know about another to function. High coupling means a change in module A frequently forces a change in module B.</li>
<li><strong>Cohesion</strong> — how strongly the responsibilities inside one module belong together. High cohesion means a module has one reason to change; low cohesion means it has several, unrelated ones.</li>
</ul>
<p>The goal is always <strong>low coupling, high cohesion</strong> — modules that don't need to know much about each other, and that each do one coherent thing. Every pattern in this book, from the logger interface in Chapter 1 to the consensus protocols in Part III, is a specific technique for moving a system toward that corner.</p>

<h3>5.2 — SOLID, briefly and honestly</h3>
<table>
<tr><th>Letter</th><th>States</th><th>What it's actually buying you</th></tr>
<tr><td><strong>S</strong>ingle Responsibility</td><td>A module should have one reason to change.</td><td>Cohesion, directly. The most useful and most misquoted letter — "one reason to change" gets flattened into "one method per class," which is not the same claim.</td></tr>
<tr><td><strong>O</strong>pen/Closed</td><td>Open for extension, closed for modification.</td><td>A specific coupling reduction: new behavior shouldn't require editing existing, tested code. Achieved via the same dependency-on-abstraction shape as Chapter 1's logger.</td></tr>
<tr><td><strong>L</strong>iskov Substitution</td><td>Subtypes must be usable wherever their base type is expected.</td><td>A correctness constraint on inheritance, not really a coupling/cohesion lever — it's what keeps Open/Closed from silently breaking callers.</td></tr>
<tr><td><strong>I</strong>nterface Segregation</td><td>Don't force a client to depend on methods it doesn't use.</td><td>Coupling reduction at the interface boundary — a large interface couples every implementer to every method, whether they need it or not.</td></tr>
<tr><td><strong>D</strong>ependency Inversion</td><td>Depend on abstractions, not concretions.</td><td>The mechanism that makes Open/Closed possible. This is, mechanically, exactly what Chapter 1's <code class="inline">ILogger</code>/<code class="inline">Logger</code> trait did.</td></tr>
</table>
<p>Notice the overlap: Open/Closed is largely achieved <em>through</em> Dependency Inversion, and Liskov is a precondition for Open/Closed not silently producing bugs. Five "independent" principles are really two ideas (reduce coupling, increase cohesion) and a correctness constraint, restated five times at different zoom levels.</p>

<h3>5.3 — Where the lie is</h3>
<p>The lie isn't that these principles are wrong — each one, applied where it earns its cost, genuinely improves a codebase. The lie is in how they're taught: as five context-free laws to apply everywhere, rather than five heuristics whose value depends entirely on whether the thing they protect against is actually likely to happen.</p>
<p>Dependency Inversion has a real cost: an interface, a second concrete type to satisfy it (even if there's only ever going to be one implementation), and a layer of indirection between the call site and the code that runs. That cost is worth paying when you genuinely expect multiple implementations, need to substitute a fake in tests, or need to defer a decision. It is <em>not</em> worth paying for a type that will only ever have one implementation and is never tested in isolation — that's not architecture, it's ceremony. Experienced engineers call this <strong>speculative generality</strong>: building the extension point before there's a second thing to extend to.</p>
<div class="callout"><span class="lbl">A useful test</span>Before introducing an interface for Dependency Inversion's sake, ask: "do I have a concrete, current reason to expect a second implementation, or am I protecting against a future that may never arrive?" If the honest answer is the second one, you're paying Open/Closed's cost for a benefit you don't yet have a claim on.</div>

<h3>5.4 — Worked example: a god object, then a decoupled version</h3>
<p>The clearest way to see coupling and cohesion is to watch a single class violate both, then fix both with the same refactor. The example: an order-processing function that validates, charges a payment, updates inventory, and sends a notification — all inline.</p>

<h3>5.6 — When this exact refactor isn't worth it</h3>
<p>If <code class="inline">OrderProcessor</code> will only ever have one payment provider, is only ever tested through a full integration test anyway, and no one on the team plans to swap providers — the "before" version, while uglier, is not wrong. The interfaces in §5.4–5.5 cost three extra types, three extra files, and one more level of indirection to read through when debugging. That cost is real and constant; the benefit is conditional on substitution or isolated testing actually happening. Apply Dependency Inversion when you can name the second implementation or the test that needs the seam — not by default.</p>

<h3>5.7 — What to carry forward</h3>
<ul>
<li>Reduce every SOLID letter back to coupling, cohesion, or a correctness constraint on inheritance (§5.2) — it's a faster, more honest way to evaluate whether a principle applies to the code in front of you than reciting the acronym.</li>

<li>Chapter 9 (architecture styles) builds directly on §5.4–5.5: layered and hexagonal architecture are this same dependency-inversion shape applied at the boundary of an entire application instead of one class.</li>
</ul>

    }
    <span class="ty">HttpClientBuilder&amp;</span> <span class="fn">retries</span>(<span class="ty">int</span> n) {
        client_.retries_ = n; <span class="kw">return</span> *<span class="kw">this</span>;
    }
    <span class="ty">HttpClientBuilder&amp;</span> <span class="fn">auth_token</span>(<span class="ty">std::string</span> token) {
        client_.auth_token_ = <span class="ty">std::move</span>(token); <span class="kw">return</span> *<span class="kw">this</span>;
    }
    <span class="ty">HttpClient</span> <span class="fn">build</span>() {
        <span class="kw">if</span> (client_.retries_ &lt; <span class="nu">0</span>)
            <span class="kw">throw</span> <span class="ty">std::invalid_argument</span>(<span class="st">"retries cannot be negative"</span>);
        <span class="kw">return</span> client_;  <span class="cm">// validated once, here — not scattered across call sites</span>
    }
<span class="kw">private</span>:
    <span class="ty">HttpClient</span> client_;
};

<span class="cm">// auto client = HttpClientBuilder("https://api.example.com")
//                   .timeout(std::chrono::milliseconds(3000))
//                   .retries(3)
//                   .build();</span>
</code></pre>
</div>

<p>In C++, the builder is one option among several — named-argument-style construction is also achievable with designated initializers (C++20) for simple aggregate types with no validation. The builder earns its place specifically because of the validation step in <code class="inline">build()</code>; without that, it's ceremony around what a struct literal could do.</p>

<div class="codewin">
<div class="bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="fname">http_client_builder.rs</span></div>
<pre><code><span class="kw">pub struct</span> <span class="ty">HttpClient</span> {
    base_url: <span class="ty">String</span>,
    timeout_ms: u64,
    retries: u32,
    auth_token: Option&lt;<span class="ty">String</span>&gt;,
}

<span class="kw">pub struct</span> <span class="ty">HttpClientBuilder</span> {
    base_url: <span class="ty">String</span>,
    timeout_ms: u64,
    retries: u32,
    auth_token: Option&lt;<span class="ty">String</span>&gt;,
}

<span class="kw">impl</span> <span class="ty">HttpClientBuilder</span> {
    <span class="kw">pub fn</span> <span class="fn">new</span>(base_url: impl Into&lt;<span class="ty">String</span>&gt;) -&gt; <span class="ty">Self</span> {
        <span class="ty">Self</span> {
            base_url: base_url.into(),
            timeout_ms: <span class="nu">5000</span>,
            retries: <span class="nu">0</span>,
            auth_token: <span class="ty">None</span>,
        }
    }
    <span class="cm">// \`mut self\` consumes and returns the builder by value — each call
    // is a move, not a mutation through a reference. This is the
    // idiomatic Rust builder shape, and it exists for a reason C++
    // doesn't need to think about: it makes half-built states
    // unrepresentable across threads, since a builder mid-chain can't
    // be shared while it's being consumed.</span>
    <span class="kw">pub fn</span> <span class="fn">timeout_ms</span>(<span class="kw">mut self</span>, ms: u64) -&gt; <span class="ty">Self</span> {
        <span class="kw">self</span>.timeout_ms = ms; <span class="kw">self</span>
    }
    <span class="kw">pub fn</span> <span class="fn">retries</span>(<span class="kw">mut self</span>, n: u32) -&gt; <span class="ty">Self</span> {
        <span class="kw">self</span>.retries = n; <span class="kw">self</span>
    }
    <span class="kw">pub fn</span> <span class="fn">auth_token</span>(<span class="kw">mut self</span>, token: impl Into&lt;<span class="ty">String</span>&gt;) -&gt; <span class="ty">Self</span> {
        <span class="kw">self</span>.auth_token = Some(token.into()); <span class="kw">self</span>
    }
    <span class="kw">pub fn</span> <span class="fn">build</span>(<span class="kw">self</span>) -&gt; <span class="ty">HttpClient</span> {
        <span class="cm">// retries is u32 here, not i32 — "cannot be negative" is enforced
        // by the type itself, not by a runtime check. One fewer
        // validation branch than the C++ version, for free.</span>
        <span class="ty">HttpClient</span> {
            base_url: <span class="kw">self</span>.base_url,
            timeout_ms: <span class="kw">self</span>.timeout_ms,
            retries: <span class="kw">self</span>.retries,
            auth_token: <span class="kw">self</span>.auth_token,
        }
    }
}

<span class="cm">// let client = HttpClientBuilder::new("https://api.example.com")
//     .timeout_ms(3000)
//     .retries(3)
//     .build();</span>
</code></pre>
</div>
<p>The builder pattern is far more central to idiomatic Rust than to idiomatic C++, for a structural reason: C++ has default arguments and constructor overloading, so a moderate number of optional parameters can be handled without a separate builder type at all. Rust has neither — no default arguments, no overloading — so once a type has more than two or three optional fields, the builder isn't one option among several, it's close to the only ergonomic one.</p>

<h3>6.4 — Singleton: the pattern that solves a real problem and is usually still wrong</h3>
<p>The problem Singleton solves is real: some things — a logging sink, a metrics registry, a connection pool — genuinely should have exactly one instance for the lifetime of a process. The pattern's reputation as an anti-pattern doesn't come from that problem being fake; it comes from how Singleton solves it: global, ambient access from anywhere in the codebase, with no record of which code depends on it.</p>
<p>That ambient access is the same coupling problem from Chapter 5, in its worst form — every caller of <code class="inline">MetricsRegistry::instance()</code> has a hidden dependency that doesn't show up in any function signature, can't be swapped for a test double without a global override hack, and creates implicit ordering requirements (what if something runs before the singleton initializes?).</p>

<div class="codewin">
<div class="bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="fname">metrics_singleton.hpp</span></div>
<pre><code><span class="kw">class</span> <span class="ty">MetricsRegistry</span> {
<span class="kw">public</span>:
    <span class="kw">static</span> <span class="ty">MetricsRegistry&amp;</span> <span class="fn">instance</span>() {
        <span class="cm">// Meyer's singleton: thread-safe initialization is guaranteed by
        // the C++11 standard for function-local statics — no manual
        // locking needed, unlike pre-C++11 double-checked locking.</span>
        <span class="kw">static</span> <span class="ty">MetricsRegistry</span> instance;
        <span class="kw">return</span> instance;
    }
    <span class="kw">void</span> <span class="fn">increment</span>(<span class="ty">const std::string&amp;</span> key) { counts_[key]++; }
<span class="kw">private</span>:
    <span class="fn">MetricsRegistry</span>() = <span class="kw">default</span>;
    <span class="ty">std::unordered_map</span>&lt;<span class="ty">std::string</span>, <span class="ty">long</span>&gt; counts_;
};

<span class="cm">// Anywhere in the codebase, with no signature change required:
// MetricsRegistry::instance().increment("orders.processed");
//
// That last line is the entire problem: any function can reach into
// global state with zero indication, at the call site or in the
// function's signature, that it has this dependency.</span>
</code></pre>
</div>

<div class="codewin">
<div class="bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="fname">metrics_singleton.rs</span></div>
<pre><code><span class="kw">use</span> std::sync::OnceLock;
<span class="kw">use</span> std::sync::Mutex;
<span class="kw">use</span> std::collections::HashMap;

<span class="kw">static</span> METRICS: OnceLock&lt;Mutex&lt;HashMap&lt;String, u64&gt;&gt;&gt; = OnceLock::new();

<span class="kw">pub fn</span> <span class="fn">increment</span>(key: &amp;<span class="kw">str</span>) {
    <span class="kw">let</span> registry = METRICS.get_or_init(|| Mutex::new(HashMap::new()));
    *registry.lock().unwrap().entry(key.to_string()).or_insert(<span class="nu">0</span>) += <span class="nu">1</span>;
}

<span class="cm">// OnceLock gives the same lazy, thread-safe initialization as Meyer's
// singleton, with no library dependency needed. The ambient-access
// problem from the C++ version is identical here: increment() can be
// called from anywhere with no signature trace of the dependency.
// Rust's safety guarantees don't touch this kind of coupling at all —
// they protect against data races and use-after-free, not against
// hidden architectural dependencies. This is a discipline problem in
// both languages, equally.</span>
</code></pre>
</div>

<div class="callout"><span class="lbl">The better default</span>For the cases Singleton is reached for — one logger, one metrics registry, one connection pool — construct the instance once, at the composition root (near <code class="inline">main</code>), and pass it down through constructors, exactly like <code class="inline">PaymentGateway</code> in Chapter 5. The "exactly one instance" property is preserved by simply not constructing a second one — it doesn't require global, ambient access to get there. This is more typing and it is worth it: every dependency becomes visible in a signature, and every test can substitute its own instance without a global-state workaround.</div>

<h3>6.5 — Comparison: what each language's defaults push you toward</h3>
<table>
<tr><th>Pattern</th><th>C++ tendency</th><th>Rust tendency</th></tr>
<tr><td>Factory</td><td>One option among several (overloads, default args often suffice for simpler cases)</td><td>Reached for whenever a type can't be known until runtime — <code class="inline">dyn Trait</code> is the natural return type</td></tr>
<tr><td>Builder</td><td>Used when validation or fluent chaining is specifically wanted; default args cover plain optional-parameter cases</td><td>The default way to construct any type with more than a couple of optional fields, since there's no overloading or default arguments to fall back on</td></tr>
<tr><td>Singleton</td><td>Meyer's singleton is the idiomatic, thread-safe form; the ambient-access problem is unaddressed by the language</td><td><code class="inline">OnceLock</code>/<code class="inline">Lazy</code> gives the same mechanism; the ambient-access problem is equally unaddressed — Rust's safety guarantees don't apply to architectural coupling</td></tr>
</table>

<h3>6.6 — What to carry forward</h3>
<ul>
<li>Run every creational pattern through Chapter 5's speculative-generality test before reaching for it: a factory without a real runtime decision, or a builder without real validation, is ceremony with the same names attached.</li>
<li>Rust's missing default arguments and overloading aren't a limitation to work around case-by-case — they're why the builder pattern shows up so much more often in idiomatic Rust than idiomatic C++. Expect this in every Rust library you read from here forward.</li>
<li>Singleton's real lesson carries into Chapter 9 (architecture styles) and Part III (distributed systems): "exactly one instance" and "globally, ambiently accessible" are two separate properties that get bundled together by habit. Keep them separate — you'll need that distinction again when a later chapter asks whether a piece of state should be a singleton per-process or a single source of truth across an entire distributed system, which is a very different problem wearing the same name.</li>
</ul>

<h3>7.1 — Composition over modification</h3>
<p>Every pattern in this chapter answers a version of the same question: "I need this type to behave differently, or fit somewhere it doesn't currently fit — do I change the type, or wrap it?" Wrapping wins whenever the type is third-party code you can't change, code you don't want to risk changing, or code that other callers depend on staying exactly as it is. The cost is always one more layer of indirection; the benefit is that the original type stays untouched and independently testable.</p>

<h3>7.2 — Adapter: reconciling an interface you don't control</h3>
<p>Suppose your team licenses a legacy payment SDK with its own interface — different method names, different error handling, no relationship to your <code class="inline">PaymentGateway</code> abstraction from Chapter 5. You cannot change the SDK. The Adapter pattern writes one small class whose only job is translating between the SDK's shape and the shape the rest of your code already depends on.</p>

<p>Now suppose every <code class="inline">PaymentGateway</code> call should retry once on failure and log the outcome — but you don't want to duplicate that logic inside every implementation (Stripe, PayPal, the legacy adapter). Decorator wraps an existing implementation of an interface with another implementation of the <em>same</em> interface, adding behavior before or after delegating to the wrapped instance.</p>

<p>Decorator and Adapter look structurally similar — both wrap one type inside another implementing the same or a related interface — but they solve different problems. Adapter exists because the wrapped type's interface doesn't match what you need. Decorator exists because the wrapped type's interface already matches, and you're adding behavior around it, not translating it.</p>

<h3>7.4 — Facade: one simple entry point over several moving parts</h3>
<p>By this point in the example, "checking out an order" requires constructing a payment gateway, wrapping it in a retry decorator, wiring up inventory and notification, and calling <code class="inline">process</code>. A Facade collects that orchestration behind one method, so calling code doesn't need to know the subsystem exists in pieces at all.</p>

<p>A facade is the one pattern in this chapter that adds no new abstraction at all — it doesn't define a new interface other code depends on, it just narrows an existing, more flexible API down to the few entry points most callers actually need. The flexible version underneath stays available for callers who do need it.</p>

<h3>7.6 — Comparison: where each language's rules change the shape</h3>
<table>
<tr><th>Pattern</th><th>What forces the same code in both languages</th><th>Where Rust adds a constraint C++ doesn't have</th></tr>
<tr><td>Adapter</td><td>Both need a class/struct implementing the target interface, wrapping the source type</td><td>Rust's orphan rule can make the adapter mandatory, not optional, for foreign trait/type pairs</td></tr>
<tr><td>Decorator</td><td>Both delegate to a wrapped instance of the same interface</td><td>Rust must choose generic-vs-<code class="inline">dyn</code> explicitly per use; C++ virtual dispatch is the default either way</td></tr>
<tr><td>Facade</td><td>Identical shape: one class narrowing several dependencies to one method</td><td>None — this pattern is language-agnostic by nature</td></tr>
<tr><td>Composite</td><td>Both require dynamic dispatch for a heterogeneous tree of concrete types</td><td>None structurally; Rust requires <code class="inline">Box&lt;dyn Trait&gt;</code> explicitly where C++ allows raw/smart pointers to the base class interchangeably</td></tr>
</table>

<h3>7.7 — What to carry forward</h3>
<ul>
<li>Adapter vs. Decorator is a frequent point of confusion — the test is "does the wrapped type's interface already match what I need" (Decorator) or "does it not" (Adapter), not how the code looks.</li>

<li>Composite's need for dynamic dispatch in §7.5 is the same constraint Chapter 6's factory hit — heterogeneous collections of types implementing one interface are the recurring case where <code class="inline">dyn Trait</code> stops being optional in Rust.</li>
</ul>

<h3>8.1 — What behavioral patterns actually manage</h3>
<p>Where Chapter 7's patterns answered "how do these types fit together," behavioral patterns answer "how does control and data flow between them at runtime." The shared concern is <strong>varying behavior without varying the caller</strong> — the caller keeps calling the same method, and what actually happens changes based on strategy, state, or a chain of handlers decided elsewhere.</p>

<h3>8.2 — Strategy: swapping an algorithm without touching the caller</h3>
<p>Discount calculation from Chapter 7 already has this shape, but Strategy names it explicitly: define an interface for "a way of doing X," implement several, and let the caller pick one without knowing the others exist. The clean test for Strategy versus a plain if/else is whether the number of variants is expected to grow, or differ by configuration/customer/region — if there are only ever going to be two fixed branches, an if/else is more honest than an interface.</p>

<h3>8.3 — Observer: decoupling "something happened" from "who cares"</h3>
<p>When an order completes, several unrelated things may need to happen — update analytics, send a notification, refresh a dashboard cache. Chaining all of them inline inside <code class="inline">OrderProcessor</code> would drag Chapter 5's cohesion problem right back in. Observer instead lets <code class="inline">OrderProcessor</code> announce "order completed" without knowing or caring who's listening.</p>

<h3>8.4 — State: letting an object's behavior change with its own lifecycle</h3>
<p>An order isn't always "processable" — it moves through <code class="inline">Pending → Paid → Shipped → Delivered</code>, and some operations are only valid in some states (you can't ship an unpaid order). The naive implementation is a flag or enum checked with if/else at the top of every method. State pattern instead gives each state its own type, implementing only the transitions that are actually valid from that state.</p>

<div class="codewin">
<div class="bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="fname">order_state.rs</span></div>

<span class="kw">pub struct</span> <span class="ty">Pending</span>;
<span class="kw">pub struct</span> <span class="ty">Paid</span>;
<span class="kw">pub struct</span> <span class="ty">Shipped</span>;

<p>This variant — called the <strong>typestate pattern</strong> — is where Rust genuinely does something C++ cannot do as cleanly. The classic Gang-of-Four State pattern (a runtime pointer to a "current state" object, switched via virtual dispatch) works fine in both languages and is what you'd reach for in C++. But encoding the state <em>in the type itself</em>, so invalid transitions are a compile error rather than a caught exception, needs Rust's ownership model — each transition method must consume <code class="inline">self</code> by value, which prevents the old state from being reused after a transition, which is exactly the use-after-move protection from Chapter 3 repurposed as a state machine guarantee.</p>

<div class="codewin">
<div class="bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="fname">order_state.hpp</span></div>
<pre><code><span class="cm">// The C++ equivalent: classic GoF State, checked at runtime.
// Transitions are still possible to call in an invalid order — the
// method exists on every OrderContext regardless of current state,
// and only a runtime check (or exception) catches the misuse.</span>
<span class="kw">enum class</span> <span class="ty">OrderState</span> { Pending, Paid, Shipped };

<span class="kw">class</span> <span class="ty">OrderContext</span> {
<span class="kw">public</span>:
    <span class="kw">void</span> <span class="fn">pay</span>() {
        <span class="kw">if</span> (state_ != <span class="ty">OrderState</span>::Pending)
            <span class="kw">throw</span> <span class="ty">std::logic_error</span>(<span class="st">"cannot pay: order not pending"</span>);
        state_ = <span class="ty">OrderState</span>::Paid;
    }
    <span class="kw">void</span> <span class="fn">ship</span>() {
        <span class="kw">if</span> (state_ != <span class="ty">OrderState</span>::Paid)
            <span class="kw">throw</span> <span class="ty">std::logic_error</span>(<span class="st">"cannot ship: order not paid"</span>);
        state_ = <span class="ty">OrderState</span>::Shipped;
    }
<span class="kw">private</span>:
    <span class="ty">OrderState</span> state_ = <span class="ty">OrderState</span>::Pending;
};
<span class="cm">// order.ship(); // compiles fine even if order is still Pending —
//               // fails at runtime instead, via a thrown exception.</span>
</code></pre>
</div>

<h3>8.5 — What each version actually catches, and when to use which</h3>
<table>
<tr><th>Approach</th><th>Invalid transition caught</th><th>Cost</th></tr>
<tr><td>C++ runtime state check</td><td>At runtime, via exception — only if that code path is exercised</td><td>Low — one enum, no extra types</td></tr>
<tr><td>Rust typestate (§8.4)</td><td>At compile time — an invalid call is a build error, full stop</td><td>Higher — one struct type per state, transitions must consume <code class="inline">self</code>, harder to store a heterogeneous collection of "orders in any state" in one <code class="inline">Vec</code></td></tr>
</table>
<p>Typestate isn't strictly better — it's a trade of flexibility for a stronger guarantee. A <code class="inline">Vec&lt;Order&lt;???&gt;&gt;</code> holding orders in mixed states needs an enum wrapping each variant anyway, which gives some of the runtime-check cost back. Reach for typestate when the state machine is small, the invalid-transition bug is genuinely costly, and callers rarely need to store mixed-state collections; reach for the runtime-checked version — in either language — otherwise.</p>

<h3>8.6 — What to carry forward</h3>
<ul>
<li>Strategy is Chapter 6's factory pattern with the runtime-selected concrete type used repeatedly rather than once — the same generic-vs-<code class="inline">dyn</code> reasoning applies.</li>
<li>Observer's synchronous, in-process limitation from §8.3 is the exact seam where Part III's message-queue chapters pick up — hold onto "what breaks when a network sits between producer and consumer" as the bridge between this chapter and that one.</li>
<li>The typestate pattern in §8.4 is a specific, powerful application of Chapter 3's move semantics — recognizing "this is just ownership tracking, repurposed" is what makes typestate feel natural instead of like new magic the next time you meet it.</li>
</ul>
