<div class="chapter-eyebrow"><span class="b">Part VIII — Specialized Storage &amp; Data Systems</span> / Chapter 32</div>
<h2 class="title">B-Trees and LSM-Trees: Database Internals</h2>
<div class="deck">Volume I's Chapter 16 treated databases from the outside — SQL vs. NoSQL, schema enforcement. This chapter opens them up: what data structure actually sits on disk, and why every real database engine is built on one of exactly two competing answers.</div>

<h3>32.1 — The question every storage engine answers the same way, differently</h3>
<p>Underneath any database — relational or not — sits a storage engine solving one core problem: keep a large, sorted or indexable collection of key-value pairs on disk, support fast point lookups and range scans, and do it all while respecting Chapter 2's brutal cost gap between RAM and disk (§2.1's table: a disk seek is roughly 10,000,000x slower than an L1 cache hit). Two data structures dominate real-world storage engines, and they make opposite bets about where to spend that cost: the <strong>B-tree</strong>, which optimizes for reads by keeping data sorted in place, and the <strong>LSM-tree</strong> (Log-Structured Merge-tree), which optimizes for writes by deferring the cost of sorting.</p>

<h3>32.2 — B-trees: the read-optimized default</h3>
<p>A B-tree is a balanced, multi-way search tree where each node holds many keys (not just one or two, unlike a binary search tree) — sized specifically so that one node fills exactly one disk page (commonly 4KB or 8KB). This sizing choice is a direct application of Chapter 2's cost model: since a disk read costs roughly the same whether it fetches one byte or a full page, a B-tree node is deliberately packed with as many keys as fit in one page, so a single disk read retrieves dozens or hundreds of keys' worth of navigation information at once — minimizing the number of expensive disk seeks needed to find any given key, which is exactly what a tree with only 2 children per node (a binary tree) would waste, needing far more levels and far more seeks for the same number of keys.</p>
<p>Inserting into a B-tree means finding the correct sorted position and inserting in place — cheap when the target page has room, expensive when it's full and must <strong>split</strong> into two pages, an operation that can cascade upward if the parent page is also full. This in-place, sorted-on-disk structure is precisely why B-trees are read-optimized: a lookup or range scan touches a small, predictable number of pages, all already in the correct sorted order — no reconstruction needed at read time. The cost is paid on the write side instead, in the occasional expensive page split.</p>

<h3>32.3 — LSM-trees: the write-optimized alternative</h3>
<p>An LSM-tree makes the opposite bet: rather than paying sorting cost on every write, it defers sorting entirely. Writes go first into an in-memory sorted structure (a <strong>memtable</strong> — commonly a balanced tree or skip list), which is fast because it's pure memory, no disk seek at all. When the memtable reaches a size threshold, it's flushed to disk as an immutable, sorted file (an <strong>SSTable</strong> — Sorted String Table) — a pure sequential write, which Chapter 2's cost model favors heavily over the random-access writes a B-tree's in-place updates require, since sequential disk writes avoid the seek cost entirely and only pay the much cheaper throughput cost.</p>
<div class="codewin">
<div class="bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="fname">lsm_memtable.rs — the write path, made concrete</span></div>
<pre><code><span class="kw">use</span> std::collections::BTreeMap;

<span class="cm">// BTreeMap keeps entries sorted by key automatically -- the same
// standard-library structure Chapter 12, section 12.5's consistent
// hash ring used for its ring positions, reused here for a different
// reason: sorted iteration order is what makes flushing to an SSTable
// a simple linear write, with no separate sort step required.</span>
<span class="kw">pub struct</span> <span class="ty">Memtable</span> {
    entries: BTreeMap&lt;<span class="ty">String</span>, Option&lt;<span class="ty">String</span>&gt;&gt;, <span class="cm">// None = tombstone (a deletion, see 32.4)</span>
    size_bytes: usize,
    flush_threshold: usize,
}

<span class="kw">impl</span> <span class="ty">Memtable</span> {
    <span class="kw">pub fn</span> <span class="fn">set</span>(&amp;<span class="kw">mut self</span>, key: <span class="ty">String</span>, value: <span class="ty">String</span>) {
        <span class="kw">self</span>.size_bytes += key.len() + value.len();
        <span class="kw">self</span>.entries.insert(key, Some(value)); <span class="cm">// pure in-memory write -- no disk
            // I/O on this path at all, which is the entire source of
            // an LSM-tree's write-speed advantage over a B-tree's
            // in-place, on-disk update</span>
    }

    <span class="kw">pub fn</span> <span class="fn">should_flush</span>(&amp;<span class="kw">self</span>) -&gt; bool {
        <span class="kw">self</span>.size_bytes &gt;= <span class="kw">self</span>.flush_threshold
    }

    <span class="cm">// Producing a flushable, already-sorted sequence -- BTreeMap's
    // iteration order IS sorted key order, so this requires no sort
    // step; it's a direct, sequential write target for an SSTable.</span>
    <span class="kw">pub fn</span> <span class="fn">iter_sorted</span>(&amp;<span class="kw">self</span>) -&gt; <span class="kw">impl</span> Iterator&lt;Item = (&amp;<span class="ty">String</span>, &amp;Option&lt;<span class="ty">String</span>&gt;)&gt; {
        <span class="kw">self</span>.entries.iter()
    }
}
</code></pre>
</div>

<h3>32.4 — Tombstones: why deletion in an LSM-tree can't just remove data</h3>
<p>Since SSTables are immutable once written, deleting a key can't mean "find and erase the byte" the way a B-tree's in-place update could — the key might exist in several already-flushed, immutable SSTables. Instead, a delete writes a <strong>tombstone</strong> — a marker recording "this key is deleted as of this point" — into the current memtable, exactly like a normal write. A later read checks SSTables newest-to-oldest and stops at the first entry found for a key, whether that entry is a real value or a tombstone; finding a tombstone first means the key is correctly reported as deleted even though the actual old value still physically exists in an older file somewhere on disk.</p>

<h3>32.5 — Compaction: paying the deferred cost back</h3>
<p>Deferring sort cost to flush time doesn't eliminate it — it accumulates. Over time, many SSTables pile up, each individually sorted but not sorted <em>relative to each other</em>, and a single key lookup might need to check several of them (newest-first, per §32.4) before finding — or definitively not finding — a match. <strong>Compaction</strong> periodically merges multiple SSTables into fewer, larger ones, using exactly the k-way merge algorithm Chapter 22, §22.4 built for combining sorted feed sources — SSTables are already individually sorted, so merging several into one larger sorted file is the same min-heap-based merge, applied to database files instead of social media posts. Compaction also permanently drops any key whose newest entry is a tombstone once no older SSTable could still be checked for it, finally reclaiming the space a deleted key's old values were holding.</p>
<div class="callout"><span class="lbl">The trade-off, stated the way Chapter 2 would state it</span>An LSM-tree buys fast, sequential writes by deferring sort cost to background compaction — paid later, off the write path, at the cost of reads needing to check multiple SSTables (mitigated by Bloom filters, §32.6) and needing compaction to run at all, consuming background I/O and CPU. A B-tree buys predictable, single-structure reads by paying sort cost immediately, on every write, in the form of occasional page splits. Neither is free — this is Chapter 2's core lesson, applied to the literal internals of how a database stores bytes.</div>

<h3>32.6 — Bloom filters: cheaply answering "definitely not present"</h3>
<p>Checking several SSTables per read (§32.5's cost) is wasteful when most of them don't contain the key being looked up at all. A <strong>Bloom filter</strong> is a compact, probabilistic structure attached to each SSTable that can answer "is this key definitely absent from this file?" with certainty, or "might this key be present?" with a small, tunable false-positive rate — never a false negative. Checking a Bloom filter is cheap (a few hash computations, no disk I/O), letting a read skip any SSTable the filter confirms can't contain the key, dramatically reducing how many SSTables actually need a real, expensive lookup.</p>
<div class="codewin">
<div class="bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="fname">bloom_filter.rs — minimal version, the core idea</span></div>
<pre><code><span class="kw">pub struct</span> <span class="ty">BloomFilter</span> {
    bits: Vec&lt;bool&gt;,
    num_hashes: u32,
}

<span class="kw">impl</span> <span class="ty">BloomFilter</span> {
    <span class="kw">pub fn</span> <span class="fn">new</span>(size_bits: usize, num_hashes: u32) -&gt; <span class="ty">Self</span> {
        <span class="ty">Self</span> { bits: <span class="kw">vec!</span>[<span class="kw">false</span>; size_bits], num_hashes }
    }

    <span class="cm">// Sets num_hashes different bit positions -- deliberately using
    // several INDEPENDENT hash functions (simulated here by salting
    // one hash function with a different seed per round) so that a
    // false positive requires every one of those positions to
    // collide with some OTHER key's insert, which becomes
    // exponentially less likely as num_hashes increases.</span>
    <span class="kw">pub fn</span> <span class="fn">insert</span>(&amp;<span class="kw">mut self</span>, key: &amp;<span class="kw">str</span>) {
        <span class="kw">for</span> seed <span class="kw">in</span> <span class="nu">0</span>..<span class="kw">self</span>.num_hashes {
            <span class="kw">let</span> pos = <span class="kw">self</span>.hash_with_seed(key, seed) % <span class="kw">self</span>.bits.len();
            <span class="kw">self</span>.bits[pos] = <span class="kw">true</span>;
        }
    }

    <span class="cm">// If ANY of the num_hashes positions is unset, the key was
    // DEFINITELY never inserted -- that's a hard guarantee, not a
    // probability, because insert() always sets every position for a
    // real key. If ALL positions happen to be set, the key MIGHT be
    // present -- or another combination of other keys happened to set
    // the same bits, a false positive. This asymmetry (no false
    // negatives, some false positives) is exactly what makes it safe
    // to trust a Bloom filter's "no" and merely a hint on its "maybe."</span>
    <span class="kw">pub fn</span> <span class="fn">might_contain</span>(&amp;<span class="kw">self</span>, key: &amp;<span class="kw">str</span>) -&gt; bool {
        (<span class="nu">0</span>..<span class="kw">self</span>.num_hashes).all(|seed| {
            <span class="kw">let</span> pos = <span class="kw">self</span>.hash_with_seed(key, seed) % <span class="kw">self</span>.bits.len();
            <span class="kw">self</span>.bits[pos]
        })
    }

    <span class="kw">fn</span> <span class="fn">hash_with_seed</span>(&amp;<span class="kw">self</span>, key: &amp;<span class="kw">str</span>, seed: u32) -&gt; usize {
        <span class="kw">use</span> std::hash::{Hash, Hasher};
        <span class="kw">let mut</span> h = std::collections::hash_map::DefaultHasher::new();
        (key, seed).hash(&amp;<span class="kw">mut</span> h);
        h.finish() <span class="kw">as</span> usize
    }
}
</code></pre>
</div>
<p>This is the exact "trade exactness for cost" family Chapters 15 and 20 named for eviction and rate-limiting — a Bloom filter trades perfect accuracy (it can false-positive, never false-negative) for O(1), no-disk-I/O membership checks, and every real LSM-tree implementation (LevelDB, RocksDB, Cassandra's storage engine) relies on one per SSTable specifically because §32.5's multi-file read cost would otherwise be unacceptable at scale.</p>

<h3>32.7 — Choosing between them: revisiting Chapter 16's framework one level deeper</h3>
<table>
<tr><th>Workload</th><th>Better fit</th><th>Why</th></tr>
<tr><td>Read-heavy, infrequent writes</td><td>B-tree</td><td>Reads touch a small, predictable set of already-sorted pages; write cost (occasional splits) is paid rarely enough not to matter</td></tr>
<tr><td>Write-heavy, high ingest rate</td><td>LSM-tree</td><td>Writes are pure sequential I/O with no immediate sort cost; read cost is mitigated by Bloom filters and bounded by compaction keeping SSTable count manageable</td></tr>
<tr><td>Range scans dominant</td><td>B-tree, generally</td><td>Data is continuously sorted in one structure; an LSM-tree's range scan must merge across multiple SSTables even after Bloom filters rule out irrelevant ones for point lookups, since filters don't help range queries the same way</td></tr>
</table>
<p>This is Chapter 16, §16.6's decision framework, one layer beneath where that chapter left it: Chapter 16 asked "SQL or NoSQL" based on schema and relationships; this chapter asks "B-tree or LSM-tree" based on read/write ratio, and the two questions are genuinely independent — PostgreSQL (relational, B-tree-based) and Cassandra (wide-column, LSM-tree-based) sit at different points on both axes simultaneously, and a design choosing between them should reason about both, not conflate schema strictness with storage-engine internals as though they were the same decision.</p>

<h3>32.8 — What to carry forward</h3>
<ul>
<li>B-tree versus LSM-tree (§32.7) is Chapter 2's cost model at its most concrete — every real production database engine is a specific, deliberate answer to "pay sort cost now, on writes, or later, in the background" — and recognizing which one a given database uses immediately tells you its actual read/write performance character, regardless of what its marketing materials emphasize.</li>
<li>Compaction's reuse of Chapter 22's k-way merge (§32.5) is this book's clearest demonstration yet that "the same algorithm reappears in unrelated-looking domains" isn't a coincidence — the shape (combine several sorted sources efficiently) is identical whether the sources are social media posts or database files.</li>
<li>Bloom filters (§32.6) are worth remembering as a generally reusable tool, not an LSM-tree-specific trick — any time a system needs a cheap, no-I/O "can I skip this expensive check" pre-filter with tolerable false positives and zero false negatives, this is the structure, and it will reappear in later chapters of this volume wherever set-membership testing needs to stay cheap at scale.</li>
</ul>

<div class="chapter-eyebrow"><span class="b">Part VIII — Specialized Storage &amp; Data Systems</span> / Chapter 33</div>
<h2 class="title">Search Systems and Inverted Indices</h2>
<div class="deck">"Find every document containing this word" is a query shape none of Volume I's storage engines handle well. This chapter builds the structure that does, and shows that its scaling story reuses Chapter 32's compaction and Chapter 12's partitioning almost unchanged.</div>

<h3>33.1 — Why B-trees and LSM-trees don't solve this</h3>
<p>Chapter 32's structures are both optimized for "find the value for this exact key" or "scan a sorted range of keys" — neither is built for "find every document that contains this word," which requires searching <em>inside</em> values, not just looking values up by key. The naive approach — scan every document's full text on every query — is O(total document size) per query, and Chapter 2's cost model says that's untenable at any real scale: a million-document corpus means a million document reads for every single search term, when the vast majority of documents don't contain the term at all.</p>

<h3>33.2 — The inverted index: reversing the natural mapping</h3>
<p>A document's natural representation is <code class="inline">document_id → text</code>. An <strong>inverted index</strong> flips this: <code class="inline">term → list of document IDs containing that term</code> (a <strong>postings list</strong>). Once built, "find every document containing 'rust'" becomes a single lookup into the index by the term <code class="inline">"rust"</code>, returning its postings list directly — no document scanning at query time at all, the entire cost was paid once, up front, at indexing time.</p>

<h3>33.3 — Building it: tokenize, index, and intersect</h3>
<div class="codewin">
<div class="bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="fname">inverted_index.rs</span></div>
<pre><code><span class="kw">use</span> std::collections::{BTreeMap, HashSet};

<span class="cm">// BTreeMap again -- sorted term order isn't strictly required for
// correctness here, but it makes postings lists easy to keep sorted
// by document ID, which section 33.3's intersection algorithm below
// depends on for its efficiency.</span>
<span class="kw">pub struct</span> <span class="ty">InvertedIndex</span> {
    postings: BTreeMap&lt;<span class="ty">String</span>, Vec&lt;u32&gt;&gt;, <span class="cm">// term -> sorted document IDs</span>
    doc_count: u32,
    <span class="cm">// term -> number of DISTINCT documents containing it -- needed for
    // TF-IDF's inverse-document-frequency component, section 33.4</span>
    doc_frequency: BTreeMap&lt;<span class="ty">String</span>, u32&gt;,
}

<span class="cm">// Deliberately simplified tokenizer -- lowercase, split on
// non-alphanumeric characters. A production tokenizer additionally
// handles stemming (running/runs/ran -> run) and stop-word removal
// (the/a/is), both omitted here to keep the indexing shape visible,
// in the same spirit as every simplified implementation since
// Chapter 11.</span>
<span class="kw">fn</span> <span class="fn">tokenize</span>(text: &amp;<span class="kw">str</span>) -&gt; Vec&lt;<span class="ty">String</span>&gt; {
    text.to_lowercase()
        .split(|c: <span class="kw">char</span>| !c.is_alphanumeric())
        .filter(|s| !s.is_empty())
        .map(|s| s.to_string())
        .collect()
}

<span class="kw">impl</span> <span class="ty">InvertedIndex</span> {
    <span class="kw">pub fn</span> <span class="fn">new</span>() -&gt; <span class="ty">Self</span> {
        <span class="ty">Self</span> { postings: BTreeMap::new(), doc_count: <span class="nu">0</span>, doc_frequency: BTreeMap::new() }
    }

    <span class="kw">pub fn</span> <span class="fn">index_document</span>(&amp;<span class="kw">mut self</span>, doc_id: u32, text: &amp;<span class="kw">str</span>) {
        <span class="kw">self</span>.doc_count += <span class="nu">1</span>;
        <span class="kw">let</span> unique_terms: HashSet&lt;<span class="ty">String</span>&gt; = tokenize(text).into_iter().collect();
        <span class="kw">for</span> term <span class="kw">in</span> unique_terms {
            <span class="kw">self</span>.postings.entry(term.clone()).or_insert_with(Vec::new).push(doc_id);
            *<span class="kw">self</span>.doc_frequency.entry(term).or_insert(<span class="nu">0</span>) += <span class="nu">1</span>;
        }
        <span class="cm">// Real implementations keep postings sorted incrementally, or sort
        // once at index-build time -- omitted here since doc_id is
        // assumed to increase monotonically as documents are added,
        // which keeps push() alone sufficient to maintain sort order.</span>
    }

    <span class="cm">// AND query: documents containing EVERY term. Postings lists are
    // sorted, so this is a classic sorted-list intersection -- the
    // same merge-style algorithmic shape as Chapter 22's k-way feed
    // merge and Chapter 32's SSTable compaction, applied here to find
    // common elements instead of combining all elements.</span>
    <span class="kw">pub fn</span> <span class="fn">search_and</span>(&amp;<span class="kw">self</span>, terms: &amp;[&amp;<span class="kw">str</span>]) -&gt; Vec&lt;u32&gt; {
        <span class="kw">let mut</span> lists: Vec&lt;&amp;Vec&lt;u32&gt;&gt; = <span class="kw">match</span> terms.iter()
            .map(|t| <span class="kw">self</span>.postings.get(&amp;t.to_lowercase()))
            .collect::&lt;Option&lt;Vec&lt;_&gt;&gt;&gt;() {
            Some(lists) =&gt; lists,
            <span class="ty">None</span> =&gt; <span class="kw">return</span> Vec::new(), <span class="cm">// any missing term means zero possible matches</span>
        };
        lists.sort_by_key(|l| l.len()); <span class="cm">// intersect starting from the SHORTEST list --
            // pure optimization, doesn't change correctness, just
            // shrinks the candidate set as early as possible</span>

        <span class="kw">let mut</span> result = lists[<span class="nu">0</span>].clone();
        <span class="kw">for</span> list <span class="kw">in</span> &amp;lists[<span class="nu">1</span>..] {
            <span class="kw">let</span> set: HashSet&lt;<span class="nu">_</span>&gt; = list.iter().collect();
            result.retain(|id| set.contains(id));
        }
        result
    }
}
</code></pre>
</div>
<p>The intersection's sort-by-shortest-list-first optimization is worth naming explicitly: it doesn't change the algorithm's correctness or asymptotic behavior, only its practical constant factor — starting from the smallest candidate set means every subsequent filtering pass has less work to do, the same "reduce the working set as early as possible" instinct that motivated Bloom filters in Chapter 32, §32.6, applied here without needing a probabilistic structure at all, since exact postings lists are already available.</p>

<h3>33.4 — Beyond boolean matching: relevance ranking with TF-IDF</h3>
<p>§33.3's <code class="inline">search_and</code> returns matching documents with no notion of <em>how well</em> each one matches — real search needs ranking. <strong>TF-IDF</strong> (Term Frequency–Inverse Document Frequency) is the classic scoring approach, built from two ideas multiplied together: <strong>term frequency</strong> — how often the search term appears in this specific document, since a document mentioning "rust" ten times is plausibly more about Rust than one mentioning it once — and <strong>inverse document frequency</strong> — a term appearing in nearly every document (like "the") carries little discriminating value, while a term appearing in only a handful of documents is a much stronger signal when found, so its weight is scaled up in inverse proportion to how common it is across the whole corpus (using <code class="inline">doc_frequency</code>, already tracked in §33.3's index). The modern refinement, <strong>BM25</strong>, adjusts this same core idea with saturation (a term's tenth occurrence in a document matters much less than its second) and document-length normalization (a long document naturally contains more word occurrences, which shouldn't automatically win purely from length) — the same underlying signal, tuned to better match real-world relevance judgments.</p>

<h3>33.5 — Segment-based architecture: Chapter 32's compaction, applied to search</h3>
<p>Real search engines (Lucene, which underlies Elasticsearch and Solr) don't update one giant mutable index in place — they build immutable <strong>segments</strong>, each a self-contained mini-index over a batch of newly indexed documents, and periodically merge smaller segments into larger ones in the background. This is structurally identical to Chapter 32, §32.3–32.5's LSM-tree design: memtable-equivalent in-memory buffering, immutable flushed segments in place of SSTables, and background merging that reuses the same k-way-merge shape as Chapter 32's compaction — applied here to combining postings lists across segments instead of combining sorted key-value ranges. Recognizing this isn't a coincidence: both designs are solving the identical underlying problem (accept writes cheaply and sequentially, defer the cost of full reorganization to background work) for different kinds of indexed data.</p>

<h3>33.6 — Scaling: sharding an index, reusing Chapter 12 directly</h3>
<p>A corpus too large for one machine's index needs partitioning, and Chapter 12's two real strategies both apply, with different trade-offs specific to search: <strong>document-based sharding</strong> (each shard holds a complete index over a subset of documents, chosen via Chapter 12, §12.4's consistent hashing on document ID) means a search query must fan out to every shard and merge results — Chapter 22's k-way merge again — but indexing a new document only touches one shard. <strong>Term-based sharding</strong> (each shard owns a subset of the vocabulary, so all postings for "rust" live on one specific shard regardless of which document they came from) means a single-term query touches exactly one shard, but indexing one document that uses many different terms must write to many shards at once. This is Chapter 12, §12.1's replication-versus-partitioning distinction wearing new stakes: document-based sharding optimizes the write path, term-based sharding optimizes single-term queries, and most production search systems (Elasticsearch included) default to document-based sharding specifically because indexing throughput usually matters more than any single query's shard-fanout cost.</p>

<h3>33.7 — What to carry forward</h3>
<ul>
<li>The inverted index (§33.2) is this book's cleanest example yet of "invert the natural data direction to make the actual query cheap" — worth checking against any future O(n)-per-query design as a general question: is there a mapping to precompute that turns the expensive direction into a cheap lookup?</li>
<li>Postings-list intersection (§33.3) is the fourth appearance of the sorted-merge algorithmic shape in this book (after Chapter 17's stream ordering, Chapter 22's feed merge, Chapter 32's compaction) — worth treating as a standing tool, not a search-specific trick.</li>
<li>Segment-based search architecture (§33.5) being structurally identical to an LSM-tree is worth holding onto specifically: the next time an unfamiliar system's design is described as "immutable segments with background merging," recognize it immediately as this same shape, regardless of what domain it's applied to.</li>
</ul>

<div class="chapter-eyebrow"><span class="b">Part VIII — Specialized Storage &amp; Data Systems</span> / Chapter 34</div>
<h2 class="title">Time-Series and Specialized Storage Engines</h2>
<div class="deck">Closing Part VIII. Chapter 26's metrics were time-series data the whole time, described without naming the storage problem underneath. This chapter names it, shows why LSM-trees are a near-perfect fit for the write pattern, and builds the compression technique that makes the read pattern affordable.</div>

<h3>34.1 — What makes time-series data a distinct category</h3>
<p>Time-series data — a sequence of (timestamp, value) points for a named series, like CPU usage or request latency — has a genuinely distinct access pattern from the general key-value workloads Chapter 32 covered: it's overwhelmingly <strong>append-only</strong> (old points are essentially never updated), arrives in roughly <strong>chronological order</strong> (new writes have the newest timestamps, almost always), and is queried almost exclusively by <strong>time range</strong> ("show me this metric over the last hour") rather than by point lookup. Chapter 26's metrics — every counter, gauge, and latency histogram — were time-series data the entire time, described there purely from the observability-consumer side; this chapter is about the storage engine underneath systems like Prometheus, InfluxDB, or TimescaleDB that actually persist those points at the volume Chapter 26 implied (thousands of series, each sampled every few seconds, indefinitely).</p>

<h3>34.2 — Why LSM-trees are a near-perfect fit, with one twist</h3>
<p>Time-series writes match Chapter 32, §32.3's LSM-tree write path almost exactly: new points arrive in roughly sorted (time) order, get buffered in memory, and flush to disk sequentially — no in-place updates, no page splits, the exact workload LSM-trees optimize for. The twist is on the read side: Chapter 32, §32.7 suggested range-scan-heavy workloads generally favor B-trees, but time-series systems are range-scan-heavy <em>and</em> overwhelmingly LSM-based in practice (Prometheus, InfluxDB, Cassandra-backed time-series stores) — because a time-series range scan has a property generic range scans don't: it's a scan over one specific, contiguous time window, and if data is flushed in write order (which is naturally time order here), each SSTable already corresponds to a contiguous time range, making a time-window query touch only the SSTables whose range overlaps the query — not a full multi-SSTable merge the way an arbitrary-key range scan would need. Time-series data's natural write order and natural query pattern happen to align, which is precisely why this specific workload escapes Chapter 32's general read-pattern caution.</p>

<h3>34.3 — Compression: delta encoding, built concretely</h3>
<p>Storing each point as a raw 8-byte timestamp plus an 8-byte value is wasteful at time-series volume specifically because consecutive points are highly predictable: a metric sampled every second has timestamps exactly 1,000ms apart, almost always, and values that usually change by a small amount from one sample to the next rather than jumping randomly. <strong>Delta encoding</strong> exploits this by storing the <em>difference</em> from the previous point instead of the raw value — small numbers compress far better than large, high-entropy ones.</p>
<div class="codewin">
<div class="bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="fname">delta_encoding.rs</span></div>
<pre><code><span class="cm">// Delta-of-delta timestamp encoding: if a metric is sampled at a
// near-constant interval (very common -- every 1000ms, say), the
// FIRST delta between consecutive timestamps is ~1000 every time, and
// the delta OF THAT delta -- how much the interval itself changed --
// is very often exactly 0. Storing "0, 0, 0, 0, 1, 0, 0..." compresses
// dramatically better than storing the raw timestamps directly, using
// standard byte-level compression on top of this encoding.</span>
<span class="kw">pub struct</span> <span class="ty">DeltaEncoder</span> {
    <span class="kw">prev_timestamp</span>: <span class="ty">Option</span>&lt;i64&gt;,
    prev_delta: i64,
    <span class="kw">pub</span> encoded: Vec&lt;i64&gt;, <span class="cm">// the delta-of-delta stream, ready for downstream compression</span>
}

<span class="kw">impl</span> <span class="ty">DeltaEncoder</span> {
    <span class="kw">pub fn</span> <span class="fn">new</span>() -&gt; <span class="ty">Self</span> {
        <span class="ty">Self</span> { prev_timestamp: <span class="ty">None</span>, prev_delta: <span class="nu">0</span>, encoded: Vec::new() }
    }

    <span class="kw">pub fn</span> <span class="fn">push</span>(&amp;<span class="kw">mut self</span>, timestamp: i64) {
        <span class="kw">match self</span>.prev_timestamp {
            <span class="ty">None</span> =&gt; {
                <span class="kw">self</span>.encoded.push(timestamp); <span class="cm">// first point stored raw -- there's
                    // no prior point to delta against yet</span>
            }
            Some(prev) =&gt; {
                <span class="kw">let</span> delta = timestamp - prev;
                <span class="kw">let</span> delta_of_delta = delta - <span class="kw">self</span>.prev_delta;
                <span class="kw">self</span>.encoded.push(delta_of_delta); <span class="cm">// usually 0, occasionally small --
                    // exactly the low-entropy stream general-purpose
                    // compression (e.g. gzip, or a purpose-built
                    // variable-length integer encoding) handles well</span>
                <span class="kw">self</span>.prev_delta = delta;
            }
        }
        <span class="kw">self</span>.prev_timestamp = Some(timestamp);
    }

    <span class="cm">// Reconstructs the original timestamps from the delta-of-delta
    // stream -- decoding is the exact inverse walk, accumulating
    // deltas back up rather than differencing them down.</span>
    <span class="kw">pub fn</span> <span class="fn">decode</span>(encoded: &amp;[i64]) -&gt; Vec&lt;i64&gt; {
        <span class="kw">if</span> encoded.is_empty() { <span class="kw">return</span> Vec::new(); }
        <span class="kw">let mut</span> result = <span class="kw">vec!</span>[encoded[<span class="nu">0</span>]];
        <span class="kw">let mut</span> delta = <span class="nu">0</span>;
        <span class="kw">for</span> &amp;dod <span class="kw">in</span> &amp;encoded[<span class="nu">1</span>..] {
            delta += dod;
            result.push(result.last().unwrap() + delta);
        }
        result
    }
}
</code></pre>
</div>
<p>The values (not just timestamps) benefit from an analogous idea: rather than delta-of-delta, production time-series compression (the technique behind Facebook's Gorilla in-memory time-series format, a well-known real-world design in this space) XORs each floating-point value against the previous one and stores only the differing bits — since consecutive sensor readings or metric values are often numerically close, most of their bit patterns are identical, and XOR against the previous value leaves mostly zero bits, which compresses extremely well. The underlying principle is identical to §34.3's timestamp delta-of-delta: exploit the fact that consecutive points in a time series are usually similar to each other, and encode the small difference instead of the large raw value.</p>

<h3>34.4 — Downsampling and retention: Chapter 15's TTL, applied to resolution instead of existence</h3>
<p>Storing every point at full 1-second resolution forever is rarely necessary or affordable — a dashboard showing a year-long trend doesn't need per-second granularity, and the storage cost of keeping it would be enormous for no corresponding benefit. Time-series systems apply <strong>downsampling</strong>: keep full resolution for a recent window (say, 24 hours), then progressively aggregate older data into coarser resolutions (1-minute averages for the last month, 1-hour averages beyond that), discarding the original fine-grained points once they age past the window that needs them. This is Chapter 15, §15.2's TTL eviction policy, applied to <em>resolution</em> rather than existence — instead of a cache entry simply expiring and disappearing, a time-series point "expires" from full resolution into a coarser, aggregated form, following the exact same "data past a certain age is worth less, so pay less to keep it" reasoning Chapter 15 applied to cache entries.</p>

<h3>34.5 — What to carry forward, and closing Part VIII</h3>
<ul>
<li>Time-series storage (§34.2) is a case where a general rule from an earlier chapter (Chapter 32, §32.7's "range scans favor B-trees") has a specific, important exception — worth remembering as a caution against applying general storage-engine guidance without checking whether the specific access pattern's structure (here, write-order and query-order alignment) changes the calculus.</li>
<li>Delta encoding (§34.3) is a specific instance of a broader compression principle worth generalizing: when consecutive data points are predictably similar, encode the difference, not the raw value — the same idea reappears in version control diffs, video compression (encoding frame-to-frame changes), and network protocol optimizations, all solving the identical underlying problem of exploiting redundancy between neighboring data.</li>
<li>Downsampling (§34.4) closes Part VIII by connecting directly back to Chapter 26 — the metrics systems described there as consumers of time-series data are now understood from the storage side as well, completing a loop this book opened without naming it explicitly at the time.</li>
</ul>

<div class="chapter-eyebrow"><span class="b">Part IX — Parallel and Hardware-Aware Computing</span> / Chapter 35</div>
<h2 class="title">Lock-Free and Wait-Free Data Structures</h2>
<div class="deck">Chapter 4 chose between mutexes and atomics per-operation. This chapter builds an entire data structure — a stack — using only atomics, and is precise about exactly what guarantee that buys, because "lock-free" is a specific, checkable claim, not a synonym for "fast."</div>

<h3>35.1 — Three precise guarantees, not one vague one</h3>
<p>These terms get used loosely enough that "lock-free" often just means "doesn't use a mutex," which misses the actual, checkable guarantee each term names:</p>
<table>
<tr><th>Guarantee</th><th>Precise meaning</th><th>What a plain mutex gives</th></tr>
<tr><td>Obstruction-free</td><td>A thread makes progress if it runs with no interference from other threads — the weakest useful guarantee</td><td>Not even this — a thread holding a lock that gets descheduled blocks every other thread indefinitely, regardless of interference</td></tr>
<tr><td>Lock-free</td><td>System-wide progress is guaranteed — at any point, at least ONE thread is making progress, even if some individual threads are repeatedly forced to retry</td><td>None — Chapter 14, §14.6-adjacent risk: a thread holding a lock that stalls (descheduled, crashed, or slow) can stall every other thread waiting on it, system-wide</td></tr>
<tr><td>Wait-free</td><td>EVERY thread makes progress within a bounded number of steps, regardless of what other threads do — the strongest, hardest-to-achieve guarantee</td><td>None</td></tr>
</table>
<p>A mutex gives none of these three guarantees — it gives mutual exclusion (only one thread in the critical section at a time), which is a different property entirely, and one that comes with the specific risk named in the table: a single slow or stalled lock-holder blocks everyone, the same class of cascading-stall problem Chapter 14, §14.7 described for retry storms, now happening inside one process instead of across a network.</p>

<h3>35.2 — Building a lock-free stack: the Treiber stack</h3>
<p>The canonical lock-free structure, built directly on the compare-and-swap primitive Chapter 20, §20.3 used for the token bucket — but here CAS drives an entire data structure's core operations, not just a single counter.</p>
<div class="codewin">
<div class="bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="fname">treiber_stack.rs</span></div>
<pre><code><span class="kw">use</span> std::sync::atomic::{AtomicPtr, Ordering};
<span class="kw">use</span> std::ptr;

<span class="kw">struct</span> <span class="ty">Node</span>&lt;T&gt; { value: T, next: *<span class="kw">mut</span> Node&lt;T&gt; }

<span class="kw">pub struct</span> <span class="ty">TreiberStack</span>&lt;T&gt; { head: AtomicPtr&lt;Node&lt;T&gt;&gt; }

<span class="kw">impl</span>&lt;T&gt; <span class="ty">TreiberStack</span>&lt;T&gt; {
    <span class="kw">pub fn</span> <span class="fn">new</span>() -&gt; <span class="ty">Self</span> { <span class="ty">Self</span> { head: AtomicPtr::new(ptr::null_mut()) } }

    <span class="kw">pub fn</span> <span class="fn">push</span>(&amp;<span class="kw">self</span>, value: T) {
        <span class="kw">let</span> new_node = Box::into_raw(Box::new(Node { value, next: ptr::null_mut() }));
        <span class="kw">loop</span> {
            <span class="kw">let</span> current_head = <span class="kw">self</span>.head.load(Ordering::Acquire);
            <span class="cm">// SAFETY: new_node was just created by this thread and not yet
            // published to any other thread -- writing to it here is
            // sound, no other thread can observe it until the CAS
            // below succeeds and makes it the new head.</span>
            <span class="kw">unsafe</span> { (*new_node).next = current_head; }
            <span class="cm">// The same compare-and-swap-loop shape as Chapter 20's token
            // bucket: attempt the swap, retry with a fresh read if
            // another thread changed head first. "Some thread always
            // makes progress" is exactly this loop's guarantee -- a
            // thread that loses the race simply retries, and the
            // thread that WON never has to wait on anyone.</span>
            <span class="kw">match self</span>.head.compare_exchange_weak(
                current_head, new_node, Ordering::Release, Ordering::Relaxed
            ) {
                Ok(_) =&gt; <span class="kw">return</span>,
                Err(_) =&gt; <span class="kw">continue</span>,
            }
        }
    }

    <span class="kw">pub fn</span> <span class="fn">pop</span>(&amp;<span class="kw">self</span>) -&gt; Option&lt;T&gt; {
        <span class="kw">loop</span> {
            <span class="kw">let</span> current_head = <span class="kw">self</span>.head.load(Ordering::Acquire);
            <span class="kw">if</span> current_head.is_null() { <span class="kw">return None</span>; }
            <span class="cm">// SAFETY (see section 35.3 -- this line is exactly where the
            // ABA problem lives): current_head is read here, but by
            // the time compare_exchange_weak runs below, ANOTHER
            // thread could have popped this exact node, freed it, and
            // a fourth thread could have allocated a NEW node at the
            // same memory address. This read of \`.next\` may be
            // reading freed or reused memory.</span>
            <span class="kw">let</span> next = <span class="kw">unsafe</span> { (*current_head).next };
            <span class="kw">match self</span>.head.compare_exchange_weak(
                current_head, next, Ordering::Release, Ordering::Relaxed
            ) {
                Ok(_) =&gt; {
                    <span class="kw">let</span> node = <span class="kw">unsafe</span> { Box::from_raw(current_head) }; <span class="cm">// reclaim ownership</span>
                    <span class="kw">return</span> Some(node.value);
                }
                Err(_) =&gt; <span class="kw">continue</span>,
            }
        }
    }
}
</code></pre>
</div>
<p>This structure is <strong>lock-free</strong>, not wait-free — a thread's CAS can fail and force a retry indefinitely, in principle, if it's consistently unlucky against faster concurrent threads, but at every moment, some thread's CAS is succeeding, so the system as a whole always makes progress even if a specific unlucky thread's individual progress isn't bounded. This is precisely §35.1's distinction made concrete rather than abstract.</p>

<h3>35.3 — The ABA problem: the pitfall named directly in the code above</h3>
<p>The SAFETY comment inside <code class="inline">pop</code> names a real, classic bug class: a thread reads <code class="inline">head</code> as pointing to node A, gets preempted before its CAS runs, and while it's paused, another thread pops A, then pops the next node B, then happens to push a <em>new</em> node that gets allocated at A's now-freed memory address (memory allocators frequently reuse recently-freed addresses). When the original thread resumes, its CAS compares against A's address — which matches, because the new node landed at the same address — and succeeds, even though the stack's actual structure changed completely underneath it. The CAS can't tell "the value is still A" apart from "the value went A → B → (something else) → back to an address that happens to equal A" — this is the <strong>ABA problem</strong>, and it's the single most notorious pitfall in lock-free programming, precisely because it's invisible to the CAS operation itself, which only ever compares raw values.</p>
<div class="callout"><span class="lbl">Why this book doesn't build the full fix</span>Production solutions — hazard pointers (each thread publishes which nodes it's currently accessing, so reclamation defers freeing them until no thread references them) and epoch-based reclamation (memory is freed only after every thread has passed a synchronization point proving it can no longer hold a stale reference) — are substantial pieces of machinery in their own right, well beyond what a single chapter section can build soundly. In practice, Rust's <code class="inline">crossbeam</code> crate provides both as battle-tested library code specifically so individual projects don't need to reimplement this correctly from scratch — the standard, sensible choice for real lock-free code, in the same spirit as Chapter 11 building only Raft's leader election directly and pointing to production implementations for the rest.</div>

<h3>35.4 — When this is actually worth the risk</h3>
<p>Applying Chapter 5's speculative-generality test one more time, at its sharpest edge yet: lock-free structures are dramatically harder to get correct than a mutex-protected equivalent — the ABA problem alone represents a whole category of subtle bug that a mutex-based version simply cannot have, since a mutex serializes access completely and never exposes intermediate, partially-updated state to a concurrent reader at all. The concrete case for reaching past a mutex, following Chapter 28's discipline directly: a profiler (Chapter 28, §28.2) has shown measured lock contention as an actual bottleneck — threads are provably spending significant time blocked waiting for this specific lock — not a guess that a hot-looking data structure "might" benefit. Chapter 4, §4.2 already established that an uncontended mutex is cheap; lock-free's real advantage only appears under genuine contention, and adopting lock-free code's correctness risk without that measured justification is paying Chapter 5's speculative-generality cost in its most dangerous form yet — bugs that are famously difficult to reproduce, since they depend on precise, rare thread-interleaving timing.</p>

<h3>35.5 — What to carry forward</h3>
<ul>
<li>Lock-free, wait-free, and obstruction-free (§35.1) are three genuinely different, checkable guarantees — treat "lock-free" as a specific claim about system-wide progress, not a loose synonym for "uses atomics" or "is fast."</li>
<li>The ABA problem (§35.3) is worth remembering as a named, specific failure mode — any time raw pointer values are compared via CAS without additional protection (a tag, a hazard pointer, an epoch), that comparison is vulnerable to it, regardless of how the surrounding code looks otherwise correct.</li>
<li>§35.4's contention-measured-first discipline is Chapter 28's process applied to its highest-stakes case yet in this book — hold it as the standing rule for lock-free code specifically: profile first, always, given how much harder these bugs are to find after the fact compared to a mutex-based alternative.</li>
</ul>

<div class="chapter-eyebrow"><span class="b">Part IX — Parallel and Hardware-Aware Computing</span> / Chapter 36</div>
<h2 class="title">SIMD, Vectorization, and Data-Oriented Design</h2>
<div class="deck">Chapter 28, §28.4 said contiguous memory is cache-friendly. This chapter shows it's more than that — for a specific class of numeric workload, contiguous layout is the difference between a loop the CPU can parallelize internally and one it can't, regardless of cache behavior at all.</div>

<h3>36.1 — What SIMD actually is: a throughput lever Chapter 2 didn't cover</h3>
<p><strong>SIMD</strong> (Single Instruction, Multiple Data) is a CPU capability where one instruction operates on several values simultaneously — a single SIMD addition can add four or eight pairs of floats in the time a normal scalar addition adds one pair. This is a genuinely different throughput lever than anything Chapter 2's latency table covered: that table was about <em>where data lives</em> (L1 versus RAM versus disk versus network); SIMD is about <em>how many operations one CPU instruction performs</em>, entirely independent of memory hierarchy. A workload can be perfectly cache-friendly and still leave enormous performance on the table if it processes one value per instruction when the hardware could process eight.</p>

<h3>36.2 — Why SIMD needs contiguous, uniform data</h3>
<p>SIMD hardware works by loading a contiguous block of memory into a wide register — a 256-bit register holds eight 32-bit floats, all loaded in one operation, all fed into one arithmetic instruction together. This is why Chapter 28, §28.4's point about contiguous memory being cache-friendly wasn't the whole story: contiguous layout isn't just a cache optimization here, it's a <strong>prerequisite</strong> for SIMD to apply at all. If the eight floats a SIMD instruction wants aren't sitting next to each other in memory, the hardware simply cannot load them together in one operation — there's no "SIMD load with gaps" instruction efficient enough to make it worthwhile, so scattered data forces a fallback to one-value-at-a-time scalar operations, no matter how fast the CPU's SIMD units are.</p>

<h3>36.3 — Array-of-Structs versus Struct-of-Arrays: the layout decision that determines everything</h3>
<p>Consider a physics simulation with many particles, each having position and mass. The natural, object-oriented layout groups each particle's fields together:</p>
<div class="codewin">
<div class="bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="fname">array_of_structs.rs — the natural, SIMD-hostile layout</span></div>
<pre><code><span class="kw">struct</span> <span class="ty">Particle</span> { x: f32, y: f32, z: f32, mass: f32 }

<span class="kw">struct</span> <span class="ty">Simulation</span> { particles: Vec&lt;Particle&gt; }

<span class="cm">// "Sum every particle's x coordinate" -- a natural, common operation --
// cannot be vectorized efficiently here. In memory, this Vec looks
// like: [x0,y0,z0,m0, x1,y1,z1,m1, x2,y2,z2,m2, ...] -- every x value
// is separated from the next x value by three OTHER fields. A SIMD
// load wants eight CONSECUTIVE x values; instead it would need to
// gather them from scattered, non-adjacent addresses, which defeats
// the entire premise of section 36.2's contiguous-load requirement.</span>
<span class="kw">fn</span> <span class="fn">sum_x</span>(sim: &amp;Simulation) -&gt; f32 {
    sim.particles.iter().map(|p| p.x).sum()
}
</code></pre>
</div>
<p>The <strong>Struct-of-Arrays</strong> layout inverts this — one contiguous array per field, instead of one contiguous array of combined records:</p>
<div class="codewin">
<div class="bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="fname">struct_of_arrays.rs — the SIMD-friendly layout</span></div>
<pre><code><span class="cm">// Every particle's x-coordinate now lives in ONE contiguous Vec --
// x: [x0, x1, x2, x3, ...] -- exactly what section 36.2's SIMD load
// needs: eight consecutive f32 values, ready to load into one wide
// register in a single operation, with zero gathering required.</span>
<span class="kw">struct</span> <span class="ty">Simulation</span> {
    x: Vec&lt;f32&gt;, y: Vec&lt;f32&gt;, z: Vec&lt;f32&gt;, mass: Vec&lt;f32&gt;,
}

<span class="kw">fn</span> <span class="fn">sum_x</span>(sim: &amp;Simulation) -&gt; f32 {
    sim.x.iter().sum() <span class="cm">// this exact loop shape -- a simple, contiguous reduction --
        // is precisely the pattern a compiler's auto-vectorizer (see
        // section 36.4) can recognize and turn into SIMD instructions
        // automatically, with no explicit SIMD code written by hand</span>
}
</code></pre>
</div>
<p>The cost of this trade is real and worth naming: Struct-of-Arrays makes "operate on one specific particle's full data" (all four fields together) less convenient — instead of <code class="inline">particles[i]</code> giving one coherent object, code must index into four separate arrays at the same position. This is a genuine readability and ergonomics cost, paid in exchange for making field-wise bulk operations (sum all x, scale all masses) dramatically more vectorization-friendly. Whether that trade is worth making depends entirely on which access pattern actually dominates — exactly Chapter 2's cost-model question, applied to data layout instead of caching or replication.</p>

<h3>36.4 — Auto-vectorization versus explicit SIMD</h3>
<p>Modern compilers can sometimes automatically transform a simple, contiguous scalar loop into SIMD instructions — <strong>auto-vectorization</strong> — without any explicit SIMD code written by the programmer at all. This is precisely why §36.3's Struct-of-Arrays <code class="inline">sum_x</code> was written as an ordinary-looking <code class="inline">.iter().sum()</code>: giving the compiler a simple, contiguous, branch-free loop is often sufficient for it to auto-vectorize on its own, whereas the Array-of-Structs version's scattered access pattern gives the compiler no such opportunity, regardless of how the loop is written. When a hot loop's access pattern is too complex for auto-vectorization to recognize — conditional branches inside the loop, or an access pattern the compiler can't prove is safe to reorder — explicit SIMD (Rust's <code class="inline">std::simd</code>, or platform-specific intrinsics) lets a programmer write the vectorized version by hand. This is genuinely platform- and instruction-set-specific work, outside this chapter's scope to build directly — the actionable takeaway is narrower and more broadly useful: structuring data and loops to make auto-vectorization <em>possible</em> (§36.2 and §36.3's lessons) is a data-layout decision available to any programmer, long before hand-written SIMD intrinsics become necessary at all.</p>

<h3>36.5 — When this matters: Chapter 5's test, at the hardware level</h3>
<div class="callout"><span class="lbl">Not a default refactor</span>Struct-of-Arrays' readability cost (§36.3) is real, and applying it throughout an entire codebase "just in case" is Chapter 5's speculative-generality mistake at the data-layout level — most business logic has no hot numeric loop that would ever benefit, and the ergonomic cost is paid for nothing. This pattern earns its cost specifically in measured, genuinely hot numeric code — physics engines, image and signal processing, machine learning inference, particle systems — following the exact same Chapter 28 discipline as every other optimization in this book: profile first, confirm the loop in question is actually a bottleneck and actually a candidate for vectorization, then restructure the data, rather than restructuring speculatively.</div>

<h3>36.6 — What to carry forward</h3>
<ul>
<li>SIMD (§36.1) is a throughput lever operating at a level Chapter 2's latency table didn't cover at all — worth holding as a fourth axis alongside memory hierarchy, network cost, and disk cost, specifically relevant to numeric, data-parallel workloads.</li>
<li>Struct-of-Arrays versus Array-of-Structs (§36.3) is the sharpest, most concrete instance in this book of "data layout determines what's even possible, not just what's fast" — contiguous memory wasn't optional for SIMD the way it was merely preferable for cache behavior in Chapter 28.</li>
<li>§36.5's profile-first discipline is this book's version of the same lesson appearing for perhaps the widest range of domains yet — from rate limiting (Chapter 20) to lock-free structures (Chapter 35) to data layout (this chapter) — worth recognizing as the single most repeated piece of advice across every "should I add this complexity" chapter in the book.</li>
</ul>

<div class="chapter-eyebrow"><span class="b">Part IX — Parallel and Hardware-Aware Computing</span> / Chapter 37</div>
<h2 class="title">GPU Computing and Data Parallelism</h2>
<div class="deck">Closing Part IX. A GPU is Chapter 36's SIMD taken to an extreme — thousands of lanes instead of four or eight — but that scale comes with a cost Chapter 2's latency table never included: moving data to a separate chip entirely before any of it can help.</div>

<h3>37.1 — SIMT: Chapter 36's SIMD, at a much wider scale</h3>
<p>A GPU executes the same instruction across thousands of simple cores simultaneously — a model called SIMT (Single Instruction, Multiple Thread), the direct architectural descendant of Chapter 36, §36.1's SIMD, scaled from 4–8 lanes on a CPU to thousands of lanes on a GPU. The trade that makes this possible: each individual GPU core is far simpler and slower than a CPU core, with no sophisticated branch prediction or out-of-order execution — the architecture bets everything on massive width instead of per-core sophistication, which only pays off when a workload genuinely has thousands of independent, identical operations to spread across that width. Matrix multiplication, image convolution, and neural network training are the canonical examples: the same simple arithmetic operation, repeated across enormous, independent data.</p>

<h3>37.2 — The cost Chapter 2's table never included: crossing to a separate chip</h3>
<p>A GPU has its own dedicated memory (VRAM), physically separate from the CPU's RAM — data must be explicitly copied from CPU RAM to GPU VRAM over the PCIe bus before any GPU computation can touch it, and results must be copied back afterward. This transfer has real, non-trivial latency and bandwidth cost, sitting at a tier Chapter 2, §2.1's table never needed, because none of that chapter's examples crossed between two entirely separate memory systems on two separate chips. The deciding factor for whether GPU computation is worth this transfer cost is <strong>arithmetic intensity</strong> — the ratio of compute operations performed to bytes transferred. High arithmetic intensity (many operations performed per byte moved, like a large matrix multiplication) amortizes the transfer cost across enormous computational benefit. Low arithmetic intensity (a small amount of computation per byte, or a small dataset overall) means the transfer cost can dominate or even exceed any time saved by the GPU's raw parallel throughput — the classic case of a GPU computation that's slower, end to end, than just doing the same work on the CPU.</p>

<div class="callout"><span class="lbl">A concrete rule of thumb</span>Before considering GPU acceleration for any workload, estimate arithmetic intensity the same way Chapter 19's capacity estimation preceded any component choice: how many floating-point operations does this workload perform, and how many bytes does it need to move across PCIe to do them? A workload performing billions of operations on a dataset that fits in a few hundred megabytes clears this bar easily — most of Chapters 1 through 31's world (API requests, database queries, cache lookups) does not, since those workloads are typically low-compute-per-byte by nature, dominated by I/O and coordination rather than arithmetic.</div>

<h3>37.3 — When GPU computing wins, and when it's pure overhead</h3>
<table>
<tr><th>Workload shape</th><th>Verdict</th><th>Why</th></tr>
<tr><td>Large matrix multiplication, neural network training/inference, image/video processing across large frames</td><td>GPU wins, often dramatically</td><td>Enormous, independent, identical operations per byte moved — high arithmetic intensity easily amortizes transfer cost, and thousands of SIMT lanes process the workload far faster than any CPU could serially or even with Chapter 36's narrower SIMD</td></tr>
<tr><td>Small datasets, branchy/sequential logic, one-off or infrequent computation</td><td>CPU wins, sometimes by a lot</td><td>Transfer cost dominates total time; GPU cores individually handle branching poorly (all lanes executing the same instruction means divergent branches serialize rather than parallelize); the entire premise of massive width goes unused</td></tr>
<tr><td>This book's distributed systems content (Chapters 10–25 broadly)</td><td>Essentially never a GPU workload</td><td>Coordination, I/O, and consensus are latency-bound and branch-heavy, not arithmetic-bound — GPU acceleration solves a fundamentally different bottleneck than the ones Part III and Part IV addressed</td></tr>
</table>

<h3>37.4 — Memory coalescing: Chapter 36's layout lesson, intensified</h3>
<p>GPU memory access has an even stricter contiguity requirement than Chapter 36, §36.2's CPU SIMD loads: when adjacent GPU threads access adjacent memory addresses in the same instruction, the hardware can <strong>coalesce</strong> those accesses into one wide memory transaction — the direct GPU analog of a SIMD load filling one register from contiguous memory. When adjacent threads instead access scattered addresses, each thread's memory access becomes a separate, slow transaction, and with thousands of threads instead of Chapter 36's four-to-eight SIMD lanes, the penalty for poor layout scales up proportionally. Chapter 36, §36.3's Struct-of-Arrays layout — already justified there for CPU SIMD — becomes even more strongly justified for GPU code specifically because the width of parallelism, and therefore the cost of getting layout wrong, is roughly two to three orders of magnitude larger.</p>

<h3>37.5 — What this chapter deliberately doesn't build</h3>
<p>Writing actual GPU kernels (CUDA, or a portable API like wgpu) is genuinely platform- and API-specific work, in the same category Chapter 36, §36.4 placed hand-written SIMD intrinsics — valuable to learn when a measured, qualifying workload (per §37.2's arithmetic-intensity check) actually exists, but not something a single chapter section can responsibly condense into working, correct code across every GPU vendor and API. What transfers regardless of which specific API is eventually used: arithmetic intensity as the deciding question (§37.2), the shape of workload that qualifies (§37.3), and memory coalescing's layout requirement (§37.4) — the conceptual model that determines whether reaching for a GPU is justified at all, before any vendor-specific syntax becomes relevant.</p>

<h3>37.6 — What to carry forward, and closing Part IX</h3>
<ul>
<li>Arithmetic intensity (§37.2) is this book's most concrete instance yet of Chapter 2's cost model extended to a new hardware boundary — the same "what's being bought, what's being spent" question, now applied to crossing from CPU to GPU instead of RAM to disk or one machine to another.</li>
<li>GPU memory coalescing (§37.4) being Chapter 36's Struct-of-Arrays lesson at higher stakes is worth remembering specifically: a data-layout decision that was merely beneficial for CPU SIMD can become close to mandatory the moment GPU-scale parallelism is involved.</li>
<li>Part IX closes having built the same underlying idea — data-parallel hardware wants contiguous, uniform data, and rewards restructuring accordingly — at three scales: Chapter 35's lock-free structures (concurrent CPU threads), Chapter 36's SIMD (CPU instruction-level parallelism), and this chapter's GPU computing (massively wide hardware parallelism). Recognizing that progression is more valuable than any one chapter's specific content.</li>
</ul>

<div class="chapter-eyebrow"><span class="b">Part X — Peer-to-Peer and Decentralized Systems</span> / Chapter 38</div>
<h2 class="title">P2P Network Topologies and Distributed Hash Tables</h2>
<div class="deck">Chapter 12 built consistent hashing assuming every node could see the whole ring. This chapter removes that assumption entirely — a DHT is the same mapping problem, solved when no single node is allowed to know the full membership at all.</div>

<h3>38.1 — What makes P2P a genuinely different problem, not just a different topology</h3>
<p>Every system this book has built through Chapter 37 assumed a distinction between clients and servers, even in the most decentralized designs — Chapter 12's replicas, Chapter 21's chat servers, and Chapter 31's Raft cluster all had known, enumerable membership that some component (a config file, a discovery service, a load balancer) could see in full. Peer-to-peer systems remove that assumption at the root: every node is simultaneously a client and a server, there is no central directory of who else is in the network, and the defining problem becomes <strong>how does a node find data, or find other specific nodes, without anyone maintaining a global view of the network at all</strong>. This isn't a variation on Chapter 12's replication problem — it's a strictly harder version of it, where the "cluster membership" Chapter 12 took for granted is itself unknown to any single participant.</p>

<h3>38.2 — Two answers: unstructured flooding versus structured routing</h3>
<table>
<tr><th>Topology</th><th>Mechanism</th><th>Cost</th></tr>
<tr><td>Unstructured (early Gnutella-style)</td><td>A node forwards a query to all its known neighbors, who forward it to theirs, until it either finds the data or a hop-count limit is reached</td><td>Simple to implement, no coordination needed to join — but message cost per query scales with the fraction of the network flooded, and there's no guarantee a query finds data that genuinely exists somewhere in the network, only a probabilistic one bounded by the flood radius</td></tr>
<tr><td>Structured (DHT-based — Kademlia, Chord)</td><td>Every piece of data has a deterministic "home" based on a hash of its key, and every node maintains a small, structured set of known peers (a routing table) sufficient to route any lookup toward that home in a bounded number of hops</td><td>Requires nodes to maintain routing-table structure and participate in the protocol correctly, but guarantees O(log n) hops to find any existing key, with no flooding and no probabilistic uncertainty about whether data exists</td></tr>
</table>

<h3>38.3 — The core insight: a DHT is Chapter 12's consistent hashing, decentralized</h3>
<p>This is the connection worth building the rest of the chapter around. Chapter 12, §12.5's consistent-hash ring solved "which node owns this key" — but it assumed every node (or at least a coordinator) could see the entire ring and compute <code class="inline">shard_for_key</code> directly against full membership knowledge. A <strong>Distributed Hash Table</strong> solves the identical mapping problem — deterministically assigning ownership of a key to a specific node based on a hash — while removing that assumption entirely: no node knows the full ring. Instead, each node knows only a small number of other nodes (its routing table), and a lookup for a key proceeds hop by hop, with each hop forwarding the query to a known peer that's structurally closer to the target than the current node is — the same "who owns this key" question Chapter 12 answered with a single ring lookup, now answered through a sequence of local, partial-knowledge hops that collectively converge on the same answer.</p>

<h3>38.4 — Kademlia's XOR distance: building a concrete routing metric</h3>
<p>Kademlia (the DHT design underlying BitTorrent's trackerless mode and IPFS) defines "closer" using the bitwise XOR of two node or key identifiers, treated as a number: <code class="inline">distance(A, B) = A XOR B</code>. This is a genuinely valid distance metric — it's symmetric (<code class="inline">A XOR B == B XOR A</code>) and satisfies the triangle inequality — and it has a routing-friendly property no ordinary numeric distance offers: querying a node whose ID shares one additional leading bit with the target key's hash is guaranteed to at least halve the XOR distance to that target, which is exactly what gives Kademlia its O(log n) hop-count guarantee.</p>
<div class="codewin">
<div class="bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="fname">kademlia_routing.rs</span></div>
<pre><code><span class="kw">pub type</span> NodeId = u64; <span class="cm">// simplified from Kademlia's real 160-bit IDs, to keep the
    // routing logic visible without needing a big-integer type</span>

<span class="kw">fn</span> <span class="fn">xor_distance</span>(a: NodeId, b: NodeId) -&gt; u64 { a ^ b }

<span class="kw">pub struct</span> <span class="ty">RoutingTable</span> {
    <span class="kw">pub</span> self_id: NodeId,
    <span class="cm">// A real Kademlia routing table is organized into "buckets" by
    // XOR-distance range (a k-bucket per bit of distance) -- this
    // simplified version flattens that structure into one list to
    // keep the core lookup step visible, the same "toy version, real
    // shape" honesty as every simplified implementation since
    // Chapter 11.</span>
    <span class="kw">pub</span> known_peers: Vec&lt;NodeId&gt;,
}

<span class="kw">impl</span> <span class="ty">RoutingTable</span> {
    <span class="cm">// Returns the known peer CLOSEST (by XOR distance) to the target --
    // the single step repeated at every hop of a Kademlia lookup.
    // Each hop asks its closest known peer "who do YOU know that's
    // closer to this target," progressively narrowing in, exactly
    // like Chapter 12's ring lookup but computed one local decision
    // at a time instead of in one global calculation.</span>
    <span class="kw">pub fn</span> <span class="fn">closest_known_to</span>(&amp;<span class="kw">self</span>, target: NodeId) -&gt; Option&lt;NodeId&gt; {
        <span class="kw">self</span>.known_peers.iter()
            .min_by_key(|&amp;&amp;peer| xor_distance(peer, target))
            .copied()
    }
}

<span class="cm">// A full iterative lookup (simplified -- omits parallelism and
// timeout handling a real implementation needs):
// 1. Start with the closest peer THIS node knows to the target.
// 2. Ask that peer for ITS closest known peers to the target.
// 3. If any of those are closer than anything seen so far, repeat
//    from the new closest peer.
// 4. Stop when a round returns no peer closer than the best already
//    found -- convergence, the target's owner (or its closest
//    reachable neighbor) has been located.
// Each round is guaranteed, by the halving property named above, to
// make real progress -- this is what bounds the hop count to O(log n)
// rather than requiring unstructured flooding's full-network search.</span>
</code></pre>
</div>

<h3>38.5 — NAT traversal: the practical problem structured routing doesn't solve</h3>
<p>§38.4's routing logic assumes any node can directly connect to any other node it discovers — in practice, most real nodes sit behind a NAT (Network Address Translation) router or firewall and aren't directly reachable from an arbitrary outside address at all, the actual reason most consumer P2P applications need more than pure DHT routing to function. <strong>Hole punching</strong> is the standard technique: both peers, coordinated by a small, lightweight rendezvous server that both can reach, simultaneously initiate outbound connection attempts toward each other's address at roughly the same moment — because many NAT implementations will accept inbound traffic on a port if outbound traffic was just sent from that same port, this simultaneous attempt frequently succeeds in establishing a direct connection despite neither peer being able to accept unsolicited inbound connections normally.</p>
<div class="callout"><span class="lbl">Why "peer-to-peer" still needs a server</span>This is worth stating plainly, since it surprises people expecting P2P to mean "zero infrastructure": a rendezvous server for hole punching, or a bootstrap node list for initially joining a DHT at all (a brand-new node needs at least one known peer to start building its routing table from), are both small, lightweight coordination points that most real P2P systems still depend on. The system remains "peer-to-peer" in the sense that matters — no central server holds or routes the actual data, and the bulk of traffic and coordination happens directly between peers — but pure, zero-infrastructure decentralization is rarer in practice than the term implies, and honestly scoping which pieces still need coordination (rendezvous, bootstrap) versus which are genuinely peer-routed (data lookup, once connected) is part of designing one of these systems correctly.</div>

<h3>38.6 — What to carry forward</h3>
<ul>
<li>The DHT-as-decentralized-consistent-hashing connection (§38.3) is the single most valuable idea in this chapter — recognizing a DHT as "Chapter 12's problem, solved without a coordinator" turns an unfamiliar-sounding structure into a specific, understood variation on something already built.</li>
<li>XOR distance's halving property (§38.4) is worth remembering as a concrete instance of why routing-friendly distance metrics matter — the property that makes Kademlia efficient isn't XOR being clever for its own sake, it's that each hop is guaranteed to make measurable progress, the same "progress guarantee" concern Chapter 35 named for lock-free structures, now applied to network routing instead of concurrent memory access.</li>
<li>§38.5's honesty about rendezvous and bootstrap infrastructure is worth carrying into Chapter 39 and 40 directly — decentralized systems in this Part will keep being evaluated on which pieces are genuinely peer-routed versus which still lean on some minimal coordination point, rather than assumed to be perfectly infrastructure-free by default.</li>
</ul>
