<div class="chapter-eyebrow"><span class="b">Part II — Design Principles</span> / Chapter 9</div>
<h2 class="title">Layered, Hexagonal, and Clean Architecture</h2>
<div class="deck">Zoom out from individual classes to an entire application. This chapter argues these three named architectures are one idea wearing three names — dependencies must point toward business logic, never away from it — and shows where each name adds something real on top of that shared core.</div>

<h3>9.1 — The one rule underneath all three names</h3>
<p>Strip the diagrams and the vocabulary, and Layered, Hexagonal, and Clean Architecture all enforce the same constraint: <strong>your core business logic must not depend on your infrastructure.</strong> Concretely — the code that decides "an order is valid if it has a SKU and positive quantity" must not import anything that knows about PostgreSQL, HTTP, Stripe, or a message queue. Infrastructure is allowed to depend on business logic (a database repository implements an interface the business logic defined); business logic is never allowed to depend on infrastructure.</p>
<p>This is Chapter 5's Dependency Inversion Principle, applied to an entire application instead of one class. Every pattern from Chapters 6–8 was a technique for inverting one dependency; this chapter is about applying that technique consistently across every boundary in a codebase, and giving that consistent result a name.</p>

<h3>9.2 — Why this rule exists: what it protects against</h3>
<p>Without it, a common and expensive failure mode emerges: business logic — the actual value of the software, the rules that make your order-processing system <em>yours</em> and not a generic CRUD app — ends up scattered through HTTP handlers, ORM model methods, and database triggers. None of that logic is testable without spinning up a database and a web server. None of it survives a framework migration. None of it can be reused if you add a second entry point (a CLI, a background job) without copy-pasting.</p>
<p>The rule fixes this by making a testability and portability guarantee automatic rather than aspirational: if business logic genuinely cannot import infrastructure, then it is <em>necessarily</em> testable without infrastructure and <em>necessarily</em> portable across entry points, because those properties are consequences of the dependency direction, not separate goals you have to remember to pursue.</p>

<h3>9.3 — Layered Architecture: the simplest version of the rule</h3>
<p>Layered architecture arranges code into horizontal layers — typically presentation, business logic, data access — where each layer may only depend on the layer below it. It's the oldest and most commonly taught form of the rule, and its weakness is exactly where it's simplest: the dependency direction is usually enforced by convention and folder structure, not by anything the compiler checks.</p>
<table>
<tr><th>Layer</th><th>Contains</th><th>May depend on</th></tr>
<tr><td>Presentation</td><td>HTTP handlers, CLI parsing, request/response shaping</td><td>Business logic layer</td></tr>
<tr><td>Business logic</td><td>Domain rules, validation, the actual behavior of the application</td><td>Nothing below (in the strict version) or an abstract data-access interface</td></tr>
<tr><td>Data access</td><td>Repository implementations, SQL, ORM models</td><td>Business logic's interfaces, to implement them</td></tr>
</table>
<p>The common failure — and the reason Hexagonal and Clean Architecture exist as reactions to it — is "leaky layering," where a shortcut (an ORM model imported directly into a business-logic function because it was convenient) quietly violates the rule while the folder structure still looks correct. Nothing catches this except code review discipline.</p>

<h3>9.4 — Hexagonal Architecture: naming the boundary explicitly</h3>
<p>Hexagonal Architecture — also called Ports and Adapters — makes the same rule harder to violate by accident, by giving the boundary a name and a shape: business logic defines <strong>ports</strong> (interfaces describing what it needs — <code class="inline">PaymentGateway</code> from Chapter 5 is a port), and infrastructure provides <strong>adapters</strong> implementing those ports (the <code class="inline">StripeGateway</code>, or Chapter 7's <code class="inline">LegacyPaymentAdapter</code>). The word "adapter" here is doing double duty — it's both the Gang-of-Four pattern from Chapter 7 and the name for "any infrastructure implementation of a port" in this architecture's vocabulary, because they're mechanically the same thing at different scales.</p>
<p>The hexagon shape in diagrams is honestly cosmetic — the real content is that business logic sits in the center, ports are the only way in or out, and every adapter (HTTP API, CLI, test double, database) is symmetrically "just another implementation of a port," including the ones that trigger the application (inbound) and the ones the application calls out to (outbound). Layered architecture usually only inverts the outbound direction (data access); Hexagonal inverts both.</p>

<h3>9.5 — Clean Architecture: adding explicit concentric rings and a name for the rule</h3>
<p>Clean Architecture (Robert C. Martin) draws the same idea as concentric rings — Entities at the center, Use Cases around them, then Interface Adapters, then Frameworks/Drivers at the outside — and gives the rule itself a name: <strong>the Dependency Rule</strong>, stated as "source code dependencies must point only inward." It's more prescriptive than Hexagonal about what belongs in each ring (Entities are enterprise-wide business rules; Use Cases are application-specific business rules; that split matters for large systems and is often unnecessary ceremony for small ones), but the core constraint — inner rings never import outer rings — is identical to §9.1.</p>

<div class="callout"><span class="lbl">Why this book treats them as one thing</span>The differences between Layered, Hexagonal, and Clean Architecture are about vocabulary and how explicitly the boundary is enforced — not about the underlying rule, which is identical in all three. Teaching them as three unrelated architectures (as many resources do) is exactly the kind of scattered-knowledge problem this book exists to avoid. Learn the Dependency Rule once; recognize it under all three names.</div>

<h3>9.6 — Worked example: order processing, architected end to end</h3>
<p>Take the <code class="inline">OrderProcessor</code> built across Chapters 5–8 and place it inside an explicit Hexagonal structure — ports defined by the core, adapters implementing them, and a composition root wiring concrete adapters to the core at startup.</p>

<div class="codewin">
<div class="bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="fname">main.rs — the composition root: the only file allowed to know both sides</span></div>
<pre><code><span class="kw">fn</span> <span class="fn">main</span>() {
    <span class="cm">// This is the one place in the entire codebase where core and
    // adapters are both imported and wired together. Every other
    // file only knows one side of the boundary.</span>
    <span class="kw">let</span> payment = StripeAdapter::new();
    <span class="kw">let</span> repo = PostgresOrderRepo::new();
    <span class="kw">let</span> use_case = PlaceOrderUseCase { payment, repo };

    use_case.execute(Order { sku: <span class="st">"SKU-1"</span>.into(), amount: <span class="nu">49.99</span> }).unwrap();
}

<span class="cm">// tests/place_order_test.rs — a test needs zero infrastructure:
// struct FakePayment; impl PaymentGateway for FakePayment { ... }
// struct FakeRepo;    impl OrderRepository for FakeRepo    { ... }
// let use_case = PlaceOrderUseCase { payment: FakePayment, repo: FakeRepo };
// — no database, no network call, no Stripe test credentials needed.
// This is the direct, structural payoff of the Dependency Rule, not
// a testing best practice layered on top of it.</span>
</code></pre>
</div>

<h3>9.7 — Enforcing the rule in C++ vs. Rust</h3>
<p>The architecture itself — ports as pure-virtual interfaces or traits, adapters implementing them, a composition root wiring things together — is identical in shape between the two languages, matching every prior chapter's pattern-level comparisons. Where they differ is <em>enforceability</em>:</p>
<table>
<tr><th>Enforcement mechanism</th><th>C++</th><th>Rust</th></tr>
<tr><td>Preventing core from importing infrastructure</td><td>Convention + code review; <code class="inline">#include</code> of any header is always legal, nothing blocks it structurally</td><td>Convention + code review, same as C++ — Rust's module system doesn't prevent a core module from adding a dependency on a database crate either</td></tr>
<tr><td>Catching a violation automatically</td><td>Only via external tooling — a linter rule (e.g. include-what-you-use configs, architecture-testing tools) checking which headers appear in which directories</td><td>Cargo workspaces can put core and adapters in <em>separate crates</em>; core's <code class="inline">Cargo.toml</code> then structurally cannot depend on a database crate unless someone edits that file — a much higher-friction, more visible violation than an extra <code class="inline">#include</code> line</td></tr>
</table>
<p>Neither language makes the Dependency Rule impossible to violate — this is architecture, not memory safety, and nothing in either type system stops a core module from importing a database library if a developer decides to. What Rust's crate boundaries offer is friction and visibility: violating the rule requires a <code class="inline">Cargo.toml</code> change that shows up clearly in review, rather than a header include that's easy to miss.</p>

<h3>9.8 — When the full ceremony isn't worth it</h3>
<p>Applying Chapter 5's speculative-generality test here: a small internal tool with one entry point, one database, and no plausible future need for a second payment provider or a CLI alongside its API doesn't need three named layers and a ports/adapters split. The Dependency Rule is worth enforcing when the system is expected to grow multiple entry points, needs isolated unit testing of business rules, or will plausibly swap an infrastructure dependency. For a script-sized tool, a single well-organized file that does the SQL query directly is more honest than a hexagon diagram protecting nothing.</p>

<h3>9.9 — What to carry forward</h3>
<ul>
<li>Whenever a resource introduces Layered, Hexagonal, Ports-and-Adapters, or Clean Architecture as if they were different things, translate immediately to the single Dependency Rule from §9.1 — that translation is the fix for exactly the "scattered, inconsistent terminology" problem you started this book to solve.</li>
<li>The testability payoff in §9.6's closing comment — zero infrastructure needed to test business logic — isn't a nice side effect, it's mechanically guaranteed by the dependency direction. If a "clean architecture" codebase still needs a database to test its core logic, the Dependency Rule is being violated somewhere, regardless of what the folders are named.</li>
<li>Part V's case studies (Chapters 19–23) will each briefly note where the Dependency Rule applies within a larger system design — the rule scales down to one class (Chapter 5) and up to a whole service, but doesn't change shape at either end.</li>
</ul>

<div class="chapter-eyebrow"><span class="b">Part III — Distributed Systems Fundamentals</span> / Chapter 10</div>
<h2 class="title">CAP Theorem and Consistency Models</h2>
<div class="deck">CAP theorem gets quoted as "pick two of three" and that framing is misleading enough to cause real design mistakes. This chapter states it precisely, then builds a tiny two-node replicated counter to make the trade-off observable instead of theoretical.</div>

<h3>10.1 — Why "pick two of three" is wrong</h3>
<p>The theorem, stated precisely: in the presence of a <strong>network partition</strong>, a distributed system must choose between <strong>consistency</strong> (every read receives the most recent write, or an error) and <strong>availability</strong> (every request receives a non-error response, though not necessarily the most recent data). It does not say you choose two of three at all times — it says <strong>partition tolerance is not optional</strong> for any system that runs on more than one machine, because networks partition whether you design for it or not. The real choice CAP describes is narrower and more useful than the popular framing: <em>when a partition is actually happening, do you sacrifice consistency or availability?</em> Outside of a partition, a well-designed system can offer both.</p>
<div class="callout"><span class="lbl">The mistake this causes</span>Teams sometimes treat CAP as a permanent architectural label — "we're a CP system" or "we're an AP system" — and stop reasoning about behavior during normal operation, where CAP has nothing to say. CAP constrains behavior during a partition only. The interesting engineering work is deciding what "consistency" and "availability" mean for your specific use case, which is where consistency models — the rest of this chapter — come in.</div>

<h3>10.2 — A spectrum, not a binary: consistency models</h3>
<p>"Consistency" is not one thing. It's a spectrum of guarantees, each stronger and more expensive than the last:</p>
<table>
<tr><th>Model</th><th>Guarantee</th><th>Cost</th></tr>
<tr><td>Strong consistency</td><td>Every read sees the most recent write, globally, immediately</td><td>Requires coordination on every write (or read) — pays cross-node latency from Chapter 2's table on the hot path</td></tr>
<tr><td>Sequential consistency</td><td>All nodes see writes in the same order, but not necessarily immediately</td><td>Cheaper than strong; still requires ordering coordination</td></tr>
<tr><td>Causal consistency</td><td>Writes that are causally related (B happened after seeing A) are seen in that order by everyone; unrelated writes may be seen in different orders on different nodes</td><td>Cheaper still — only causally linked operations need coordination</td></tr>
<tr><td>Eventual consistency</td><td>If no new writes occur, all replicas will <em>eventually</em> converge to the same value — no bound on how long "eventually" takes</td><td>Cheapest — writes can be accepted locally and propagated asynchronously, no coordination on the write path at all</td></tr>
</table>
<p>Every one of these models is a real, legitimate choice for some part of a system — the mistake is picking one for an entire application rather than per piece of data. A bank balance plausibly needs strong consistency. A "likes" counter on a social post is a textbook case for eventual consistency, because a brief undercounted total causes no harm and the cost of strong consistency there would be paid on every single like, everywhere, for no benefit anyone would notice.</p>

<h3>10.3 — Worked example: a two-node replicated counter, two consistency strategies</h3>
<p>To make the trade-off concrete rather than diagrammatic, both implementations below model the same problem: two nodes hold a replica of a counter; increments must eventually be reflected on both. One enforces consistency by requiring both nodes to agree before an increment succeeds; the other accepts locally and reconciles later.</p>

<h4>Strategy A — strong consistency via two-phase commit (simplified)</h4>
<div class="codewin">
<div class="bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="fname">strong_counter.rs</span></div>
<pre><code><span class="cm">// Simplified 2PC: a coordinator asks every replica to "prepare" the
// write, and only commits if ALL replicas agree. If any replica is
// unreachable, the write is refused entirely — this is the
// availability being sacrificed for consistency that CAP describes.</span>
<span class="kw">pub trait</span> <span class="ty">Replica</span> {
    <span class="kw">fn</span> <span class="fn">prepare</span>(&amp;<span class="kw">mut self</span>, delta: i64) -&gt; bool; <span class="cm">// returns false if unreachable/busy</span>
    <span class="kw">fn</span> <span class="fn">commit</span>(&amp;<span class="kw">mut self</span>);
    <span class="kw">fn</span> <span class="fn">abort</span>(&amp;<span class="kw">mut self</span>);
    <span class="kw">fn</span> <span class="fn">value</span>(&amp;<span class="kw">self</span>) -&gt; i64;
}

<span class="kw">pub fn</span> <span class="fn">strong_increment</span>(replicas: &amp;<span class="kw">mut</span> [<span class="kw">Box</span>&lt;<span class="kw">dyn</span> Replica&gt;], delta: i64) -&gt; Result&lt;(), <span class="ty">String</span>&gt; {
    <span class="cm">// Phase 1: every replica must agree to prepare the write.</span>
    <span class="kw">let</span> all_prepared = replicas.iter_mut().all(|r| r.prepare(delta));

    <span class="kw">if</span> !all_prepared {
        <span class="cm">// Even ONE unreachable replica aborts the whole write. During a
        // partition — one replica unreachable — every increment fails.
        // Consistency is preserved (no replica ever diverges); the
        // system is unavailable for writes during the partition.</span>
        <span class="kw">for</span> r <span class="kw">in</span> replicas.iter_mut() { r.abort(); }
        <span class="kw">return</span> Err(<span class="st">"one or more replicas unreachable — write refused"</span>.into());
    }
    <span class="cm">// Phase 2: all agreed, commit everywhere. Every read after this
    // point, on any replica, sees the new value — strong consistency.</span>
    <span class="kw">for</span> r <span class="kw">in</span> replicas.iter_mut() { r.commit(); }
    Ok(())
}
</code></pre>
</div>

<h4>Strategy B — eventual consistency via local accept + async reconciliation</h4>
<div class="codewin">
<div class="bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="fname">eventual_counter.rs</span></div>
<pre><code><span class="cm">// Each replica accepts increments locally, immediately, with no
// coordination. A background process periodically exchanges deltas
// between replicas to converge them. During a partition, both
// replicas keep accepting writes — availability is preserved — but
// they can disagree until the partition heals and reconciliation runs.</span>
<span class="kw">pub struct</span> <span class="ty">EventualReplica</span> {
    local_value: i64,
    pending_deltas: Vec&lt;i64&gt;, <span class="cm">// not yet sent to the peer</span>
}

<span class="kw">impl</span> <span class="ty">EventualReplica</span> {
    <span class="kw">pub fn</span> <span class="fn">increment</span>(&amp;<span class="kw">mut self</span>, delta: i64) {
        <span class="cm">// Always succeeds. No network call on the write path at all —
        // this is the entire latency and availability benefit from
        // Chapter 2's table, applied to consistency instead of caching.</span>
        <span class="kw">self</span>.local_value += delta;
        <span class="kw">self</span>.pending_deltas.push(delta);
    }

    <span class="cm">// Called periodically, or when connectivity to the peer resumes.
    // This is where "eventually" in "eventually consistent" happens —
    // there is no bound on how long it takes.</span>
    <span class="kw">pub fn</span> <span class="fn">reconcile_with</span>(&amp;<span class="kw">mut self</span>, peer: &amp;<span class="kw">mut</span> <span class="ty">EventualReplica</span>) {
        <span class="kw">for</span> &amp;d <span class="kw">in</span> &amp;<span class="kw">self</span>.pending_deltas { peer.local_value += d; }
        <span class="kw">for</span> &amp;d <span class="kw">in</span> &amp;peer.pending_deltas { <span class="kw">self</span>.local_value += d; }
        <span class="kw">self</span>.pending_deltas.clear();
        peer.pending_deltas.clear();
    }

    <span class="kw">pub fn</span> <span class="fn">value</span>(&amp;<span class="kw">self</span>) -&gt; i64 { <span class="kw">self</span>.local_value }
}
</code></pre>
</div>

<p>Run through the observable behavior difference directly: with Strategy A, if replica 2 is unreachable, calling <code class="inline">strong_increment</code> returns <code class="inline">Err</code> — the caller gets an honest failure, immediately, and both replicas stay identical forever. With Strategy B, both replicas keep accepting increments independently during the same outage; <code class="inline">replica_1.value()</code> and <code class="inline">replica_2.value()</code> can disagree for the entire duration of the partition, and only converge once <code class="inline">reconcile_with</code> runs. Neither behavior is "correct" in the abstract — Strategy A is correct for a use case where a wrong balance is worse than a failed request; Strategy B is correct for a use case where an available-but-momentarily-stale counter is worse than an outright failure.</p>

<h3>10.4 — The same idea in C++, and why the language choice barely matters here</h3>
<div class="codewin">
<div class="bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="fname">eventual_counter.hpp</span></div>
<pre><code><span class="kw">class</span> <span class="ty">EventualReplica</span> {
<span class="kw">public</span>:
    <span class="kw">void</span> <span class="fn">increment</span>(<span class="ty">long</span> delta) {
        local_value_ += delta;
        pending_deltas_.<span class="fn">push_back</span>(delta);
    }
    <span class="kw">void</span> <span class="fn">reconcile_with</span>(<span class="ty">EventualReplica&amp;</span> peer) {
        <span class="kw">for</span> (<span class="kw">long</span> d : pending_deltas_) peer.local_value_ += d;
        <span class="kw">for</span> (<span class="kw">long</span> d : peer.pending_deltas_) local_value_ += d;
        pending_deltas_.<span class="fn">clear</span>();
        peer.pending_deltas_.<span class="fn">clear</span>();
    }
    <span class="ty">long</span> <span class="fn">value</span>() <span class="kw">const</span> { <span class="kw">return</span> local_value_; }
<span class="kw">private</span>:
    <span class="ty">long</span> local_value_ = <span class="nu">0</span>;
    <span class="ty">std::vector</span>&lt;<span class="ty">long</span>&gt; pending_deltas_;
};
</code></pre>
</div>
<p>This is a deliberate, notable exception to every prior chapter's pattern: <strong>CAP and consistency-model trade-offs are decisions about network behavior between processes, not about a single process's memory safety or ownership.</strong> Neither C++'s manual discipline nor Rust's compile-time checks have anything to say about whether a remote node is reachable, or how long "eventually" takes to converge. This is the first chapter in the book where the two languages produce genuinely equivalent code — the interesting decisions live entirely in the protocol design (do you require agreement before responding, or reconcile later), not in the language.</p>

<h3>10.5 — Choosing per piece of data, not per system</h3>
<p>The practical discipline this chapter argues for: catalog each piece of state in a system and ask, independently, "what happens if this is briefly stale or unavailable?" A payment ledger entry, an inventory count at checkout, and a "last seen online" timestamp have wildly different answers to that question within the same application — and a mature system uses a different consistency strategy for each, rather than picking one CAP posture for the whole service.</p>

<h3>10.6 — What to carry forward</h3>
<ul>
<li>CAP only constrains behavior <em>during a partition</em> (§10.1) — don't let it become a permanent label for an entire system when it should be a per-partition-event decision, made per piece of data.</li>
<li>The eventual-consistency reconciliation shape in §10.3 is the seed of Chapter 11's consensus protocols — Raft and Paxos are, at their core, more rigorous versions of "how do multiple replicas agree on a value," built to handle failures this toy example ignores (a replica crashing mid-reconciliation, messages arriving out of order, a split-brain scenario with more than two nodes).</li>
<li>§10.5's per-data-type discipline is the lens for every case study in Part V — each one will name, explicitly, which pieces of state need strong consistency and which can tolerate eventual consistency, rather than treating the whole system as one uniform choice.</li>
</ul>

<div class="chapter-eyebrow"><span class="b">Part III — Distributed Systems Fundamentals</span> / Chapter 11</div>
<h2 class="title">Consensus: Paxos and Raft from First Principles</h2>
<div class="deck">Chapter 10's two-node counter ignored every hard failure mode on purpose. This chapter puts them back — crashes mid-write, messages arriving out of order, more than two nodes disagreeing — and builds the leader-election core of Raft, the protocol designed specifically to be easier to reason about than Paxos.</div>

<h3>11.1 — The problem consensus actually solves</h3>
<p>Consensus answers one question: <strong>how do multiple nodes agree on a single value, even when some nodes crash, messages are delayed, or messages arrive out of order</strong> — while guaranteeing that once a value is agreed upon, it stays agreed upon, and every node that participates eventually learns the same value. Chapter 10's reconciliation loop assumed both replicas were always eventually reachable and never disagreed about *history*, only about the current value. Consensus protocols exist because real systems can't assume that — a node can crash after sending half its messages, a network partition can let two different nodes both believe they're in charge, and the protocol has to guarantee correctness even in those cases.</p>

<h3>11.2 — Why Paxos is notoriously hard to explain, and why Raft exists</h3>
<p>Paxos (Lamport, 1998) is provably correct and famously difficult to implement correctly from its original description — enough so that multiple well-known distributed systems teams have published papers specifically about the gap between "understanding Paxos" and "correctly implementing Paxos." Raft (Ongaro and Ousterhout, 2014) solves the identical problem — <strong>the same guarantees, the same fault tolerance</strong> — but was explicitly designed for understandability: it decomposes consensus into three separable sub-problems (leader election, log replication, safety) and requires, at any time, a single distinguished leader coordinating all writes, which removes an entire class of "who's in charge right now" ambiguity that makes Paxos hard to reason about.</p>
<p>This book builds Raft's leader election mechanism specifically, because it's the cleanest illustration of the core consensus problem — get a cluster to agree on <em>who is allowed to make decisions</em> — without also requiring the full log-replication machinery to demonstrate.</p>

<h3>11.3 — Raft's three roles and the term counter</h3>
<p>Every node in a Raft cluster is in exactly one of three roles at any time: <strong>Follower</strong> (default state, passively accepts instructions from a leader), <strong>Candidate</strong> (a follower that hasn't heard from a leader recently and is requesting votes to become one), or <strong>Leader</strong> (the single node currently coordinating the cluster). A monotonically increasing <strong>term</strong> number acts as a logical clock — every message carries the sender's current term, and any node that sees a higher term than its own immediately reverts to Follower and adopts that term, which is the mechanism that prevents a stale, previously-partitioned leader from continuing to act as if it's still in charge.</p>

<h3>11.4 — Building it: leader election in Rust</h3>
<p>The implementation below models a cluster as in-process nodes exchanging messages through channels, standing in for a real network — the algorithm is identical whether the transport is an in-memory channel or a socket, which is precisely the point of separating protocol logic from transport, the same Dependency Rule from Chapter 9 applied to network code.</p>

<div class="codewin">
<div class="bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="fname">raft_election.rs — state and messages</span></div>
<pre><code><span class="kw">#[derive(Debug, Clone, Copy, PartialEq)]</span>
<span class="kw">pub enum</span> <span class="ty">Role</span> { Follower, Candidate, Leader }

<span class="kw">pub struct</span> <span class="ty">Node</span> {
    <span class="kw">pub</span> id: u32,
    <span class="kw">pub</span> role: Role,
    <span class="kw">pub</span> current_term: u64,
    <span class="kw">pub</span> voted_for: Option&lt;u32&gt;,      <span class="cm">// which candidate this node voted for, this term</span>
    <span class="kw">pub</span> votes_received: u32,
}

<span class="kw">pub enum</span> <span class="ty">Message</span> {
    RequestVote { term: u64, candidate_id: u32 },
    VoteResponse { term: u64, granted: bool },
    Heartbeat { term: u64, leader_id: u32 },
}
</code></pre>
</div>

<div class="codewin">
<div class="bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="fname">raft_election.rs — the core transitions</span></div>
<pre><code><span class="kw">impl</span> <span class="ty">Node</span> {
    <span class="cm">// Called when a follower's election timeout fires — it heard
    // nothing from a leader in time, so it assumes there isn't one
    // and starts an election.</span>
    <span class="kw">pub fn</span> <span class="fn">start_election</span>(&amp;<span class="kw">mut self</span>) -&gt; Message {
        <span class="kw">self</span>.current_term += <span class="nu">1</span>;              <span class="cm">// bump the logical clock</span>
        <span class="kw">self</span>.role = Role::Candidate;
        <span class="kw">self</span>.voted_for = Some(<span class="kw">self</span>.id);      <span class="cm">// a candidate always votes for itself</span>
        <span class="kw">self</span>.votes_received = <span class="nu">1</span>;
        Message::RequestVote { term: <span class="kw">self</span>.current_term, candidate_id: <span class="kw">self</span>.id }
    }

    <span class="cm">// Called on any node that receives a RequestVote message.</span>
    <span class="kw">pub fn</span> <span class="fn">handle_request_vote</span>(&amp;<span class="kw">mut self</span>, term: u64, candidate_id: u32) -&gt; Message {
        <span class="kw">if</span> term &lt; <span class="kw">self</span>.current_term {
            <span class="cm">// Stale request from an old term — reject outright. This is
            // what stops a node that was partitioned away and is
            // catching up on old messages from disrupting a cluster
            // that has already moved on.</span>
            <span class="kw">return</span> Message::VoteResponse { term: <span class="kw">self</span>.current_term, granted: <span class="kw">false</span> };
        }
        <span class="kw">if</span> term &gt; <span class="kw">self</span>.current_term {
            <span class="cm">// A higher term always wins — step down to Follower and adopt
            // the new term, regardless of what this node was doing.</span>
            <span class="kw">self</span>.current_term = term;
            <span class="kw">self</span>.role = Role::Follower;
            <span class="kw">self</span>.voted_for = <span class="ty">None</span>;
        }
        <span class="kw">if</span> <span class="kw">self</span>.voted_for.is_none() || <span class="kw">self</span>.voted_for == Some(candidate_id) {
            <span class="cm">// Grant the vote only if this node hasn't already voted this
            // term for someone else — the "one vote per term" rule is
            // what caps the number of leaders any single term can
            // produce at exactly one, assuming a majority is required.</span>
            <span class="kw">self</span>.voted_for = Some(candidate_id);
            <span class="kw">return</span> Message::VoteResponse { term: <span class="kw">self</span>.current_term, granted: <span class="kw">true</span> };
        }
        Message::VoteResponse { term: <span class="kw">self</span>.current_term, granted: <span class="kw">false</span> }
    }

    <span class="cm">// Called on a Candidate when a VoteResponse arrives.</span>
    <span class="kw">pub fn</span> <span class="fn">handle_vote_response</span>(&amp;<span class="kw">mut self</span>, granted: bool, cluster_size: u32) {
        <span class="kw">if</span> <span class="kw">self</span>.role != Role::Candidate || !granted { <span class="kw">return</span>; }
        <span class="kw">self</span>.votes_received += <span class="nu">1</span>;
        <span class="kw">if</span> <span class="kw">self</span>.votes_received &gt; cluster_size / <span class="nu">2</span> {
            <span class="cm">// Strict majority, not "most votes so far" — this is what
            // makes it structurally impossible for two different
            // candidates to both win the same term: two disjoint
            // majorities of the same cluster cannot both exist.</span>
            <span class="kw">self</span>.role = Role::Leader;
        }
    }
}
</code></pre>
</div>

<p>The comment on <code class="inline">handle_vote_response</code> is the mathematical core of the entire protocol, worth restating on its own: in a cluster of <em>N</em> nodes, any two majorities must share at least one node in common (a majority is strictly more than N/2, and two disjoint sets can't both exceed half of N). That shared node can only have voted for one candidate in a given term, because of the "one vote per term" rule enforced in <code class="inline">handle_request_vote</code>. Therefore two different nodes cannot both receive a majority of votes in the same term — at most one leader per term, guaranteed by counting, not by trusting the network to behave.</p>

<h3>11.5 — Split votes: the case this design must still handle</h3>
<p>It's possible for an election to produce no leader at all — if three candidates each capture a third of the votes in the same term, no one reaches a majority. Raft's answer is unglamorous and effective: each node picks a <strong>randomized election timeout</strong> before starting its next election attempt, so simultaneous candidacies become statistically unlikely on the next round without needing any additional coordination protocol to break the tie.</p>

<h3>11.6 — Why this is a C++/Rust-agnostic chapter, like Chapter 10</h3>
<p>As with CAP theorem, the consensus problem lives at the protocol layer — the majority-vote counting logic in §11.4 is identical in shape whether written with C++ enums and virtual dispatch or Rust enums and pattern matching. The interesting engineering constraint isn't ownership or thread safety, it's the message-ordering and failure-handling logic itself. The one place language does matter: real production Raft implementations (etcd's, in Go; TiKV's multi-raft, in Rust) care enormously about the cost of serializing and copying log entries on every replication round, which pulls back in Chapter 2's cost-modeling lens — but that's an implementation-efficiency concern layered on top of the protocol, not a change to the protocol's correctness argument.</p>

<h3>11.7 — What this toy implementation leaves out</h3>
<p>Real Raft additionally handles: log replication (agreeing on a sequence of commands, not just a leader), log compaction (snapshotting so the log doesn't grow forever), and cluster membership changes (adding or removing nodes without a window where two disjoint majorities could form). Each is a substantial extension of the leader-election core built here — this chapter's implementation is deliberately scoped to the piece that makes the "how do N unreliable nodes agree on one thing" question concrete, not to be production-ready.</p>

<div class="callout"><span class="lbl">Where this resurfaces</span>Chapter 12 (replication) builds directly on the leader concept from this chapter — a Raft leader is exactly the "single node that writes are directed to" role that replication strategies formalize. Chapter 31, the distributed KV store capstone, uses this election logic as its literal starting point.</div>

<h3>11.8 — What to carry forward</h3>
<ul>
<li>The majority-overlap argument in §11.4 — any two majorities of the same cluster must intersect — is the single fact that makes distributed consensus possible at all. Recognize it whenever "quorum" appears later in this book (replication, distributed databases); it's always this same counting argument underneath.</li>
<li>Terms (§11.3) are a recurring pattern worth naming: a monotonically increasing counter used purely to detect staleness, not to convey any meaning of its own. The same idea reappears as "epoch," "version," or "generation" in other systems — same mechanism, different name, exactly like Chapter 9's architecture-naming lesson.</li>
<li>Randomized timeouts (§11.5) as a tie-breaking mechanism — accepting a small amount of randomness rather than building additional coordination — is a recurring, cheap technique across distributed systems; keep it in mind for Chapter 14 (load balancing), where randomized choice among backends serves a similar de-synchronization purpose.</li>
</ul>

<div class="chapter-eyebrow"><span class="b">Part III — Distributed Systems Fundamentals</span> / Chapter 12</div>
<h2 class="title">Replication and Partitioning Strategies</h2>
<div class="deck">Two separate questions get conflated under "scaling a database": how many copies of the same data should exist, and how should different data be split across machines. This chapter keeps them apart, then combines them in one worked design.</div>

<h3>12.1 — Two different problems wearing one name</h3>
<p><strong>Replication</strong> answers: "how many copies of the same data exist, and how do they stay in sync?" It exists for read scalability and fault tolerance — more copies mean more machines can serve reads, and losing one machine doesn't lose the data. <strong>Partitioning</strong> (also called sharding) answers a different question: "how is the total dataset split across machines, so no single machine has to hold all of it?" It exists for write scalability and storage capacity — a dataset too large for one disk, or a write rate too high for one machine to absorb, gets divided.</p>
<p>They're independent axes, and production systems almost always combine both: a large dataset gets partitioned into shards, and each shard is independently replicated. Confusing the two — thinking "we added replicas" solves a storage-capacity problem, or "we added shards" solves a fault-tolerance problem — is a common and costly design mistake, because each pattern solves a problem the other doesn't touch at all.</p>

<h3>12.2 — Replication strategies</h3>
<table>
<tr><th>Strategy</th><th>Mechanism</th><th>Trade-off</th></tr>
<tr><td>Single-leader</td><td>One node accepts all writes; followers replicate from it asynchronously or synchronously</td><td>Simple, strong consistency achievable on the leader; leader is a single point of failure and a write bottleneck</td></tr>
<tr><td>Multi-leader</td><td>Several nodes accept writes independently, replicate to each other</td><td>No single write bottleneck, tolerates a region going down; conflicting concurrent writes to the same record must be resolved somehow</td></tr>
<tr><td>Leaderless</td><td>Any node can accept a write; a client (or coordinator) writes to several nodes and reads from several, relying on quorum overlap for consistency</td><td>No leader election needed at all; consistency depends entirely on read/write quorum math, covered in §12.3</td></tr>
</table>
<p>Chapter 11's Raft leader <em>is</em> a single-leader replication scheme — every write goes through the elected leader, which then replicates to followers. This chapter's single-leader strategy is that same idea, generalized past the specific consensus mechanism used to elect the leader.</p>

<h3>12.3 — Leaderless replication and the quorum formula</h3>
<p>Leaderless replication (used by Cassandra, DynamoDB, and Riak) writes to <em>W</em> out of <em>N</em> replicas and reads from <em>R</em> out of <em>N</em> replicas, for configurable <em>W</em> and <em>R</em>. The guarantee — that at least one node in any read overlaps with any write — holds exactly when <strong>W + R &gt; N</strong>, which is the same majority-overlap argument from Chapter 11's consensus proof, generalized: instead of requiring a majority for every operation, you choose how much of the quorum goes to writes versus reads.</p>
<div class="callout"><span class="lbl">Tuning the trade-off</span>W=N, R=1 makes every write wait for every replica (slow writes, fast reads, no fault tolerance for writes). W=1, R=N is the mirror image. W=⌈(N+1)/2⌉, R=⌈(N+1)/2⌉ — both close to a majority — balances the two, which is why "quorum reads and writes" as a phrase usually means this balanced configuration specifically, even though the formula permits many other valid splits.</div>

<h3>12.4 — Partitioning strategies</h3>
<table>
<tr><th>Strategy</th><th>Mechanism</th><th>Trade-off</th></tr>
<tr><td>Range partitioning</td><td>Keys are sorted; contiguous ranges are assigned to each shard (shard 1: A–M, shard 2: N–Z)</td><td>Efficient range queries (all of "A–M" is one shard); vulnerable to hot spots if writes cluster in one range (e.g., timestamp-keyed data all landing on the newest shard)</td></tr>
<tr><td>Hash partitioning</td><td>A hash function maps each key to a shard, spreading keys pseudo-randomly</td><td>Even load distribution, no hot spots from key clustering; range queries now require fanning out to every shard, since sorted order is destroyed</td></tr>
<tr><td>Consistent hashing</td><td>Hash partitioning where shards occupy positions on a ring, and adding/removing a shard only remaps the keys adjacent to it on the ring — not the whole keyspace</td><td>Solves hash partitioning's worst operational problem (adding one node forces remapping most keys with plain hashing); adds implementation complexity</td></tr>
</table>

<h3>12.5 — Worked example: consistent hashing, built and tested</h3>
<p>The problem consistent hashing solves, made concrete: with plain hash partitioning (<code class="inline">hash(key) % N</code>), adding one node changes <em>N</em>, which changes the result of <code class="inline">% N</code> for nearly every key — a single node addition can force re-shuffling most of the dataset. Consistent hashing fixes this by placing shards on a ring and assigning each key to the next shard clockwise from its hash position; adding a shard only steals keys from its immediate neighbor on the ring, leaving everyone else untouched.</p>

<div class="codewin">
<div class="bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="fname">consistent_hash.rs</span></div>
<pre><code><span class="kw">use</span> std::collections::BTreeMap;
<span class="kw">use</span> std::hash::{Hash, Hasher};
<span class="kw">use</span> std::collections::hash_map::DefaultHasher;

<span class="kw">fn</span> <span class="fn">hash_of</span>&lt;T: Hash&gt;(t: &amp;T) -&gt; u64 {
    <span class="kw">let mut</span> h = DefaultHasher::new();
    t.hash(&amp;<span class="kw">mut</span> h);
    h.finish()
}

<span class="cm">// BTreeMap keeps ring positions sorted, so "find the next node
// clockwise" is a single O(log N) range query — range() from a point
// to the max, take the first result, wrapping to the smallest key if
// nothing is found (the ring wraps around).</span>
<span class="kw">pub struct</span> <span class="ty">ConsistentHashRing</span> {
    ring: BTreeMap&lt;u64, <span class="ty">String</span>&gt;,           <span class="cm">// ring position -> node id</span>
    virtual_nodes_per_shard: u32,
}

<span class="kw">impl</span> <span class="ty">ConsistentHashRing</span> {
    <span class="kw">pub fn</span> <span class="fn">new</span>(virtual_nodes_per_shard: u32) -&gt; <span class="ty">Self</span> {
        <span class="ty">Self</span> { ring: BTreeMap::new(), virtual_nodes_per_shard }
    }

    <span class="cm">// Each physical shard is placed at MULTIPLE points on the ring
    // ("virtual nodes"). Without this, a single physical shard could
    // own a disproportionately large arc of the ring purely by luck
    // of its hash value — virtual nodes average that out, so load
    // stays roughly even across shards regardless of hash luck.</span>
    <span class="kw">pub fn</span> <span class="fn">add_shard</span>(&amp;<span class="kw">mut self</span>, shard_id: &amp;<span class="kw">str</span>) {
        <span class="kw">for</span> i <span class="kw">in</span> <span class="nu">0</span>..<span class="kw">self</span>.virtual_nodes_per_shard {
            <span class="kw">let</span> vnode_key = <span class="kw">format!</span>(<span class="st">"{}#{}"</span>, shard_id, i);
            <span class="kw">let</span> pos = hash_of(&amp;vnode_key);
            <span class="kw">self</span>.ring.insert(pos, shard_id.to_string());
        }
    }

    <span class="kw">pub fn</span> <span class="fn">remove_shard</span>(&amp;<span class="kw">mut self</span>, shard_id: &amp;<span class="kw">str</span>) {
        <span class="kw">self</span>.ring.retain(|_, v| v != shard_id);
    }

    <span class="kw">pub fn</span> <span class="fn">shard_for_key</span>(&amp;<span class="kw">self</span>, key: &amp;<span class="kw">str</span>) -&gt; Option&lt;&amp;<span class="ty">String</span>&gt; {
        <span class="kw">let</span> pos = hash_of(&amp;key);
        <span class="cm">// First entry at or after \`pos\` — the next node clockwise.</span>
        <span class="kw">self</span>.ring.range(pos..).next()
            .or_else(|| <span class="kw">self</span>.ring.iter().next()) <span class="cm">// wrap around the ring</span>
            .map(|(_, shard)| shard)
    }
}
</code></pre>
</div>

<div class="codewin">
<div class="bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="fname">consistent_hash_test.rs — demonstrating the actual guarantee</span></div>
<pre><code><span class="kw">#[cfg(test)]</span>
<span class="kw">mod</span> tests {
    <span class="kw">use super</span>::*;

    <span class="kw">#[test]</span>
    <span class="kw">fn</span> <span class="fn">adding_a_shard_only_remaps_a_fraction_of_keys</span>() {
        <span class="kw">let mut</span> ring = ConsistentHashRing::new(<span class="nu">100</span>);
        <span class="kw">for</span> shard <span class="kw">in</span> [<span class="st">"shard-a"</span>, <span class="st">"shard-b"</span>, <span class="st">"shard-c"</span>] {
            ring.add_shard(shard);
        }

        <span class="kw">let</span> keys: Vec&lt;<span class="ty">String</span>&gt; = (<span class="nu">0</span>..<span class="nu">10_000</span>).map(|i| <span class="kw">format!</span>(<span class="st">"key-{}"</span>, i)).collect();
        <span class="kw">let</span> before: Vec&lt;_&gt; = keys.iter()
            .map(|k| ring.shard_for_key(k).unwrap().clone())
            .collect();

        ring.add_shard(<span class="st">"shard-d"</span>);  <span class="cm">// the operation under test</span>

        <span class="kw">let</span> after: Vec&lt;_&gt; = keys.iter()
            .map(|k| ring.shard_for_key(k).unwrap().clone())
            .collect();

        <span class="kw">let</span> moved = before.iter().zip(after.iter()).filter(|(b, a)| b != a).count();

        <span class="cm">// With 4 shards after the addition, a naive hash % N scheme would
        // remap roughly 75% of keys (everything not already on the
        // new shard's exact modulo class). Consistent hashing should
        // remap close to 1/4 of keys — only those that now fall
        // between shard-d's ring positions and their previous owner.
        // This assertion is the whole point of the pattern, made
        // observable rather than asserted by authority.</span>
        <span class="kw">let</span> fraction_moved = moved <span class="kw">as</span> f64 / keys.len() <span class="kw">as</span> f64;
        <span class="kw">assert!</span>(fraction_moved &lt; <span class="nu">0.35</span>,
            <span class="st">"expected roughly 1/4 of keys to move, got {:.1}%"</span>, fraction_moved * <span class="nu">100.0</span>);
    }
}
</code></pre>
</div>
<p>That test is the entire chapter's argument made checkable: run it, and it demonstrates — rather than merely asserts — that consistent hashing's headline property holds. This is worth internalizing as a habit for the rest of the book: wherever a design claims a specific quantitative property ("this only remaps a quarter of keys," "this converges within a few rounds"), write the test that would falsify the claim if it were wrong, rather than trusting the explanation on its own.</p>

<h3>12.6 — Combining both axes: a realistic design</h3>
<p>A dataset too large and too write-heavy for one machine gets both: partitioned (via consistent hashing, §12.5) into N shards, and each shard independently replicated (via single-leader or leaderless replication, §12.2–12.3) across, say, 3 machines for fault tolerance. Losing one machine loses one replica of one shard — the shard keeps serving from its remaining replicas, and the rest of the dataset is entirely unaffected. This is the shape behind most production distributed databases (Cassandra, MongoDB with sharding, CockroachDB) even though their specific replication and partitioning choices differ.</p>

<h3>12.7 — What to carry forward</h3>
<ul>
<li>Keep replication and partitioning as separate questions, always — "we need more replicas" and "we need more shards" solve different problems (fault tolerance/read scale vs. write scale/storage), and conflating them is a recurring, costly mistake in real system design interviews and real production incidents alike.</li>
<li>The quorum formula W + R > N from §12.3 is the same majority-overlap counting argument from Chapter 11, generalized past a strict majority — hold onto this connection; it's the same idea appearing under a third name.</li>
<li>Virtual nodes (§12.5) are a specific instance of a broader pattern — "average out hash-based imbalance by adding redundant hash points" — that reappears in load balancing (Chapter 14) and Bloom filter-adjacent structures; recognize it by its shape, not just its name here.</li>
</ul>

<div class="chapter-eyebrow"><span class="b">Part III — Distributed Systems Fundamentals</span> / Chapter 13</div>
<h2 class="title">Event-Driven and Messaging Architectures</h2>
<div class="deck">Chapter 8 flagged exactly where in-process Observer breaks down: the moment a crash can happen between "event fired" and "handler ran." This chapter picks up there and builds the delivery-guarantee machinery that makes messaging safe across that gap.</div>

<h3>13.1 — What changes when a queue sits between producer and consumer</h3>
<p>In-process Observer (Chapter 8, §8.3) runs every handler synchronously, in the same call stack, on the same machine — if the process is alive, the handler runs; if it crashes mid-call, the entire request fails visibly and nothing is silently lost, because nothing was ever "in flight" independently of the caller. A message queue breaks that assumption entirely: the producer can crash after the message is sent but before it's acknowledged, the consumer can crash after receiving a message but before finishing work on it, and the queue itself can crash or fail over. Every messaging system's design is fundamentally about deciding what happens in each of those crash windows.</p>

<h3>13.2 — Delivery guarantees, precisely defined</h3>
<table>
<tr><th>Guarantee</th><th>What it promises</th><th>What can go wrong anyway</th></tr>
<tr><td>At-most-once</td><td>A message is delivered zero or one times, never more</td><td>Messages can be silently lost — the cheapest guarantee, correct only when losing a message is an acceptable outcome (e.g., a non-critical metrics ping)</td></tr>
<tr><td>At-least-once</td><td>A message is delivered one or more times, never zero</td><td>Duplicates are possible — a consumer that crashes after processing but before acknowledging will see the same message redelivered</td></tr>
<tr><td>Exactly-once</td><td>A message is delivered and processed exactly one time, no losses, no duplicates</td><td>Requires either a genuinely idempotent operation plus at-least-once delivery, or transactional coordination between the queue and the consumer's side effects — true end-to-end exactly-once across independent systems is not achievable without one of those two mechanisms doing the real work</td></tr>
</table>
<p>The common misconception is treating "exactly-once" as something the messaging system alone provides, as a checkbox. In practice, exactly-once processing is <em>at-least-once delivery combined with an idempotent consumer</em> — the queue redelivers messages when acknowledgment is uncertain (favoring duplicates over loss), and the consumer is written so that processing the same message twice produces the same end state as processing it once. This is why idempotency is the more useful concept to actually build than "exactly-once" as an abstract goal.</p>

<h3>13.3 — Building idempotency: the mechanism that makes at-least-once safe</h3>
<p>The standard technique: every message carries a unique idempotency key (often just the message's own ID). The consumer records which keys it has already processed — atomically, alongside the side effect itself — and skips reprocessing on a duplicate delivery.</p>

<div class="codewin">
<div class="bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="fname">idempotent_consumer.rs</span></div>
<pre><code><span class="kw">use</span> std::collections::HashSet;
<span class="kw">use</span> std::sync::Mutex;

<span class="kw">pub struct</span> <span class="ty">Message</span> { <span class="kw">pub</span> id: <span class="ty">String</span>, <span class="kw">pub</span> payload: <span class="ty">String</span> }

<span class="kw">pub struct</span> <span class="ty">IdempotentConsumer</span> {
    <span class="cm">// In production this set lives in the SAME transaction/store as
    // the side effect it guards — a database table with a unique
    // constraint on message_id, updated in the same transaction as
    // the business write. An in-memory HashSet demonstrates the
    // shape; it does NOT survive a consumer crash, which is exactly
    // the gap a real implementation must close.</span>
    processed_ids: Mutex&lt;HashSet&lt;<span class="ty">String</span>&gt;&gt;,
}

<span class="kw">impl</span> <span class="ty">IdempotentConsumer</span> {
    <span class="kw">pub fn</span> <span class="fn">new</span>() -&gt; <span class="ty">Self</span> {
        <span class="ty">Self</span> { processed_ids: Mutex::new(HashSet::new()) }
    }

    <span class="cm">// Returns true if this call actually did the work, false if it was
    // a duplicate and was safely skipped. The caller can use this to
    // distinguish "processed" from "already processed" for logging,
    // without treating a duplicate delivery as an error.</span>
    <span class="kw">pub fn</span> <span class="fn">handle</span>(&amp;<span class="kw">self</span>, msg: &amp;Message) -&gt; bool {
        <span class="kw">let mut</span> seen = <span class="kw">self</span>.processed_ids.lock().unwrap();
        <span class="kw">if</span> seen.contains(&amp;msg.id) {
            <span class="kw">return false</span>; <span class="cm">// duplicate delivery — skip, do not reprocess</span>
        }
        <span class="cm">// Real implementation: this insert and the side effect below
        // must be one atomic transaction. If the side effect runs but
        // the insert doesn't persist before a crash, the message will
        // be reprocessed on redelivery — which is fine, since
        // handle() will simply run again and reach this same check.
        // If the insert persists but the side effect doesn't run, the
        // message is silently lost — this ordering (side effect,
        // then mark-as-seen) is deliberately chosen to avoid that.</span>
        <span class="fn">do_side_effect</span>(&amp;msg.payload);
        seen.insert(msg.id.clone());
        <span class="kw">true</span>
    }
}

<span class="kw">fn</span> <span class="fn">do_side_effect</span>(payload: &amp;<span class="kw">str</span>) { <span class="cm">/* e.g., charge a card, send an email */</span> }
</code></pre>
</div>
<p>The ordering comment is the entire lesson of this section, worth isolating: if you must choose which of "the side effect" and "recording that it happened" runs first, run the side effect first. A crash between the two produces a harmless reprocessing (caught by the idempotency check next time) rather than a silent, permanent loss. This is a general principle for building reliable systems on top of at-least-once delivery, not specific to this example.</p>

<h3>13.4 — Ordering: what a queue does and doesn't guarantee</h3>
<p>A single queue partition (or a single-consumer queue) typically preserves the order messages were produced in. The moment you have multiple partitions or multiple consumers processing in parallel — which you need for throughput — ordering across partitions is no longer guaranteed at all, only ordering <em>within</em> a partition. The standard fix, used by Kafka and similar systems, is to route related messages to the same partition using a partition key (the same consistent-hashing idea from Chapter 12, applied to message routing instead of data storage) — all events for order ID 4471, say, always land on the same partition, so they're processed in order relative to each other, while unrelated orders on other partitions process fully in parallel.</p>

<h3>13.5 — Event-driven architecture: events as the primary integration mechanism</h3>
<p>Event-driven architecture takes Chapter 8's Observer idea and makes it the organizing principle for an entire system, not just one class: services publish events describing what happened ("OrderPlaced," "PaymentFailed"), and other services subscribe to the events they care about, with no service calling another directly. This is Chapter 9's Dependency Rule applied across service boundaries — a service depends on the abstract shape of an event, never on which specific service(s) will react to it, achieving the same "swap or add reactors freely" property Observer gave one class, now at the scale of an entire architecture.</p>
<div class="callout"><span class="lbl">The cost this trades for that decoupling</span>A synchronous call chain (Service A calls B calls C) is easy to trace, easy to reason about failure for (A knows immediately if C failed), and easy to test end-to-end. An event-driven chain trades all three away for decoupling: tracing "what happened after OrderPlaced" now requires following events across services (typically via distributed tracing, Chapter 26), no single service knows whether all interested subscribers succeeded, and testing requires either a real message broker or a careful simulation of one. Event-driven architecture is the right choice when the coupling cost of direct calls is worse than these tracing and testing costs — not a default to reach for on every service boundary.</div>

<h3>13.6 — Dead-letter queues: what happens when a message can never succeed</h3>
<p>At-least-once delivery plus a consumer bug (or a permanently malformed message) creates a risk: a message that fails processing gets redelivered, fails again, forever — consuming resources and potentially blocking other messages behind it in the same partition. A <strong>dead-letter queue</strong> is the standard answer: after N failed processing attempts, the message is moved to a separate queue for manual inspection rather than retried indefinitely, so one poisoned message can't stall the pipeline behind it.</p>

<h3>13.7 — What to carry forward</h3>
<ul>
<li>Treat "exactly-once" as marketing shorthand for "at-least-once plus idempotency" (§13.2–13.3) — asking "is the consumer idempotent?" is a more useful design question than asking "does this queue support exactly-once?"</li>
<li>The side-effect-before-acknowledgment ordering principle in §13.3 generalizes far past messaging — it's the same "which failure mode do I prefer" reasoning that shows up in Chapter 16 (databases, write-ahead logging) and Chapter 10 (which direction CAP forces you to fail in during a partition).</li>
<li>Partition-key routing for ordering (§13.4) is Chapter 12's consistent hashing reused for a new purpose — recognizing the same underlying idea across "where does this data live" and "which consumer processes this event" is exactly the pattern-recognition skill this book is trying to build.</li>
</ul>

<div class="chapter-eyebrow"><span class="b">Part IV — Building Blocks</span> / Chapter 14</div>
<h2 class="title">Load Balancing: Algorithms and Failure Modes</h2>
<div class="deck">Part IV shifts from distributed-systems theory to the concrete pieces you assemble a system out of. Load balancing looks simple — spread requests across servers — until backend capacity varies, health checks lag reality, and the "obvious" algorithm turns out to concentrate load exactly where you didn't want it.</div>

<h3>14.1 — What a load balancer is actually deciding</h3>
<p>Every load-balancing algorithm answers one question, differently: <strong>given N healthy backends and one incoming request, which backend gets it?</strong> The algorithms differ in what information they use to decide — nothing, request count, response time, or a hash of the request itself — and that choice has consequences for fairness, cache locality, and behavior under partial failure that aren't obvious from the algorithm's one-line description.</p>

<h3>14.2 — Round-robin: simple, and simply wrong under uneven capacity</h3>
<p>Round-robin sends requests to backends in fixed rotation — 1, 2, 3, 1, 2, 3 — regardless of how loaded each one currently is. It's the natural first algorithm to reach for, and it's correct only under an assumption that's frequently false in practice: that every backend has identical capacity and every request costs roughly the same to serve. The moment either assumption breaks — one backend is on smaller hardware, or request costs vary widely (a bulk export request versus a single-record lookup) — round-robin distributes request <em>count</em> evenly while distributing actual <em>load</em> unevenly.</p>

<div class="codewin">
<div class="bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="fname">round_robin.rs</span></div>
<pre><code><span class="kw">use</span> std::sync::atomic::{AtomicUsize, Ordering};

<span class="kw">pub struct</span> <span class="ty">RoundRobin</span> {
    backends: Vec&lt;<span class="ty">String</span>&gt;,
    next: AtomicUsize,
}

<span class="kw">impl</span> <span class="ty">RoundRobin</span> {
    <span class="kw">pub fn</span> <span class="fn">pick</span>(&amp;<span class="kw">self</span>) -&gt; &amp;<span class="kw">str</span> {
        <span class="cm">// fetch_add is the same atomic building block from Chapter 4 —
        // no lock needed, since a simple increment is exactly the
        // "hardware has one instruction for this" case that made
        // atomics the right choice back then.</span>
        <span class="kw">let</span> i = <span class="kw">self</span>.next.fetch_add(<span class="nu">1</span>, Ordering::Relaxed) % <span class="kw">self</span>.backends.len();
        &amp;<span class="kw">self</span>.backends[i]
    }
}
</code></pre>
</div>

<h3>14.3 — Weighted round-robin: fixing uneven capacity, not uneven request cost</h3>
<p>Weighted round-robin assigns each backend a weight proportional to its capacity, and sends it a proportional share of requests — a backend with weight 3 gets three requests for every one a weight-1 backend gets. This fixes the "different hardware" half of round-robin's problem. It does <em>not</em> fix the "requests vary in cost" half — a backend can still end up overloaded if it happens to draw a run of expensive requests, because the algorithm has no visibility into how loaded each backend currently is, only how much capacity it was configured with in advance.</p>

<h3>14.4 — Least-connections: reacting to actual load instead of assuming it</h3>
<p>Least-connections tracks how many requests are currently in flight to each backend and routes the next request to whichever has the fewest. This directly addresses round-robin's blind spot — it reacts to real-time load rather than a static assumption — at the cost of requiring the load balancer to track per-backend state, and a subtler cost worth naming explicitly: it optimizes for connection <em>count</em>, which is a proxy for load, not load itself. A backend with two slow, expensive requests in flight can be more loaded than one with five fast, cheap ones, and least-connections can't tell the difference.</p>

<div class="codewin">
<div class="bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="fname">least_connections.rs</span></div>
<pre><code><span class="kw">use</span> std::sync::atomic::{AtomicU32, Ordering};

<span class="kw">pub struct</span> <span class="ty">Backend</span> { <span class="kw">pub</span> addr: <span class="ty">String</span>, <span class="kw">pub</span> in_flight: AtomicU32 }

<span class="kw">pub struct</span> <span class="ty">LeastConnections</span> { backends: Vec&lt;Backend&gt; }

<span class="kw">impl</span> <span class="ty">LeastConnections</span> {
    <span class="kw">pub fn</span> <span class="fn">pick</span>(&amp;<span class="kw">self</span>) -&gt; &amp;Backend {
        <span class="cm">// min_by_key over a live atomic read — this is inherently racy
        // in the strict sense (another thread's pick() can change the
        // count between this read and the caller incrementing it) but
        // that's an accepted, harmless imprecision: worst case, two
        // concurrent picks briefly both choose the same "least loaded"
        // backend, converging back to balanced on the next round.
        // This is a different risk category from Chapter 4's data
        // races — no undefined behavior, just an approximation.</span>
        <span class="kw">self</span>.backends.iter()
            .min_by_key(|b| b.in_flight.load(Ordering::Relaxed))
            .expect(<span class="st">"no backends configured"</span>)
    }

    <span class="kw">pub fn</span> <span class="fn">on_request_start</span>(&amp;<span class="kw">self</span>, backend: &amp;Backend) {
        backend.in_flight.fetch_add(<span class="nu">1</span>, Ordering::Relaxed);
    }
    <span class="kw">pub fn</span> <span class="fn">on_request_end</span>(&amp;<span class="kw">self</span>, backend: &amp;Backend) {
        backend.in_flight.fetch_sub(<span class="nu">1</span>, Ordering::Relaxed);
    }
}
</code></pre>
</div>
<p>The comment above is worth pausing on, because it directly connects back to Chapter 4: <code class="inline">min_by_key</code> reading a value that another thread might change a moment later is technically a race in the informal sense, but not a <em>data race</em> in Chapter 4's precise definition — every individual access to <code class="inline">in_flight</code> goes through an atomic operation, so there's no undefined behavior, only an accepted staleness in the decision. Distinguishing "this could theoretically produce a rare suboptimal outcome" from "this is undefined behavior" is a skill worth having, and this is a clean example to anchor it to.</p>

<h3>14.5 — Consistent-hash load balancing: routing for cache locality</h3>
<p>Sometimes the goal isn't spreading load evenly at all — it's ensuring the <em>same</em> client or key consistently reaches the <em>same</em> backend, so that backend's local cache stays warm for that client instead of every request being a cold cache miss on a randomly chosen server. This reuses Chapter 12's consistent-hashing ring directly, with client ID or request key as the hash input instead of a database key — the third time this book has repurposed that exact structure for a different problem, which is itself the point: the ring is a general tool for "map many things to few buckets, stably," not a database-specific technique.</p>

<h3>14.6 — Failure mode: health checks lag reality</h3>
<p>Every algorithm above assumes the load balancer's view of "which backends are healthy" is accurate — and that view is only ever as fresh as the last health check. A backend that fails between health checks keeps receiving traffic until the next check catches it, and a backend that's overloaded but still technically responding to a shallow health check (a simple TCP connect, or an endpoint that returns 200 without exercising the real code path) can look healthy while every real request it receives times out.</p>
<table>
<tr><th>Health check depth</th><th>Catches</th><th>Misses</th></tr>
<tr><td>TCP connect check</td><td>Process is down or unreachable</td><td>Process alive but deadlocked, out of resources, or serving errors</td></tr>
<tr><td>Shallow HTTP check (e.g. <code class="inline">GET /health</code> returning 200 unconditionally)</td><td>Web server thread is responsive</td><td>Downstream dependency (database, cache) the real endpoints need is down</td></tr>
<tr><td>Deep health check (exercises a real code path, e.g. a lightweight DB query)</td><td>Most realistic failures</td><td>Costs more per check; can itself become a load source if checked too frequently</td></tr>
</table>
<div class="callout"><span class="lbl">The trade-off underneath the table</span>A deeper health check catches more real failures but costs more to run and can produce false negatives under load (the health check itself times out because the backend is momentarily busy, even though it would have served a real request fine). There's no universally correct depth — it's the latency/resource cost trade-off from Chapter 2 again, applied to the question "how much do I trust what this backend just told me."</div>

<h3>14.7 — Failure mode: retries can turn a partial outage into a total one</h3>
<p>A subtler failure: if one backend starts failing and the load balancer retries failed requests against a different backend, that's usually correct — until the failure was caused by <em>overload</em> rather than a crash. Retrying an overloaded backend's failed requests elsewhere increases load on the remaining healthy backends, which can push them into overload too, which triggers more retries, in a feedback loop that turns "one backend is struggling" into "the whole cluster falls over." The standard mitigation is retry budgets (capping the fraction of traffic that's allowed to be retries) combined with exponential backoff — deliberately not retrying instantly, so a struggling backend gets a chance to recover instead of being hit immediately again by every client that just failed against it.</p>

<h3>14.8 — What to carry forward</h3>
<ul>
<li>Match the algorithm to what actually varies in your system: uniform backends and uniform request cost → round-robin is fine; uneven capacity → weighted round-robin; uneven, unpredictable request cost → least-connections; cache locality matters more than perfect balance → consistent hashing.</li>
<li>The race-vs-data-race distinction in §14.4 is worth keeping sharp — Chapter 4 defined data races precisely so that "some staleness in a load-balancing decision" and "undefined behavior" don't get conflated; they're different categories of risk with very different consequences.</li>
<li>The retry-storm failure mode in §14.7 is a preview of Chapter 26 (observability) and Chapter 28 (performance engineering) — cascading failure patterns like this are usually invisible until you have the tracing and metrics to see load shifting between backends in real time, which is exactly the case those later chapters build for.</li>
</ul>

<h3>15.1 — Why caching works: revisiting Chapter 2's table</h3>
<p>Caching exists entirely because of the latency table from Chapter 2, §2.1 — an L1/L2/RAM lookup is roughly 100,000 to 100,000,000 times faster than a cross-region network round trip or a disk seek. A cache is a bet: that recently or frequently accessed data is disproportionately likely to be requested again soon, so keeping a copy on the cheap side of that ratio pays for the (small) cost of maintaining the cache itself. Every caching decision in this chapter is really a decision about how confident that bet is for a specific piece of data.</p>

<h3>15.2 — Eviction policies: what to remove when the cache is full</h3>
<table>
<tr><th>Policy</th><th>Evicts</th><th>Best suited for</th></tr>

<p>An LRU cache needs O(1) lookup by key and O(1) "move this to most-recently-used position" — which rules out a plain array (O(n) to reorder) and motivates the classic combination: a hash map for O(1) lookup, pointing into a doubly linked list that tracks recency order, so moving an item to the front is a pointer relink, not a shift.</p>

<h3>15.5 — Invalidation: the actually hard half of the joke</h3>
<p>Eviction (§15.2) answers "what happens when the cache is full." Invalidation answers a harder question: "how does the cache find out the underlying data changed, so it can stop serving a stale copy?" Three strategies, in increasing order of correctness and decreasing order of simplicity:</p>
<table>
<tr><th>Strategy</th><th>Mechanism</th><th>Failure mode</th></tr>
<tr><td>TTL expiration only</td><td>Cached values expire unconditionally after a fixed duration; no explicit invalidation logic exists</td><td>Simple and robust, but every cached value can be stale for up to the full TTL window after an underlying change — correct only when that staleness window is acceptable</td></tr>
<tr><td>Write-through invalidation</td><td>Whenever the underlying data changes, the code path that changes it also explicitly evicts or updates the corresponding cache entry</td><td>Requires every write path to remember to invalidate — miss one (a batch job, an admin console, a second service writing to the same database) and that entry goes stale with no TTL safety net if none is also configured</td></tr>
<tr><td>Event-driven invalidation</td><td>The data store emits a change event (e.g., a database change-data-capture stream) that a subscriber uses to invalidate the relevant cache entries</td><td>More robust than write-through (catches every write path automatically, since it listens to the source of truth rather than trusting each writer to remember), but adds the event-delivery complexity from Chapter 13 — including its own at-least-once/ordering considerations</td></tr>
</table>
<div class="callout"><span class="lbl">The practical default</span>Use write-through invalidation combined with a TTL as a safety net, not either alone — the TTL bounds the damage of any invalidation path you missed, and explicit invalidation keeps normal-case staleness far shorter than the TTL alone would allow. This combination is the actual answer most production caches converge on, even though textbook treatments often present the three strategies as mutually exclusive choices.</div>

<h3>15.6 — Coherence: the same problem, multiplied across cache instances</h3>
<p>Everything so far assumed one cache. Scale to multiple application servers, each with its own local in-process cache, and a new problem appears: server A's cache is invalidated correctly, but server B's local copy of the same data doesn't know anything changed. This is <strong>cache coherence</strong>, and it's the same class of problem Chapter 10 covered for data replicas generally — multiple copies of the same logical value that must agree — applied specifically to caches. The two standard fixes are structural: either use a single shared cache (Redis, Memcached) that every server reads from, eliminating per-server copies entirely, or broadcast invalidation events to every server's local cache via the event-driven mechanism from §15.5, accepting the same eventual-consistency window Chapter 10 described for any propagation-based approach.</p>

<h3>15.7 — What to carry forward</h3>
<ul>
<li>Eviction and invalidation are different problems with different failure modes (§15.2 vs. §15.5) — don't let "cache invalidation" as a phrase absorb both; a cache can have a perfect eviction policy and still serve badly stale data if invalidation is weak.</li>
<li>The Rust arena-and-index pattern from §15.3 is worth keeping as a default reflex for any future self-referential data structure in this book — it will reappear, unnamed, any time a later chapter needs a graph or tree in Rust.</li>
<li>Cache coherence (§15.6) is Chapter 10's replica-consistency problem wearing a new name — recognizing that connection is more valuable than memorizing "coherence" as a separate concept.</li>
</ul>
