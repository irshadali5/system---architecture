<div class="chapter-eyebrow"><span class="b">Part IV — Building Blocks</span> / Chapter 16</div>
<h2 class="title">Databases: SQL, NoSQL, and Why the Trade-offs Exist</h2>
<div class="deck">"SQL vs. NoSQL" is usually taught as a preference, like choosing a programming language. It isn't — every difference between them is a direct, traceable consequence of one design decision: whether the schema is enforced by the database or by the application.</div>

<h3>16.1 — The one decision underneath the whole debate</h3>
<p>A relational (SQL) database enforces a schema at write time — every row must match a defined structure, every foreign key must reference a real row, every column must hold its declared type. A NoSQL database (document, key-value, wide-column, graph — the term covers several genuinely different data models) typically defers that enforcement to the application, storing whatever shape of data is written and trusting the application to be consistent about it. Every other difference people list between "SQL databases" and "NoSQL databases" — flexibility, scalability, join support, consistency guarantees — is a downstream consequence of that one choice, not an independent trade-off.</p>

<h3>16.2 — Tracing the consequences, one at a time</h3>
<table>
<tr><th>Property</th><th>Consequence of enforced schema (SQL)</th><th>Consequence of deferred schema (NoSQL)</th></tr>
<tr><td>Flexibility</td><td>Changing a column's type or adding a required field means a migration touching every existing row — slow and disruptive on a large table</td><td>Different documents in the same collection can have different shapes; adding a field to new records requires no migration of old ones</td></tr>
<tr><td>Joins</td><td>Foreign keys are enforced, so the database can efficiently join related tables at query time — the relational model is built for this</td><td>No enforced foreign keys means no reliable server-side join; related data is either duplicated into each document or joined manually in application code</td></tr>
<tr><td>Horizontal scaling</td><td>Joins and foreign-key constraints require related data to be reachable together, which historically made sharding a relational database across machines hard — a join across shards is expensive or impossible without extra machinery</td><td>No cross-document constraints means each document can live independently on any shard with no correctness risk — sharding is structurally easier because there's nothing to keep "together"</td></tr>
<tr><td>Write validation cost</td><td>Every write is checked against the schema and constraints before being accepted — a small but real per-write cost, paid to guarantee the data is always well-formed</td><td>Writes are accepted with minimal validation — cheaper per write, at the cost of the application needing its own discipline to avoid malformed data accumulating</td></tr>
</table>
<p>Read that table as a chain, not a list: <em>enforced schema → joins are cheap and reliable → related data doesn't need to be duplicated → but related data needs to live near itself for joins to stay cheap → which makes horizontal partitioning harder.</em> Each SQL property traces back to the same root decision, and each NoSQL property is the mirror consequence of not making that decision. Once you see the chain, "SQL vs. NoSQL" stops being two unrelated feature lists to memorize and becomes one lever with predictable effects on both ends.</p>

<h3>16.3 — Why this connects directly to Chapter 12</h3>
<p>The horizontal-scaling row above is the exact partitioning problem from Chapter 12, revisited from a schema angle instead of a hashing angle: a relational database's foreign-key constraints are, structurally, a promise that related rows are reachable together — which is precisely the property consistent hashing's shard-independence assumption doesn't require. This is why "just shard the SQL database" is harder in practice than "just shard the NoSQL store" — it isn't that relational databases are technically incapable of sharding (many do it well, with careful key design), it's that the enforced relationships from §16.1 make sharding require deliberate, careful design rather than falling out for free.</p>

<h3>16.4 — Indexes: the same trade-off, one level down</h3>
<p>An index is Chapter 2's cost-model lesson applied directly to databases: it pays write cost (every insert must also update the index's structure) to buy read cost down (a lookup becomes O(log n) via a B-tree or O(1) via a hash index, instead of an O(n) full table scan). This is worth stating explicitly because it resolves a common confusion — "why not just index every column" — with the same answer Chapter 2 gave for batching: <strong>there is no free axis to improve.</strong> Every index added slows down every write that touches the indexed column, and consumes storage, in exchange for faster reads on queries that use it. Indexing every column optimizes reads at a write cost that's rarely worth paying for columns nothing actually queries by.</p>

<h3>16.5 — Worked example: modeling the same data both ways</h3>
<p>Take a blog: posts, each with an author and a list of comments. Model it relationally, then as documents, and watch the schema-enforcement decision from §16.1 produce every downstream difference directly.</p>

<div class="codewin">
<div class="bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="fname">schema.sql — relational model</span></div>
<pre><code><span class="kw">CREATE TABLE</span> authors (
    id          <span class="ty">SERIAL PRIMARY KEY</span>,
    name        <span class="ty">TEXT NOT NULL</span>
);

<span class="kw">CREATE TABLE</span> posts (
    id          <span class="ty">SERIAL PRIMARY KEY</span>,
    author_id   <span class="ty">INTEGER NOT NULL REFERENCES</span> authors(id),
    title       <span class="ty">TEXT NOT NULL</span>,
    body        <span class="ty">TEXT NOT NULL</span>
);

<span class="kw">CREATE TABLE</span> comments (
    id          <span class="ty">SERIAL PRIMARY KEY</span>,
    post_id     <span class="ty">INTEGER NOT NULL REFERENCES</span> posts(id),
    body        <span class="ty">TEXT NOT NULL</span>
);

<span class="cm">-- Fetching a post with its author and all comments is ONE query,
-- and the database guarantees comments.post_id always points to a
-- real post -- that guarantee is enforced at write time, for free,
-- by the REFERENCES constraint. This is the direct payoff of
-- section 16.1's schema-enforcement decision.</span>
<span class="kw">SELECT</span> posts.title, authors.name, comments.body
<span class="kw">FROM</span> posts
<span class="kw">JOIN</span> authors <span class="kw">ON</span> posts.author_id = authors.id
<span class="kw">JOIN</span> comments <span class="kw">ON</span> comments.post_id = posts.id
<span class="kw">WHERE</span> posts.id = <span class="nu">42</span>;
</code></pre>
</div>

<div class="codewin">
<div class="bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="fname">post_document.json — document model</span></div>
<pre><code>{
  <span class="st">"_id"</span>: <span class="st">"post_42"</span>,
  <span class="st">"title"</span>: <span class="st">"..."</span>,
  <span class="st">"body"</span>: <span class="st">"..."</span>,
  <span class="cm">// Author is DENORMALIZED -- copied into every post -- rather than
  // referenced. There is no enforced foreign key, so the database
  // cannot guarantee this author data is current if the author's
  // real name changes elsewhere. That's the trade section 16.2
  // predicted: no cross-document constraint, so no reliable join,
  // so related data gets duplicated instead.</span>
  <span class="st">"author"</span>: { <span class="st">"name"</span>: <span class="st">"..."</span> },
  <span class="st">"comments"</span>: [
    { <span class="st">"body"</span>: <span class="st">"..."</span> },
    { <span class="st">"body"</span>: <span class="st">"..."</span> }
  ]
}
<span class="cm">// Fetching this post with its author and comments is ONE lookup by
// _id -- no join needed, because everything needed is already
// embedded in the one document. The cost was paid earlier, at write
// time: if the author's name changes, every post document embedding
// it needs updating, not just one row in an authors table.</span>
</code></pre>
</div>

<p>Neither model is more "correct" — they're optimized for different access patterns. The relational model is better when comments and authors are frequently updated independently of posts, or queried on their own (e.g., "show all posts by this author," which is a simple indexed lookup relationally, but requires scanning every post document in the denormalized model unless a separate index is built for it). The document model is better when "fetch one post with everything needed to render it" is the overwhelmingly dominant access pattern, and author/comment updates are rare enough that the duplication cost is worth paying for the read-time simplicity.</p>

<h3>16.6 — A decision framework, not a preference</h3>
<div class="callout"><span class="lbl">The question to actually ask</span>Not "SQL or NoSQL, which is better" but: <strong>does this data have relationships that are frequently queried across, and does the data change in ways that would make duplication a correctness risk?</strong> If yes to both, the enforced-schema, join-capable side of the trade-off is worth its write cost and scaling friction. If the dominant pattern is "fetch one self-contained object by key, rarely if ever needing to join across many," the deferred-schema side's read-time simplicity and scaling ease are worth the loss of cross-record guarantees. Most real systems use both, for different pieces of their data — exactly the same per-data-type discipline Chapter 10 argued for with consistency models, now applied to schema strictness.</div>

<h3>16.7 — What to carry forward</h3>
<ul>
<li>Trace every SQL-vs-NoSQL claim back to §16.1's single root decision — it turns a long list of things to memorize into one cause with predictable effects, the same simplification Chapter 5 did for SOLID's five letters.</li>
<li>The indexing trade-off in §16.4 is Chapter 2's cost-model lens applied precisely — "why not index everything" always has the same answer as "why not cache everything" or "why not replicate everything": nothing is free, only rebalanced.</li>
<li>§16.6's decision framework — per-data-type, not per-system — is the same discipline Chapter 10 built for consistency models; hold both side by side, since a real system's data inventory (Chapter 10, §10.5) usually needs a schema-strictness answer alongside its consistency-model answer for each piece of state.</li>
</ul>

<div class="chapter-eyebrow"><span class="b">Part IV — Building Blocks</span> / Chapter 17</div>
<h2 class="title">Queues and Streaming Systems</h2>
<div class="deck">Chapter 13 covered delivery guarantees in the abstract. This chapter builds the concrete data structure underneath most real message queues — a ring buffer — and uses it to make the queue-vs-stream distinction, and backpressure, tangible instead of definitional.</div>

<h3>17.1 — Queue vs. stream: a genuinely different data model, not a synonym pair</h3>
<p>The terms get used loosely enough that many engineers treat "queue" and "stream" as interchangeable marketing words for "message broker." They describe two different consumption models with real consequences:</p>
<table>
<tr><th>Model</th><th>Once consumed</th><th>Multiple consumers</th><th>Typical use</th></tr>
<tr><td>Queue (e.g. RabbitMQ, SQS)</td><td>Message is removed — one consumer gets it, then it's gone</td><td>Competing consumers — each message goes to exactly one consumer in a pool, distributing work</td><td>Task distribution: "process this job," where exactly one worker should handle each job</td></tr>
<tr><td>Stream (e.g. Kafka, Pulsar)</td><td>Message stays in the log — consumption doesn't delete it</td><td>Each consumer group reads the full stream independently, at its own pace, from its own position</td><td>Event broadcasting: "this happened," where every interested service needs to see every event, independently</td></tr>
</table>
<p>This is a real design decision, not a vocabulary choice: if three different services each need to react to "OrderPlaced," a queue's competing-consumers model would deliver each event to only <em>one</em> of the three, since a queue message is meant to be claimed once — which is wrong for this use case, and a common mistake when a queue is reached for by habit. A stream, where each service maintains its own independent read position over the same durable log, is the correct model for "multiple independent parties need to see every event."</p>

<h3>17.2 — The data structure underneath: a ring buffer</h3>
<p>Whether built as a queue or a stream, the core data structure at the heart of most message broker implementations is a <strong>ring buffer</strong> (circular buffer) — a fixed-size array where a write pointer and read pointer both advance forward and wrap around to the start when they hit the end, avoiding the need to shift elements or reallocate as messages are produced and consumed. Building one directly makes backpressure — what happens when producers outpace consumers — concrete instead of abstract.</p>

<div class="codewin">
<div class="bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="fname">ring_buffer.rs</span></div>
<pre><code><span class="kw">pub struct</span> <span class="ty">RingBuffer</span>&lt;T&gt; {
    buffer: Vec&lt;Option&lt;T&gt;&gt;,
    capacity: usize,
    write_pos: usize,
    read_pos: usize,
    len: usize,          <span class="cm">// tracked separately -- write_pos == read_pos is
                          // ambiguous between "empty" and "full" on its own</span>
}

<span class="kw">impl</span>&lt;T&gt; <span class="ty">RingBuffer</span>&lt;T&gt; {
    <span class="kw">pub fn</span> <span class="fn">new</span>(capacity: usize) -&gt; <span class="ty">Self</span> {
        <span class="kw">let mut</span> buffer = Vec::with_capacity(capacity);
        buffer.resize_with(capacity, || <span class="ty">None</span>);
        <span class="ty">Self</span> { buffer, capacity, write_pos: <span class="nu">0</span>, read_pos: <span class="nu">0</span>, len: <span class="nu">0</span> }
    }

    <span class="cm">// Returns false -- the write is REJECTED -- when the buffer is
    // full. This single line IS backpressure: the producer's own
    // call site is where the decision "what do I do when the
    // consumer can't keep up" gets made, explicitly, rather than
    // silently growing memory without bound.</span>
    <span class="kw">pub fn</span> <span class="fn">try_push</span>(&amp;<span class="kw">mut self</span>, item: T) -&gt; bool {
        <span class="kw">if</span> <span class="kw">self</span>.len == <span class="kw">self</span>.capacity {
            <span class="kw">return false</span>; <span class="cm">// buffer full -- producer must decide what happens next</span>
        }
        <span class="kw">self</span>.buffer[<span class="kw">self</span>.write_pos] = Some(item);
        <span class="kw">self</span>.write_pos = (<span class="kw">self</span>.write_pos + <span class="nu">1</span>) % <span class="kw">self</span>.capacity; <span class="cm">// wrap around</span>
        <span class="kw">self</span>.len += <span class="nu">1</span>;
        <span class="kw">true</span>
    }

    <span class="kw">pub fn</span> <span class="fn">try_pop</span>(&amp;<span class="kw">mut self</span>) -&gt; Option&lt;T&gt; {
        <span class="kw">if</span> <span class="kw">self</span>.len == <span class="nu">0</span> { <span class="kw">return None</span>; }
        <span class="kw">let</span> item = <span class="kw">self</span>.buffer[<span class="kw">self</span>.read_pos].take();
        <span class="kw">self</span>.read_pos = (<span class="kw">self</span>.read_pos + <span class="nu">1</span>) % <span class="kw">self</span>.capacity;
        <span class="kw">self</span>.len -= <span class="nu">1</span>;
        item
    }

    <span class="kw">pub fn</span> <span class="fn">is_full</span>(&amp;<span class="kw">self</span>) -&gt; bool { <span class="kw">self</span>.len == <span class="kw">self</span>.capacity }
}
</code></pre>
</div>

<h3>17.3 — Backpressure: three honest options, no fourth one</h3>
<p><code class="inline">try_push</code> returning <code class="inline">false</code> forces a decision that an unbounded queue lets you avoid — and avoiding it is not actually safe, it just defers the failure to a worse moment (out-of-memory, once an unbounded buffer has silently grown until the process is killed). Once a producer outpaces a consumer, there are exactly three honest responses:</p>
<table>
<tr><th>Response</th><th>Mechanism</th><th>Cost</th></tr>
<tr><td>Block the producer</td><td><code class="inline">try_push</code> failing causes the producer to wait/retry until space frees up</td><td>Producer's throughput becomes capped by the consumer's speed — correct when the producer can tolerate slowing down (e.g., an internal batch job)</td></tr>
<tr><td>Drop the message</td><td>A full buffer causes the new message to be discarded, either silently or after logging</td><td>Data loss, but bounded memory and an always-responsive producer — correct for data where losing some is acceptable (e.g., non-critical metrics, matching Chapter 13's at-most-once case)</td></tr>
<tr><td>Grow the buffer</td><td>The buffer is allowed to expand, at least up to some large but still finite bound</td><td>Delays the problem rather than solving it — memory grows unboundedly if the mismatch is sustained rather than a brief burst, and the "finite bound" is really just a slower version of blocking or dropping once actually reached</td></tr>
</table>
<p>There is no fourth option that avoids all three costs — "just handle more messages per second" is a capacity problem (Chapter 12's partitioning, or more consumer instances), not a backpressure-strategy problem, and doesn't make the choice among these three go away when a burst temporarily exceeds even a scaled-up capacity.</p>

<h3>17.4 — Why a stream additionally needs an offset, not just a queue position</h3>
<p>A queue's ring buffer needs one read position, because there's one logical consumer position to track (or one per competing consumer, sharing the same underlying pool). A stream needs a separate, independently-advancing <strong>offset</strong> per consumer group, since each group reads the full log at its own pace, and none of them remove messages on read — the underlying storage is closer to Chapter 15's append-only log intuition (or a database's write-ahead log, foreshadowing Chapter 16's indexing discussion from the durability angle) than to the consuming ring buffer above. This is the structural reason streams support replay — a new consumer group, or an existing one recovering from a crash, can set its offset back to an earlier point and reread history — while a queue, once a message is popped, has nothing left to replay.</p>

<div class="callout"><span class="lbl">Connecting back to Chapter 13</span>Replay is what makes exactly-once-style idempotent processing (Chapter 13, §13.3) practical to recover from a crash: a consumer that crashes mid-batch can restart from its last committed offset and reprocess the same range of messages — safely, because the idempotency key check from Chapter 13 makes reprocessing a no-op rather than a duplicate side effect. Streams and idempotent consumers are designed to be used together; neither is a complete answer to reliable processing on its own.</div>

<h3>17.5 — What to carry forward</h3>
<ul>
<li>Queue vs. stream (§17.1) is a genuine architectural decision based on "does exactly one consumer need this, or does every interested party need to see it independently" — not a synonym choice, and picking wrong produces silent data-routing bugs (services missing events they should have received).</li>
<li>Every backpressure strategy is one of exactly three trade-offs (§17.3): slow the producer, lose data, or delay the problem with more memory. Any system design answer to "what happens when producers outpace consumers" should map to one of these three, explicitly, rather than leaving it unaddressed.</li>
<li>Stream replay (§17.4) combined with Chapter 13's idempotent consumer is the practical foundation of reliable stream processing — hold both together; Chapter 22 (news feed case study) and Chapter 31 (the distributed KV store capstone) both lean on this combination directly.</li>
</ul>

</div>

const CH18 = `
<div class="chapter-eyebrow"><span class="b">Part IV — Building Blocks</span> / Chapter 18</div>
<h2 class="title">API Design: REST, gRPC, and Schema Evolution</h2>
<div class="deck">Closing Part IV. REST and gRPC get compared by syntax — JSON versus binary, verbs versus method calls — when the decision that actually matters is upstream of both: how tightly client and server are allowed to know about each other's shape, and what happens when that shape needs to change.</div>

<h3>18.1 — REST and gRPC are answers to a coupling question, not a format preference</h3>
<p>REST, at its most disciplined, models an API as resources (nouns) manipulated through a fixed, small set of HTTP verbs (GET, POST, PUT, DELETE) — the client and server agree on resource shapes (typically JSON), but the verbs themselves are generic and don't need per-endpoint agreement. gRPC models an API as remote procedure calls — client and server share a strict, code-generated contract (a <code class="inline">.proto</code> file) describing exact method signatures and message types, compiled into typed client and server stubs in each language.</p>
<p>The real trade-off is this: <strong>gRPC's generated stubs make a mismatch between client and server expectations a compile-time or codegen-time error; REST with JSON makes the same mismatch a runtime surprise</strong> — a field renamed on the server silently becomes <code class="inline">null</code> on an old client instead of failing to build. This is the exact "compiler catches it vs. discipline catches it" axis from every prior chapter (Chapters 1, 3, 4, 9), now applied to the boundary between two separately-deployed services instead of two modules in one codebase.</p>

<table>
<tr><th>Property</th><th>REST + JSON</th><th>gRPC + Protobuf</th></tr>
<tr><td>Contract enforcement</td><td>Convention (often OpenAPI docs) — nothing stops a server from returning a shape the docs don't describe</td><td>Generated code — client and server stubs are produced from the same <code class="inline">.proto</code> file, so a mismatch is caught at build time on whichever side updates second</td></tr>
<tr><td>Payload size / speed</td><td>Text-based JSON — human-readable, larger on the wire, slower to parse</td><td>Binary Protobuf — smaller, faster to serialize/deserialize; not human-readable without tooling</td></tr>
<tr><td>Browser support</td><td>Native — any HTTP client works</td><td>Requires gRPC-Web or a proxy for browser clients; native gRPC assumes HTTP/2-capable clients like services calling other services</td></tr>
<tr><td>Streaming</td><td>Not natively part of the model; typically bolted on via WebSockets or long polling</td><td>Native bidirectional streaming, built into the protocol</td></tr>
</table>

<p>This maps cleanly onto where each is actually used in practice: REST dominates public, browser-facing APIs (broad client compatibility matters more than a strict shared contract with every consumer), while gRPC dominates internal service-to-service calls (all callers are your own services, so a shared, code-generated contract is easy to enforce and the performance gain compounds across a high volume of internal calls).</p>

<h3>18.2 — The harder problem underneath both: schema evolution</h3>
<p>Neither format choice touches the actual hard problem in API design: <strong>how do you change a message shape without breaking every client that hasn't updated yet?</strong> In a system with independently deployed clients and servers — mobile apps users haven't updated, other teams' services calling yours — you cannot assume both sides deploy simultaneously. The API must support a window where old and new versions of the contract coexist, correctly.</p>

<h3>18.3 — Protobuf's field numbers: evolution built into the wire format</h3>
<p>Protobuf's design choice that makes evolution tractable, made concrete: every field in a message is identified on the wire by a <strong>number</strong>, not by name — the field name is a compile-time convenience for generated code, but what's actually transmitted is <code class="inline">field_number: value</code> pairs. This single design decision is what makes the rules below work.</p>

<div class="codewin">
<div class="bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="fname">order.proto — version 1</span></div>
<pre><code><span class="kw">message</span> <span class="ty">Order</span> {
    <span class="ty">string</span> sku = <span class="nu">1</span>;
    <span class="ty">int32</span> quantity = <span class="nu">2</span>;
    <span class="ty">double</span> amount = <span class="nu">3</span>;
}
</code></pre>
</div>

<div class="codewin">
<div class="bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="fname">order.proto — version 2, evolved safely</span></div>
<pre><code><span class="kw">message</span> <span class="ty">Order</span> {
    <span class="ty">string</span> sku = <span class="nu">1</span>;
    <span class="ty">int32</span> quantity = <span class="nu">2</span>;
    <span class="ty">double</span> amount = <span class="nu">3</span>;
    <span class="cm">// A NEW field, added with a NEW, never-before-used number. An old
    // client that doesn't know about field 4 simply ignores it on
    // the wire -- it isn't an error, it's silently skipped. A new
    // server reading a message from an old client that never sends
    // field 4 gets Protobuf's defined default (empty string) for it.
    // Both directions degrade gracefully instead of failing.</span>
    <span class="ty">string</span> discount_code = <span class="nu">4</span>;

    <span class="cm">// reserved 2; -- if quantity were ever REMOVED, its number (2)
    // must be marked reserved, permanently, so a future field can
    // never accidentally reuse it. Reusing a retired field number for
    // a field with a different meaning is the one mistake this whole
    // system cannot protect you from -- old data on the wire tagged
    // "2" would be silently misinterpreted as the new field's type.</span>
}
</code></pre>
</div>

<p>The two governing rules, stated directly: <strong>never reuse a field number, and never repurpose an existing field number for a different meaning</strong> — added fields must use new numbers, and removed fields' numbers must be retired, not recycled. Follow those two rules and old clients, new clients, old servers, and new servers can all interoperate during a rolling deployment, without every participant needing to update in lockstep.</p>

<h3>18.4 — The same discipline for REST/JSON, without the compiler's help</h3>
<p>JSON has no built-in field-numbering equivalent — field identity is the string key itself, and there's no wire-level mechanism enforcing evolution safety. The equivalent discipline has to be applied by convention, since nothing else will enforce it:</p>
<table>
<tr><th>Rule</th><th>Why</th></tr>
<tr><td>Only ever add new, optional fields</td><td>Old clients that don't know about a new field simply don't read it — this mirrors Protobuf's "unknown field, ignored" behavior, but only if the new field is genuinely optional; a new <em>required</em> field breaks every client that predates it</td></tr>
<tr><td>Never remove or rename a field clients may still read</td><td>An old client reading a JSON response expects the field to exist by that exact name; renaming is indistinguishable, from the client's perspective, from deletion</td></tr>
<tr><td>Never change a field's type</td><td>A client that deserializes <code class="inline">quantity</code> expecting a number will fail, or silently misbehave, if a server starts sending a string</td></tr>
<tr><td>Version the API explicitly when a breaking change is unavoidable</td><td>A URL-embedded version (<code class="inline">/v2/orders</code>) or a header-based version gives old clients an explicit, permanent escape hatch rather than forcing every client to track a mutable, unversioned contract</td></tr>
</table>
<div class="callout"><span class="lbl">The pattern across both</span>Protobuf's field numbers make additive, backward-compatible evolution close to automatic and hard to violate by accident. REST/JSON evolution safety is the identical set of rules, enforced entirely by team discipline and code review instead of a wire format — which is the same "compiler enforces it vs. you must remember it" divide this book has traced since Chapter 1's logger interface, now showing up at the API-contract level instead of the function-signature level.</div>

<h3>18.5 — Idempotency in API design: connecting back to Chapter 13</h3>
<p>REST's verb semantics carry a promise worth stating explicitly, because it connects directly to Chapter 13's delivery guarantees: GET, PUT, and DELETE are defined to be <strong>idempotent</strong> — calling them multiple times with the same input should produce the same end state as calling them once — while POST is not. This matters enormously for retry safety: a client that times out waiting for a response genuinely cannot tell whether the request succeeded before the timeout or never arrived at all, and safely retrying requires knowing whether the operation is idempotent. A PUT to update an order's shipping address is safe to retry blindly. A POST to "charge this card" is not — retrying it without additional protection can double-charge, which is exactly why payment APIs commonly require an explicit idempotency key on POST requests, manually restoring the guarantee the verb itself doesn't provide. This is Chapter 13, §13.3's idempotent-consumer pattern, applied at the API boundary instead of the message-queue boundary — same mechanism, same reasoning, different layer.</p>

<h3>18.6 — What to carry forward</h3>
<ul>
<li>Choose REST vs. gRPC based on who the clients are (broad/external → REST; internal/controlled → gRPC likely wins) and how much you value compile-time contract enforcement over broad compatibility — not based on a syntax preference.</li>
<li>The two field-numbering rules in §18.3 (never reuse, never repurpose) are worth memorizing verbatim — they're the entire mechanism that makes safe, independent, rolling deployment of client and server possible.</li>
<li>API idempotency (§18.5) is Chapter 13's pattern wearing a fourth name in this book (after the messaging consumer, and implicitly the database write pattern in Chapter 16) — every layer that can experience "did my request actually happen" uncertainty needs the same answer, and recognizing the repetition is more valuable than treating each occurrence as a new concept.</li>
</ul>

<h3>19.1 — Requirements, stated precisely</h3>
<p><strong>Functional:</strong> given a long URL, return a short one; given a short URL, redirect to the original long URL. <strong>Non-functional:</strong> redirects must be low-latency (users notice redirect delay immediately), the system must handle a read-heavy load (clicks vastly outnumber new-link creation in virtually every real deployment), and short codes must not collide. Explicitly out of scope for this pass: custom aliases and link analytics — named here because scoping out features honestly is part of system design, not an oversight.</p>

<h3>19.2 — Capacity estimation: applying Chapter 2's lens before designing anything</h3>
<p>Assume 100 million new links per month and a 100:1 read-to-write ratio (a conservative estimate for link-sharing services). That's roughly 40 writes/second and 4,000 reads/second average, with real-world traffic spiking well above average during peak hours — say, 10x, putting peak reads around 40,000/second. Chapter 2's latency table is the reason this number matters before any component is chosen: 40,000 reads/second cannot be served primarily from a database on disk (Chapter 2, §2.1's ~100–150μs SSD random read, multiplied by 40,000, is untenable) — this single estimate is what justifies a caching layer before any other design decision gets made, rather than caching being added reactively after a production incident.</p>

<h3>19.3 — Level 1 (System Design): component layout</h3>
<p>Client → Load Balancer (Chapter 14) → API servers → Cache (Chapter 15) → Database (Chapter 16), with the cache sitting in front of the database specifically because §19.2's capacity math demands it. The load balancer's algorithm choice matters here: since any API server can handle any request (no server-affinity requirement), least-connections (Chapter 14, §14.4) is a better fit than round-robin, since redirect requests are extremely cheap and uniform in cost, making round-robin's blind spot — uneven request cost — a non-issue, while its simplicity is a genuine advantage over tracking per-backend state for no real gain here. This is Chapter 14's decision framework applied directly: match the algorithm to what actually varies, and here, not much does.</p>

<h3>19.4 — Level 1: database and consistency choice</h3>
<p>The data model is about as simple as Chapter 16's framework gets: one record per short code, no relationships to join across, overwhelmingly dominated by "fetch one record by key." Chapter 16, §16.6's decision framework — "does this data have relationships frequently queried across" — answers clearly no, pointing toward a key-value or document store over a relational one. Consistency-wise, applying Chapter 10, §10.5's per-data-type discipline: a short code's mapping to its long URL, once created, never changes, so there's no write-conflict scenario at all — eventual consistency between replicas is entirely acceptable, since a replica lagging by a few milliseconds on a brand-new link is imperceptible to users, and the vast majority of reads are against links created well before the request.</p>

<h3>19.5 — Level 3 (Low-Level Design): key generation, two strategies</h3>
<p>The core algorithmic decision: how does a long URL become a short code? Two real strategies, with a genuine trade-off between them:</p>
<table>
<tr><th>Strategy</th><th>Mechanism</th><th>Trade-off</th></tr>
<tr><td>Counter + base62 encoding</td><td>A monotonically increasing counter (e.g., from a database sequence or a distributed ID generator) is encoded into base62 (a–z, A–Z, 0–9) to produce a short, dense code</td><td>Guarantees no collisions by construction; requires a coordinated counter, which becomes a scaling bottleneck at very high write volume unless the counter itself is sharded (e.g., each server pre-allocates a block of IDs)</td></tr>
<tr><td>Hash + truncation</td><td>Hash the long URL (or a random value), truncate to N characters</td><td>No coordination needed across servers — trivially parallel; truncated hashes can collide, requiring a collision-check-and-retry loop against the database on write</td></tr>
</table>
<p>This book builds the counter-based approach, because it's the cleaner illustration of base62 encoding — a genuinely useful, self-contained algorithm worth having built from scratch at least once.</p>

<div class="codewin">
<div class="bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="fname">base62.rs</span></div>
<pre><code><span class="kw">const</span> ALPHABET: &amp;[u8; <span class="nu">62</span>] = b<span class="st">"0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz"</span>;

<span class="cm">// A counter value of 0 must still produce a valid, non-empty code --
// the loop-then-check-empty structure below handles that edge case
// explicitly rather than relying on the loop naturally running once,
// which is exactly the kind of boundary case worth testing directly
// (Chapter 12's lesson: write the test that would catch it wrong).</span>
<span class="kw">pub fn</span> <span class="fn">encode</span>(<span class="kw">mut</span> n: u64) -&gt; <span class="ty">String</span> {
    <span class="kw">if</span> n == <span class="nu">0</span> { <span class="kw">return</span> <span class="st">"0"</span>.to_string(); }
    <span class="kw">let mut</span> chars = Vec::new();
    <span class="kw">while</span> n &gt; <span class="nu">0</span> {
        chars.push(ALPHABET[(n % <span class="nu">62</span>) <span class="kw">as</span> usize]);
        n /= <span class="nu">62</span>;
    }
    chars.reverse(); <span class="cm">// digits are generated least-significant-first</span>
    <span class="ty">String</span>::from_utf8(chars).unwrap()
}

<span class="kw">pub fn</span> <span class="fn">decode</span>(code: &amp;<span class="kw">str</span>) -&gt; Option&lt;u64&gt; {
    <span class="kw">let mut</span> n: u64 = <span class="nu">0</span>;
    <span class="kw">for</span> c <span class="kw">in</span> code.bytes() {

            // an invalid/adversarial code that would overflow u64
            // returns None instead of silently wrapping -- overflow
            // is the numeric-domain equivalent of the use-after-move
            // bug class from Chapter 3, and checked_* makes it an
            // explicit Option instead of silent wraparound.</span>
    }
    Some(n)
}
</code></pre>
</div>

<span class="kw">pub struct</span> <span class="ty">ShortenService</span>&lt;K: KeyGenerator, S: UrlStore&gt; {

<div class="chapter-eyebrow"><span class="b">Part V — Case Studies</span> / Chapter 20</div>
<h2 class="title">Designing a Rate Limiter</h2>
<div class="deck">Chapter 19 deferred rate limiting explicitly. This chapter builds it — one algorithm implemented directly with Chapter 4's atomics, then the harder problem underneath: what "the same limit" means once the limiter itself needs to run on more than one machine.</div>

<h3>20.1 — What a rate limiter is actually protecting</h3>
<p>A rate limiter answers: "has this client exceeded N requests per time window?" — and it exists to protect a system from exactly the kind of overload cascade Chapter 14, §14.7 described: without one, a single misbehaving client (or a genuine traffic spike) can consume enough capacity to degrade service for every other client, which is the load-balancer retry-storm problem's root cause, prevented at the source instead of mitigated after the fact.</p>

<h3>20.2 — Four algorithms, one real trade-off dimension</h3>
<table>
<tr><th>Algorithm</th><th>Mechanism</th><th>Trade-off</th></tr>
<tr><td>Fixed window counter</td><td>Count requests in discrete windows (e.g., 00:00–00:59); reset the counter each new window</td><td>Simplest to implement; allows a burst of up to 2x the limit at a window boundary (N requests at 00:59, N more at 01:00 — 2N requests in under 2 seconds, technically compliant)</td></tr>
<tr><td>Sliding window log</td><td>Store a timestamp for every request; count how many fall within the last N seconds from now, continuously</td><td>Perfectly accurate, no boundary burst problem; memory cost scales with request volume, since every timestamp must be retained until it ages out</td></tr>
<tr><td>Sliding window counter</td><td>Approximate the sliding log using two fixed windows and a weighted average between them</td><td>Fixes the boundary-burst problem with O(1) memory instead of the log's O(requests); the weighting is an approximation, not exact</td></tr>
<tr><td>Token bucket</td><td>A bucket holds up to N tokens; each request consumes one; tokens refill at a fixed rate up to the bucket's capacity</td><td>Naturally allows brief bursts up to the bucket size while enforcing a steady average rate — often the closest match to what "rate limit" intuitively should mean, and the algorithm built below</td></tr>
</table>
<p>The trade-off dimension underneath all four is the same one from Chapter 15's eviction policies: exactness versus cost. The sliding window log is the "correct" answer in the same sense LFU is the theoretically ideal eviction policy — accurate, and expensive in a way that's often not worth paying for. Token bucket's deliberate burst allowance is usually a feature, not a bug: real traffic is bursty, and a limiter that rejects legitimate brief bursts while under the long-run average rate is more disruptive than useful.</p>

<h3>20.3 — Building token bucket: single-process, using Chapter 4's atomics directly</h3>
<div class="codewin">
<div class="bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="fname">token_bucket.rs</span></div>
<pre><code><span class="kw">use</span> std::sync::atomic::{AtomicU64, Ordering};
<span class="kw">use</span> std::time::{Instant, Duration};
<span class="kw">use</span> std::sync::Mutex;

<span class="kw">pub struct</span> <span class="ty">TokenBucket</span> {
    capacity: u64,
    refill_rate_per_sec: u64,
    <span class="cm">// Tokens are stored scaled by 1000 as an integer, avoiding floating
    // point entirely for the token count -- floating point arithmetic
    // on a hot, highly concurrent path invites subtle rounding drift
    // across millions of operations; fixed-point integer math doesn't.
    // This is Chapter 2's cost-model lens applied to numeric
    // representation, not just algorithm choice.</span>
    tokens_milli: AtomicU64,
    last_refill: Mutex&lt;Instant&gt;,
}

<span class="kw">impl</span> <span class="ty">TokenBucket</span> {
    <span class="kw">pub fn</span> <span class="fn">new</span>(capacity: u64, refill_rate_per_sec: u64) -&gt; <span class="ty">Self</span> {
        <span class="ty">Self</span> {
            capacity, refill_rate_per_sec,
            tokens_milli: AtomicU64::new(capacity * <span class="nu">1000</span>),
            last_refill: Mutex::new(Instant::now()),
        }
    }

    <span class="cm">// Returns true if the request is allowed (a token was consumed),
    // false if the bucket is empty. This single boolean IS the rate
    // limiter's entire public contract -- everything else is
    // bookkeeping to make this answer correct.</span>
    <span class="kw">pub fn</span> <span class="fn">try_acquire</span>(&amp;<span class="kw">self</span>) -&gt; bool {
        <span class="kw">self</span>.refill();
        <span class="cm">// Compare-and-swap loop: read current tokens, check if enough
        // exist, attempt to subtract -- retry if another thread
        // changed the value between the read and the swap. This is
        // the same atomic-primitive category as Chapter 4's
        // fetch_add, but fetch_add alone can't express "only subtract
        // if the result wouldn't go negative," which is why a full
        // compare_exchange loop is needed here instead.</span>
        <span class="kw">loop</span> {
            <span class="kw">let</span> current = <span class="kw">self</span>.tokens_milli.load(Ordering::Acquire);
            <span class="kw">if</span> current &lt; <span class="nu">1000</span> { <span class="kw">return false</span>; } <span class="cm">// less than one whole token</span>
            <span class="kw">match self</span>.tokens_milli.compare_exchange_weak(
                current, current - <span class="nu">1000</span>, Ordering::Release, Ordering::Relaxed
            ) {
                Ok(_) =&gt; <span class="kw">return true</span>,
                Err(_) =&gt; <span class="kw">continue</span>, <span class="cm">// another thread won the race, retry with fresh value</span>
            }
        }
    }

    <span class="kw">fn</span> <span class="fn">refill</span>(&amp;<span class="kw">self</span>) {
        <span class="kw">let mut</span> last = <span class="kw">self</span>.last_refill.lock().unwrap();
        <span class="kw">let</span> elapsed = last.elapsed();
        <span class="kw">if</span> elapsed &lt; Duration::from_millis(<span class="nu">10</span>) { <span class="kw">return</span>; } <span class="cm">// avoid refilling on every
            // single call -- a small batching window, the same
            // latency/throughput trade from Chapter 2 applied to how
            // often bookkeeping work runs</span>
        <span class="kw">let</span> new_tokens_milli = (elapsed.as_secs_f64() * <span class="kw">self</span>.refill_rate_per_sec <span class="kw">as</span> f64 * <span class="nu">1000.0</span>) <span class="kw">as</span> u64;
        <span class="kw">let</span> cap_milli = <span class="kw">self</span>.capacity * <span class="nu">1000</span>;
        <span class="kw">self</span>.tokens_milli.fetch_update(Ordering::AcqRel, Ordering::Relaxed, |t| {
            Some((t + new_tokens_milli).min(cap_milli)) <span class="cm">// never exceed capacity</span>
        }).ok();
        *last = Instant::now();
    }
}
</code></pre>
</div>
<p>The <code class="inline">compare_exchange_weak</code> loop is worth connecting explicitly to Chapter 4: a plain mutex around the whole <code class="inline">try_acquire</code> would also be correct, and considerably simpler to read. The atomic version is justified specifically because rate limiting sits on the hottest possible path — every single incoming request, for every client — where Chapter 4, §4.2's contended-mutex cost (context switches, descheduling) is worth avoiding if the operation is simple enough for hardware-level compare-and-swap to express, which "subtract one token if enough exist" is.</p>

<h3>20.4 — The harder problem: rate limiting across multiple servers</h3>
<p>Section 20.3's bucket lives in one process's memory. The moment Chapter 14's load balancer spreads a client's requests across multiple API servers — which it does, by design — each server has its own independent bucket, and a client can get N requests through <em>each</em> server, multiplying the effective limit by the server count. This is a distributed-state problem, and it maps directly onto machinery this book has already built:</p>
<table>
<tr><th>Approach</th><th>Mechanism</th><th>Connects to</th></tr>
<tr><td>Centralized counter</td><td>All servers check and decrement a shared counter in a single fast store (typically Redis), instead of keeping local state</td><td>Chapter 15's shared-cache coherence fix (§15.6) — eliminate per-instance copies entirely rather than trying to keep them in sync</td></tr>
<tr><td>Sticky routing</td><td>The load balancer routes a given client's requests consistently to the same server, so that server's local bucket sees all of that client's traffic</td><td>Chapter 14, §14.5's consistent-hash load balancing, keyed on client ID instead of an arbitrary request key</td></tr>
</table>
<p>The centralized approach is more accurate (a true global count) at the cost of a network round-trip on every request — paying Chapter 2's cross-machine latency cost on the hottest path in the system, which is a serious cost to accept. Sticky routing avoids that round-trip entirely but sacrifices resilience: if the assigned server goes down, that client's rate-limit state is lost along with it, and the failover server starts a fresh bucket. Most production systems accept sticky routing's imprecision for the latency win, treating an occasional reset-on-failover as tolerable — the same kind of per-property trade-off judgment Chapter 10 asked for with consistency models, now applied to a rate limiter's own internal state.</p>

<h3>20.5 — What to carry forward</h3>
<ul>
<li>The exactness-versus-cost axis in §20.2 is Chapter 15's eviction-policy trade-off, recognized under a new name — expect this pattern (a family of algorithms trading accuracy for O(1) cost) to keep recurring across the rest of this book.</li>
<li>Section 20.3's decision to use a compare-and-swap loop over a mutex is a concrete instance of Chapter 4, §4.2's cost framework — revisit that section's mutex-vs-atomic guidance whenever a future chapter's hot-path code needs the same judgment call.</li>
<li>Distributed rate limiting in §20.4 is this book's fourth appearance of "how do multiple independent instances agree on shared state" (after Chapter 10's replicated counter, Chapter 12's quorum reads/writes, and Chapter 15's cache coherence) — by now, recognizing this as one recurring problem with a recurring menu of trade-offs, rather than four separate topics, should feel natural.</li>
</ul>

<div class="chapter-eyebrow"><span class="b">Part V — Case Studies</span> / Chapter 21</div>
<h2 class="title">Designing a Chat System</h2>
<div class="deck">The first case study with a genuinely new problem this book hasn't built machinery for yet: routing a message to a specific open connection, potentially on a different machine than the sender is talking to. Everything else — ordering, delivery guarantees, presence — reuses tools already built.</div>

<h3>21.1 — Requirements, and the one genuinely new constraint</h3>
<p>1:1 and group messaging, real-time delivery to online recipients, reliable delivery to offline recipients once they reconnect, and presence (is this user currently online). The new constraint, absent from Chapters 19–20: previous case studies were stateless request/response — any server could handle any request. Chat requires a <strong>persistent connection</strong> (WebSocket) between a client and a specific server, and a message from user A to user B must be routed to whichever specific server currently holds user B's connection — which might not be the server that received the message from A.</p>

<h3>21.2 — Level 1: the connection-routing problem</h3>
<p>This is a distributed-state problem in the same family as Chapter 20, §20.4, wearing a new shape: instead of "which server has this client's rate-limit bucket," it's "which server has this user's open WebSocket." The same two-option menu applies, and the same reasoning picks a winner for a different reason this time:</p>
<table>
<tr><th>Approach</th><th>Mechanism here</th><th>Verdict for chat specifically</th></tr>
<tr><td>Sticky routing (Chapter 14, §14.5)</td><td>Consistent-hash the connection to a server by user ID</td><td>Doesn't actually solve the problem — it only controls where a NEW connection lands, but user A sending a message needs to find user B's EXISTING connection, which sticky routing on A's own connection can't tell A's server</td></tr>
<tr><td>Centralized connection registry (Chapter 20, §20.4's centralized-counter approach, generalized)</td><td>Every gateway server registers <code class="inline">user_id → server_id</code> in a shared fast store (Redis) on connect, deregisters on disconnect</td><td>Correct fit: any server handling an incoming message can look up which server holds the recipient's connection and forward it there directly</td></tr>
</table>
<p>Chapter 20 accepted sticky routing's imprecision because the alternative's network round-trip cost was worse than the accuracy gained. Here the calculus flips: sticky routing doesn't even solve the actual problem (finding an existing connection elsewhere), so the "expensive" centralized registry isn't a trade-off being reluctantly accepted, it's the only approach that answers the question being asked at all. This is worth sitting with: the same two options from a prior chapter can have a clear winner in one context and a different clear winner in another — memorizing "centralized is more accurate but slower" as a rule misses that here, it's also the only structurally correct option.</p>

<h3>21.3 — Level 3: message ordering and delivery, reusing Chapter 13 and 17 directly</h3>
<p>Within one conversation, messages must arrive in the order they were sent — but across different conversations, no ordering guarantee is needed, and enforcing one would be pure wasted coordination. This is exactly Chapter 13, §13.4's partition-key routing: use the conversation ID as the partition key, so all messages for one conversation are ordered relative to each other (processed by the same partition/worker) while different conversations process fully in parallel. A per-conversation monotonic sequence number, assigned when a message is persisted, gives clients an unambiguous way to detect gaps or reordering on their end, independent of network delivery order.</p>

<div class="codewin">
<div class="bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="fname">message_store.rs</span></div>
<pre><code><span class="kw">use</span> std::collections::HashMap;
<span class="kw">use</span> std::sync::Mutex;

<span class="kw">pub struct</span> <span class="ty">Message</span> {
    <span class="kw">pub</span> conversation_id: <span class="ty">String</span>,
    <span class="kw">pub</span> sequence: u64,
    <span class="kw">pub</span> sender_id: <span class="ty">String</span>,
    <span class="kw">pub</span> body: <span class="ty">String</span>,
}

<span class="cm">// Conceptually the append-only log from Chapter 17, §17.4 -- messages
// are never mutated or removed once written, only appended, which is
// exactly what lets a reconnecting offline client "replay" everything
// it missed by requesting all messages after its last-seen sequence
// number, the same replay mechanism a stream consumer group uses.</span>
<span class="kw">pub struct</span> <span class="ty">MessageStore</span> {
    <span class="cm">// conversation_id -> (next sequence number, message log)</span>
    conversations: Mutex&lt;HashMap&lt;<span class="ty">String</span>, (u64, Vec&lt;Message&gt;)&gt;&gt;,
}

<span class="kw">impl</span> <span class="ty">MessageStore</span> {
    <span class="kw">pub fn</span> <span class="fn">append</span>(&amp;<span class="kw">self</span>, conversation_id: &amp;<span class="kw">str</span>, sender_id: &amp;<span class="kw">str</span>, body: <span class="ty">String</span>) -&gt; u64 {
        <span class="kw">let mut</span> convos = <span class="kw">self</span>.conversations.lock().unwrap();
        <span class="kw">let</span> entry = convos.entry(conversation_id.to_string()).or_insert((<span class="nu">0</span>, Vec::new()));
        <span class="kw">let</span> seq = entry.<span class="nu">0</span>;
        entry.<span class="nu">1</span>.push(Message {
            conversation_id: conversation_id.to_string(),
            sequence: seq,
            sender_id: sender_id.to_string(),
            body,
        });
        entry.<span class="nu">0</span> += <span class="nu">1</span>; <span class="cm">// next sequence number for this conversation</span>
        seq
    }

    <span class="cm">// The replay mechanism: a client back online after a gap asks for
    // everything since its last known sequence number, exactly like a
    // Kafka consumer resuming from a stored offset.</span>
    <span class="kw">pub fn</span> <span class="fn">messages_since</span>(&amp;<span class="kw">self</span>, conversation_id: &amp;<span class="kw">str</span>, last_seen_seq: u64) -&gt; Vec&lt;<span class="ty">String</span>&gt; {
        <span class="kw">let</span> convos = <span class="kw">self</span>.conversations.lock().unwrap();
        <span class="kw">match</span> convos.get(conversation_id) {
            Some((_, log)) =&gt; log.iter()
                .filter(|m| m.sequence &gt; last_seen_seq)
                .map(|m| m.body.clone())
                .collect(),
            <span class="ty">None</span> =&gt; Vec::new(),
        }
    }
}
</code></pre>
</div>
<p>Delivery guarantee-wise, this reuses Chapter 13's conclusion directly: don't chase "exactly-once" as a protocol feature — deliver at-least-once (retry sending until the client acknowledges receipt) and make the client's message handling idempotent by sequence number, so a duplicate delivery of a message the client already has is simply ignored rather than shown twice.</p>

<h3>21.4 — Group chat: the fanout trade-off, and a forward reference</h3>
<p>Sending one message to a group of N members requires deciding when the "write to N recipients" work happens: <strong>fanout-on-write</strong> pushes the message into every member's individual message queue immediately at send time (fast reads later — each recipient's queue already has it — at the cost of N writes per message, which is expensive for very large groups), versus <strong>fanout-on-read</strong> storing the message once and having each member's client query "what's new in my conversations" on demand (cheap writes, more expensive reads, since every read has to check every conversation a user is part of). This is precisely the tension Chapter 22's news feed case study is built entirely around — chat's group-message fanout and a social feed's post fanout are the same underlying problem at different scale, and Chapter 22 develops the hybrid solution (fanout-on-write for most users, fanout-on-read for outlier cases like accounts with millions of followers) that applies equally well here for exceptionally large chat groups.</p>

<h3>21.5 — Presence: TTL, reused from Chapter 15 for a new kind of data</h3>
<p>"Is this user online" is a classic case for Chapter 15, §15.2's TTL eviction policy, applied to presence instead of cache entries: each connected client sends a periodic heartbeat that refreshes a TTL key (<code class="inline">presence:user_id</code>, expiring in, say, 30 seconds); if the heartbeat stops — client crashes, network drops — the key simply expires on its own with no explicit disconnect logic required. This is a deliberately simple, self-healing design: it doesn't need to detect disconnection as a distinct event, because "the key aged out" and "the user explicitly disconnected" are handled by the exact same expiration mechanism, avoiding an entire class of bugs around missed disconnect notifications.</p>

<h3>21.6 — What to carry forward</h3>
<ul>
<li>Connection routing (§21.2) is this book's introduction of a genuinely new problem shape — "route to a specific stateful connection, not any interchangeable server" — worth distinguishing clearly from the stateless request-routing Chapters 14 and 19–20 assumed throughout.</li>
<li>Section 21.2's closing point — that the same two options can have opposite clear winners in different contexts — is worth carrying forward as a caution against pattern-matching too quickly: recognize the tool, but re-derive which option wins for the specific problem in front of you, every time.</li>
<li>The fanout trade-off named in §21.4 is deliberately left unresolved here — it's the entire subject of Chapter 22, which now has a concrete second use case (group chat, not just social feeds) motivating the same underlying decision.</li>
</ul>

<div class="chapter-eyebrow"><span class="b">Part V — Case Studies</span> / Chapter 22</div>
<h2 class="title">Designing a News Feed</h2>
<div class="deck">Resolving Chapter 21's cliffhanger. Fanout-on-write and fanout-on-read are each fine most of the time and each fail catastrophically at one specific extreme — this chapter builds the hybrid that avoids both failure modes, plus the k-way merge needed to make the hybrid actually work.</div>

<h3>22.1 — Requirements and where the trade-off actually bites</h3>
<p>Users follow other users; a feed shows recent posts from everyone a user follows, roughly chronological. The design challenge isn't the average case — it's the distribution: most accounts have a few hundred followers, and a small number of accounts (celebrities, large organizations) have millions. Any design that works fine on average and falls over on that long tail isn't actually production-ready, which is exactly what happens to a pure version of either strategy from Chapter 21, §21.4.</p>

<h3>22.2 — Why each pure strategy fails at one specific extreme</h3>
<table>
<tr><th>Strategy</th><th>Cost per post</th><th>Where it breaks</th></tr>
<tr><td>Pure fanout-on-write</td><td>O(followers) — writing one post inserts it into every follower's precomputed feed</td><td>A celebrity with 50 million followers posting once triggers 50 million feed-writes from a single action — a write amplification spike that can overwhelm the write path for a single event, entirely disproportionate to what the user actually did</td></tr>
<tr><td>Pure fanout-on-read</td><td>O(1) — the post is stored once</td><td>Every feed load for every user now requires querying posts from every account they follow and merging the results live — for a user following thousands of accounts, this makes the overwhelmingly common "open the app" action expensive, directly violating Chapter 19, §19.2's read-heavy capacity assumption that reads must be cheap</td></tr>
</table>
<p>Neither failure is hypothetical or rare — the celebrity case and the read-heavy-average-user case both happen on every single feed load or every single post from a large account, respectively. A production design needs both strategies, applied selectively, not a single global choice.</p>

<h3>22.3 — The hybrid: threshold-based strategy selection</h3>
<p>The standard resolution: pick a follower-count threshold (commonly a few thousand to tens of thousands, tuned empirically). Accounts below it use fanout-on-write — the common case, where O(followers) is a small, bounded number and the read-time win (feeds are precomputed, just fetch and display) matters far more. Accounts above it are excluded from fanout-on-write entirely; their posts are fetched live and merged in at read time, exactly like pure fanout-on-read, but now only for the rare, large-follower-count accounts a given user follows — not for every account, and not on every write.</p>
<div class="callout"><span class="lbl">Why this isn't just splitting the difference</span>This hybrid isn't a compromise that's mediocre at both jobs — it's applying each strategy exactly where its cost profile is favorable and avoiding it exactly where its cost profile is catastrophic. Fanout-on-write's cost only explodes for high-follower accounts, so exclude only those. Fanout-on-read's cost only matters at scale (many accounts to merge per feed load), so most users' feeds barely touch it, since the average user follows only a handful of celebrity-tier accounts, if any.</div>

<h3>22.4 — Building the read path: merging precomputed and live results</h3>
<p>A user's feed load now does two things: fetch their precomputed feed (already fanned-out posts, sorted by time, cheap), and fetch recent posts from any celebrity-tier accounts they follow (live query, typically few enough accounts that this is cheap too), then <strong>merge both lists by timestamp</strong> into one chronological feed. Since both input lists are already individually sorted by time, this is a textbook k-way merge — the same algorithmic shape as merging sorted runs in external sort, solved efficiently with a min-heap rather than concatenating and re-sorting everything from scratch.</p>

<div class="codewin">
<div class="bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="fname">feed_merge.rs</span></div>
<pre><code><span class="kw">use</span> std::collections::BinaryHeap;
<span class="kw">use</span> std::cmp::Ordering;

<span class="kw">#[derive(Eq, PartialEq)]</span>
<span class="kw">pub struct</span> <span class="ty">Post</span> { <span class="kw">pub</span> timestamp: u64, <span class="kw">pub</span> author: <span class="ty">String</span>, <span class="kw">pub</span> body: <span class="ty">String</span> }

<span class="cm">// BinaryHeap in Rust is a MAX-heap by default. Feed display wants
// newest-first, so the natural Ord (by timestamp, ascending) needs to
// be flipped -- implemented here by reversing the comparison, rather
// than wrapping every push in std::cmp::Reverse at every call site.</span>
<span class="kw">impl</span> <span class="ty">Ord</span> <span class="kw">for</span> <span class="ty">Post</span> {
    <span class="kw">fn</span> <span class="fn">cmp</span>(&amp;<span class="kw">self</span>, other: &amp;<span class="ty">Self</span>) -&gt; Ordering {
        <span class="kw">self</span>.timestamp.cmp(&amp;other.timestamp) <span class="cm">// natural order: larger timestamp = "greater"
            // = pops first from a max-heap = newest first. Exactly
            // the ordering the feed needs, achieved without a wrapper.</span>
    }
}
<span class="kw">impl</span> <span class="ty">PartialOrd</span> <span class="kw">for</span> <span class="ty">Post</span> {
    <span class="kw">fn</span> <span class="fn">partial_cmp</span>(&amp;<span class="kw">self</span>, other: &amp;<span class="ty">Self</span>) -&gt; Option&lt;Ordering&gt; { Some(<span class="kw">self</span>.cmp(other)) }
}

<span class="cm">// Merges any number of already-sorted (newest-first) post lists into
// one sorted feed, taking only the first \`limit\` results -- avoiding
// the wasted work of fully sorting lists far beyond what a feed page
// actually displays. This generalizes past "two lists" (precomputed +
// celebrity) to however many separate sorted sources a feed load ends
// up needing to combine.</span>
<span class="kw">pub fn</span> <span class="fn">merge_feeds</span>(sources: Vec&lt;Vec&lt;Post&gt;&gt;, limit: usize) -&gt; Vec&lt;Post&gt; {
    <span class="kw">let mut</span> heap: BinaryHeap&lt;Post&gt; = BinaryHeap::new();
    <span class="kw">for</span> source <span class="kw">in</span> sources {
        <span class="kw">for</span> post <span class="kw">in</span> source { heap.push(post); }
    }
    <span class="kw">let mut</span> result = Vec::with_capacity(limit);
    <span class="kw">while</span> result.len() &lt; limit {
        <span class="kw">match</span> heap.pop() {
            Some(post) =&gt; result.push(post),
            <span class="ty">None</span> =&gt; <span class="kw">break</span>, <span class="cm">// fewer total posts than the requested limit -- stop early</span>
        }
    }
    result
}
</code></pre>
</div>
<p>This implementation pushes every post from every source into the heap up front, which is simple and correct but does more work than strictly necessary — a further-optimized version would push only each source's current head, popping and replacing lazily (true streaming k-way merge), relevant if sources are large enough that materializing them fully before merging becomes its own cost. Naming that next optimization step without building it is a deliberate choice consistent with this book's approach since Chapter 11: be explicit about what a given implementation does and doesn't handle, rather than silently presenting a simplified version as the complete picture.</p>

<h3>22.5 — Storage and caching, reusing Chapters 15 and 16 directly</h3>
<p>A precomputed feed is a per-user, frequently-read, list-shaped piece of data with no cross-user relationships to join against — Chapter 16, §16.6's framework points straight at a document/key-value store, exactly as it did for Chapter 19's URL mappings. Precomputed feeds for active users are strong candidates for Chapter 15's caching layer, particularly since feed reads are the single most frequent action in the entire system (every app open); an LRU policy fits well here specifically because active-user feed access has strong temporal locality — someone who opened the app in the last hour is disproportionately likely to open it again soon, which is precisely the access pattern Chapter 15, §15.2 said LRU is suited for.</p>

<h3>22.6 — Ranking: named and scoped out, honestly</h3>
<p>Real feeds are rarely pure reverse-chronological — they're ranked by a scoring model weighing recency, engagement prediction, and relationship strength. That's a machine-learning systems topic outside this book's scope, and it's named here rather than silently ignored, in keeping with Chapter 19, §19.7's practice: this chapter's merge in §22.4 produces a chronological feed, and a ranked feed would replace the "sort by timestamp" comparator with a "sort by predicted relevance score" comparator — the k-way merge machinery itself doesn't change, only what each <code class="inline">Post</code>'s <code class="inline">Ord</code> implementation compares on.</p>

<h3>22.7 — What to carry forward</h3>
<ul>
<li>The hybrid threshold strategy in §22.3 is a specific instance of a general lesson: when a single strategy fails at one extreme of a distribution, check whether a threshold-based split — the common case gets the strategy optimized for it, the rare extreme gets a different one — resolves the failure without needing an entirely new algorithm. This same shape (special-case the outliers, optimize the common path) is worth watching for in future system designs.</li>
<li>The k-way merge in §22.4 is a reusable tool, not a feed-specific trick — any time this book (or a real system) needs to combine several already-sorted sources into one ordered result under a limit, this is the pattern, whether the sources are feed lists, log-merge compaction (Chapter 17-adjacent), or search-result merging across shards.</li>
<li>Chapter 21's connection-routing lesson and this chapter's fanout lesson are companion pieces — both study what happens to a "works for a normal user" design when applied to an extreme case (a viral group chat, a celebrity account) — hold them together as one lesson about designing for the tail of a distribution, not just the average.</li>
</ul>
